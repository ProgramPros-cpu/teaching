    <!-- Pure CSS Architecture (Bento Style: No Hover, No Shadow) -->
    <style>
        /* === CSS Variables & Theming === */
        :root {
            /* BentoShop Inspired Palette */
            --primary: #296634;        /* c-green-dark */
            --primary-light: #4cb970;  /* c-green-light */
            --secondary: #f4c03b;      /* c-yellow */
            
            --bg-color: #e9ecea;       /* Outer body bg */
            --surface-color: #f8faf9;  /* Main app bg */
            --surface-alt: #ffffff;    /* Cards bg */
            --border-color: #e5e7eb;
            
            --text-main: #1a231b;
            --text-muted: #6b7280;
            --text-inverse: #ffffff;

            --success: #4cb970;
            --warning: #f4c03b;
            --danger: #ef4444;
            --info: #8b5cf6;           /* c-purple */

            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 100px;        /* Pill shapes */
            --radius-2xl: 20px;        /* Corner radius from Bento */
            
            --safe-pb: calc(env(safe-area-inset-bottom, 20px) + 0.5rem);
            --safe-pt: env(safe-area-inset-top, 0px);
        }

        .dark {
            --bg-color: #121212;
            --surface-color: #1a231b;
            --surface-alt: #243026;
            --border-color: #2d3c2f;
            --text-main: #f8faf9;
            --text-muted: #9ca3af;
        }

        .pro-theme {
            --primary: #d4af37;
            --primary-light: #eab308;
            --secondary: #fbbf24;
        }

        /* === Reset & Base === */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            padding-top: var(--safe-pt);
            line-height: 1.5;
        }

        button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; outline: none; }
        input, textarea, select { font-family: inherit; outline: none; }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; height: auto; display: block; }

        /* Custom Scrollbar (Flat) */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        /* === Bento Shapes === */
        .shape-a { border-radius: 0 20px 0 20px !important; }
        .shape-b { border-radius: 20px 0 20px 0 !important; }

        /* === Layout Utilities === */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            width: 100%;
        }

        @media (min-width: 768px) {
            .app-wrapper { flex-direction: row; }
        }

        /* Navigation */
        .desktop-nav {
            display: none;
            flex-direction: column;
            width: 80px;
            background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            height: 100%;
            z-index: 40;
            flex-shrink: 0;
        }

        @media (min-width: 1024px) {
            .desktop-nav { width: 250px; }
        }

        @media (min-width: 768px) {
            .desktop-nav { display: flex; }
        }

        .mobile-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            z-index: 50;
            padding: 8px 8px var(--safe-pb) 8px;
            justify-content: space-around;
            align-items: center;
        }

        @media (min-width: 768px) {

        .main-content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;

        }

        .app-main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            width: 100%;
            height: 100%;
            padding-bottom: 90px;
            scroll-behavior: smooth;
        }

        @media (min-width: 768px) {
            .app-main { padding-bottom: 0; }
        }

        /* === Grid & Flex Systems === */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .items-start { align-items: flex-start; }
        .items-end { align-items: flex-end; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .justify-end { justify-content: flex-end; }
        .flex-1 { flex: 1; }
        .flex-wrap { flex-wrap: wrap; }
        .shrink-0 { flex-shrink: 0; }
        
        .gap-1 { gap: 0.25rem; } .gap-2 { gap: 0.5rem; } .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; } .gap-6 { gap: 1.5rem; } .gap-8 { gap: 2rem; }

        .grid { display: grid; }
        .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
        @media (min-width: 640px) { .sm\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (min-width: 768px) { .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); } .md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
        @media (min-width: 1024px) { .lg\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); } .lg\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
        .col-span-full { grid-column: 1 / -1; }

        /* === Spacing & Sizing === */
        .w-full { width: 100%; } .h-full { height: 100%; }
        .max-w-md { max-width: 28rem; } .max-w-2xl { max-width: 42rem; }
        .max-w-4xl { max-width: 56rem; } .max-w-6xl { max-width: 72rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        
        .p-2 { padding: 0.5rem; } .p-4 { padding: 1rem; } .p-6 { padding: 1.5rem; } .p-8 { padding: 2rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; } .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; } .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        
        .m-0 { margin: 0; } .mb-2 { margin-bottom: 0.5rem; } .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; } .mb-8 { margin-bottom: 2rem; } .mt-4 { margin-top: 1rem; } .mt-auto { margin-top: auto; }

        /* === Typography === */
        .text-center { text-align: center; } .text-left { text-align: left; } .text-right { text-align: right; }
        .text-xs { font-size: 0.75rem; line-height: 1rem; } .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
        .text-base { font-size: 1rem; line-height: 1.5rem; } .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
        .text-xl { font-size: 1.25rem; line-height: 1.75rem; } .text-2xl { font-size: 1.5rem; line-height: 2rem; }
        .text-3xl { font-size: 1.875rem; line-height: 2.25rem; } .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .text-5xl { font-size: 3rem; line-height: 1; }
        
        .font-normal { font-weight: 400; } .font-medium { font-weight: 500; }
        .font-bold { font-weight: 700; } .font-extrabold { font-weight: 800; }
        
        .text-main { color: var(--text-main); } .text-muted { color: var(--text-muted); }
        .text-white { color: #ffffff; } .text-primary { color: var(--primary); }
        .text-success { color: var(--success); } .text-warning { color: var(--warning); } .text-danger { color: var(--danger); }
        
        .uppercase { text-transform: uppercase; } .tracking-wider { letter-spacing: 0.05em; }
        .tracking-tight { letter-spacing: -0.025em; } .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* === Components === */
        /* Cards (Flat Design) */
        .card {
            background-color: var(--surface-alt);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: var(--radius-2xl);
            /* NO SHADOW OR HOVER */
        }
        .card-interactive:active { transform: translateY(2px); }

        /* Buttons (Pill shaped, solid, no shadow) */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: var(--radius-xl);
            font-weight: 700; font-size: 1rem; text-align: center;
        }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.7; pointer-events: none; }
        
        .btn-primary { background-color: var(--primary); color: var(--text-inverse); }
        .btn-gradient { background-color: var(--secondary); color: var(--primary); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-ghost { background-color: transparent; color: var(--text-muted); padding: 0.5rem; border-radius: 0.5rem; }
        
        .btn-icon { width: 2.5rem; height: 2.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: var(--surface-color); border: 1px solid var(--border-color); }

        /* Inputs & Forms */
        .input-group { margin-bottom: 1rem; width: 100%; }
        .label { display: block; font-size: 0.875rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.5rem; }
        .input, .textarea, .select {
            width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius-md);
            background-color: var(--surface-color); border: 1px solid var(--border-color);
            color: var(--text-main); font-size: 1rem;
        }
        .input:focus, .textarea:focus, .select:focus { border-color: var(--primary); background-color: var(--surface-alt); }
        .textarea { resize: vertical; min-height: 100px; }

        /* Badges */
        .badge {
            display: inline-flex; align-items: center; gap: 0.25rem;
            padding: 0.25rem 0.75rem; border-radius: 0.5rem; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .badge-primary { background-color: var(--primary); color: var(--text-inverse); }
        .badge-success { background-color: var(--success); color: var(--text-inverse); }
        .badge-warning { background-color: var(--warning); color: var(--text-inverse); }
        
        .bg-surface { background-color: var(--surface-color); }

        /* Modals (Flat, border only) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        .modal-content {
            background-color: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: var(--radius-2xl); width: 100%; max-width: 32rem; max-height: 90vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-color); }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }

        /* Desktop Navigation Links */
        .nav-link {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
            border-radius: var(--radius-lg); color: var(--text-muted); margin-bottom: 0.5rem;
        }
        .nav-link.active { background-color: var(--primary); color: var(--text-inverse); font-weight: 700; }
        .nav-link i { font-size: 1.5rem; }
        
        /* Bento Mobile Nav Links */
        .mobile-nav-link {
            display: flex; flex-direction: column; align-items: center;
            width: 4rem; color: var(--text-muted);
        }
        .mobile-nav-link i { font-size: 1.5rem; margin-bottom: 0.25rem; padding: 0.375rem 1rem; border-radius: 20px; }
        .mobile-nav-link span { font-size: 0.625rem; font-weight: 700; }
        .mobile-nav-link.active { color: var(--primary); }
        .mobile-nav-link.active i { background-color: var(--primary); color: var(--secondary); }

        /* Progress Bar */
        .progress-bar-bg { width: 100%; background-color: var(--bg-color); border-radius: 999px; height: 0.5rem; overflow: hidden; border: 1px solid var(--border-color); }
        .progress-bar-fill { height: 100%; background-color: var(--success); border-radius: 999px; }
        .progress-bar-primary { background-color: var(--primary); }

        .avatar { border-radius: 50%; object-fit: cover; }
        .avatar-sm { width: 2rem; height: 2rem; } .avatar-md { width: 3rem; height: 3rem; }
        .avatar-lg { width: 6rem; height: 6rem; } .avatar-xl { width: 8rem; height: 8rem; border: 4px solid var(--surface-color); }

        /* Flat Toast */
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast {
            pointer-events: auto; display: flex; align-items: center; gap: 0.75rem;
            padding: 1rem; border-radius: var(--radius-xl);
            background-color: var(--primary); color: white; border: 1px solid var(--border-color);
            font-size: 0.875rem; font-weight: 500;
            opacity: 0; transform: translateY(20px);
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        
        .loader {
            border: 4px solid var(--bg-color); border-top: 4px solid var(--primary);
            border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Confetti */
        .confetti-piece { position: absolute; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        /* Code Editor */
        #code-editor-textarea { tab-size: 4; white-space: pre; overflow-wrap: normal; overflow-x: auto; caret-color: var(--secondary); }

        /* Utilities */
        .relative { position: relative; } .absolute { position: absolute; } .fixed { position: fixed; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .z-10 { z-index: 10; } .z-20 { z-index: 20; }
        .hidden { display: none !important; } .block { display: block; } .inline-block { display: inline-block; }
        .overflow-hidden { overflow: hidden; } .overflow-y-auto { overflow-y: auto; }
        .w-10 { width: 2.5rem; } .h-10 { height: 2.5rem; }
        .rounded-full { border-radius: 9999px; } .rounded-xl { border-radius: 1rem; }
    </style>
</head>
<body>

<div class="app-wrapper">    
    <!-- Desktop Sidebar -->
    <nav id="desktop-nav" class="desktop-nav"></nav>
    
    <!-- Mobile Bottom Nav -->
    <nav id="mobile-nav" class="mobile-nav"></nav>

    <!-- Main Content Area -->
    <div class="main-content-area">
        <main id="app-root" class="app-main"></main>
    </div>

    <!-- Global Components -->
    <div id="toast-container"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, addDoc, arrayUnion, query, getDocs, deleteDoc, orderBy, serverTimestamp, arrayRemove, limit, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- FIREBASE INITIALIZATION & RULES ---
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'programpros-v5-app';
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyCgJvSkhGL-zJ0pXYrXt43z7LZB-CfOI48",
        authDomain: "font-changer-4667c.firebaseapp.com",
        projectId: "font-changer-4667c",
        storageBucket: "font-changer-4667c.firebasestorage.app",
        messagingSenderId: "200130160747",
        appId: "1:200130160747:web:747975551ddb296dc2a92e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const getPubCol = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
    const getPubDoc = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);
    const getPrivCol = (uid, colName) => collection(db, 'artifacts', appId, 'users', uid, colName);
    const getPrivDoc = (uid, colName, docId) => doc(db, 'artifacts', appId, 'users', uid, colName, docId);

    // --- APP STATE ---
    window.AppState = {
        currentPage: 'welcome',
        user: null, 
        authReady: false,
        theme: localStorage.getItem('theme') || 'light',
        courses: [],
        communityPosts: [],
        paymentRequests: [],
        proRequests: [],
        leaderboard: [],
        searchQuery: '',
        currentCourseId: null,
        currentLessonId: null,
        currentLessonNotes: '',
        quizState: { active: false, index: 0, score: 0, questions: [], finished: false },
        modals: { createCourse: false, addContent: false, settings: false, editCourse: false, videoPlayer: false },
        selectedCourseForContent: null,
        selectedCourseToEdit: null,
        currentVideoUrl: null,
        selectedContentType: 'video'
    };

    const BADGES = {
        'beginner': { icon: 'ph-seedling', name: 'Seedling', color: 'text-success', bg: 'badge-success', req: 50 },
        'scholar': { icon: 'ph-student', name: 'Scholar', color: 'text-info', bg: 'badge-primary', req: 150 },
        'master': { icon: 'ph-crown', name: 'Master', color: 'text-warning', bg: 'badge-warning', req: 300 }
    };

    const $ = id => document.getElementById(id);
    
    window.showToast = function(message, type = 'success') {
        const container = $('toast-container');
        const toast = document.createElement('div');
        const iconClass = type === 'success' ? 'ph-check-circle' : type === 'error' ? 'ph-warning-circle' : 'ph-info';
        const color = type === 'error' ? 'var(--danger)' : 'var(--secondary)';
        
        toast.className = `toast`;
        toast.innerHTML = `<i class="ph-fill ${iconClass}" style="color: ${color}; font-size: 1.25rem;"></i> <span>${message}</span>`;
        container.appendChild(toast);
        
        requestAnimationFrame(() => toast.classList.add('show'));

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    window.toggleTheme = function() {
        const html = document.documentElement;
        html.classList.toggle('dark');
        AppState.theme = html.classList.contains('dark') ? 'dark' : 'light';
        localStorage.setItem('theme', AppState.theme);
        renderApp();
    }

    if (AppState.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        AppState.theme = 'dark';
    }

    window.navigate = function(page, params = {}) {
        AppState.currentPage = page;
        if (params.courseId) AppState.currentCourseId = params.courseId;
        if (params.lessonId) {
            AppState.currentLessonId = params.lessonId;
            loadPrivateNotes(params.lessonId);
            
            const course = AppState.courses.find(c => c.id === AppState.currentCourseId);
            const lesson = course?.syllabus?.find(l => l.id === AppState.currentLessonId);
            if (lesson && lesson.type === 'quiz') {
                AppState.quizState = { active: true, index: 0, score: 0, questions: lesson.questions || [], finished: false };
            }
        }
        
        Object.keys(AppState.modals).forEach(k => AppState.modals[k] = false);
        renderApp();
        $('app-root').scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.togglePassword = function(inputId, btn) {
        const input = $(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';

    window.fireConfetti = function() {
        const colors = ['#296634', '#f4c03b', '#4cb970', '#ef4444', '#8b5cf6'];
        const container = $('app-root');
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-piece';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = (container.scrollTop - 20) + 'px';
            confetti.style.width = Math.random() * 8 + 6 + 'px';
            confetti.style.height = Math.random() * 8 + 6 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            container.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }
    }

    async function initializeUserData(authUser) {
        if (!authUser) return;
        const uid = authUser.uid;
        const isAdminEmail = authUser.email === 'joykumbhakar101@gmail.com';
        const userRef = getPubDoc('users', uid); 

        try {
            const docSnap = await getDoc(userRef);
            if (!docSnap.exists()) {
                const newProfile = {
                    uid: uid,
                    name: authUser.displayName || 'Learner ' + uid.substring(0, 4),
                    email: authUser.email || '',
                    avatar: authUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(authUser.displayName || 'User')}&background=296634&color=fff`,
                    studentId: 'PP-' + Math.floor(Math.random() * 90000 + 10000),

                    level: 1, points: 0, unlockedCourses: [], completedLessons: [], bookmarks: [], badges: [],

                };
                await setDoc(userRef, newProfile);

            } else {
                let data = docSnap.data();
                if (isAdminEmail && data.role !== 'admin') {
                    await updateDoc(userRef, { role: 'admin' });
                    data.role = 'admin';
                }
                if (!data.bookmarks) data.bookmarks = [];
                if (!data.badges) data.badges = [];
                AppState.user = data;
            }

            const unsubUser = onSnapshot(userRef, (doc) => {
                if (doc.exists()) {
                    const oldPoints = AppState.user?.points || 0;
                    AppState.user = doc.data();
                    if (!AppState.user.bookmarks) AppState.user.bookmarks = [];
                    if (!AppState.user.badges) AppState.user.badges = [];
                    checkAndAwardBadges(oldPoints, AppState.user.points || 0);
                    if (['dashboard', 'profile', 'courses', 'courseDetail', 'admin', 'teacher'].includes(AppState.currentPage) || AppState.modals.settings) renderApp();
                }
            });
            unsubscribes.push(unsubUser);
            setupRoleListeners();
        } catch (e) { showToast("Failed to load profile data", "error"); }
    }

    function setupRoleListeners() {
        const unsubCourses = onSnapshot(getPubCol('courses'), (snapshot) => {
            const courses = [];
            snapshot.forEach(doc => courses.push({ id: doc.id, ...doc.data() }));
            AppState.courses = courses.sort((a, b) => b.createdAt - a.createdAt);
            if (['dashboard', 'courses', 'courseDetail', 'teacher'].includes(AppState.currentPage)) renderApp();
        });
        unsubscribes.push(unsubCourses);

        const unsubPosts = onSnapshot(getPubCol('community_posts'), (snapshot) => {
            const posts = [];
            snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
            AppState.communityPosts = posts.sort((a, b) => b.timestamp - a.timestamp);
            if (AppState.currentPage === 'community') renderApp();
        });
        unsubscribes.push(unsubPosts);

        const unsubTopUsers = onSnapshot(getPubCol('users'), (snapshot) => {
            const users = [];
            snapshot.forEach(doc => users.push(doc.data()));
            AppState.leaderboard = users.sort((a, b) => (b.points || 0) - (a.points || 0)).slice(0, 5);

        unsubscribes.push(unsubTopUsers);

        if (AppState.user?.role === 'admin') {
            const unsubPayments = onSnapshot(getPubCol('payment_requests'), (snapshot) => {
                const reqs = []; snapshot.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                AppState.paymentRequests = reqs.filter(r => r.status === 'pending');
                if (AppState.currentPage === 'admin') renderApp();

                AppState.proRequests = reqs.filter(r => r.status === 'pending');

            });
            unsubscribes.push(unsubPro);
        }
    }

    window.handleAuthAction = async function(action, event) {
        if(event) event.preventDefault();
        const btn = event ? event.currentTarget.querySelector('button[type="submit"]') : null;
        const originalText = btn ? btn.innerHTML : '';
        if(btn) { btn.innerHTML = '<div class="loader" style="margin: 0 auto;"></div>'; btn.disabled = true; }

        try {
            if (action === 'google') {
                await signInWithPopup(auth, new GoogleAuthProvider());
                showToast('Logged in successfully!');
            } else if (action === 'login') {
                const email = $('login-email').value, pwd = $('login-pwd').value;
                if (!email || !pwd) throw new Error("Please fill all fields");
                await signInWithEmailAndPassword(auth, email, pwd);
                showToast('Welcome back!');
            } else if (action === 'signup') {
                const name = $('signup-name').value, email = $('signup-email').value, pwd = $('signup-pwd').value;
                if (!name || !email || !pwd) throw new Error("Please fill all fields");
                const cred = await createUserWithEmailAndPassword(auth, email, pwd);
                await updateProfile(cred.user, { displayName: name });
                showToast('Account created!');
            } else if (action === 'logout') {
                clearSubscriptions(); await signOut(auth); AppState.user = null;
                showToast('Logged out'); navigate('welcome'); await initAuth();
            }
        } catch (error) {
            showToast(error.message.replace('Firebase: ', ''), 'error');
            if(btn) { btn.innerHTML = originalText; btn.disabled = false; }
        }
    }

    async function checkAndAwardBadges(oldPoints, newPoints) {
        if (!AppState.user) return;
        let awarded = false;
        for (const [key, badge] of Object.entries(BADGES)) {
            if (newPoints >= badge.req && !AppState.user.badges.includes(key)) {
                await updateDoc(getPubDoc('users', AppState.user.uid), { badges: arrayUnion(key) });
                showToast(`New Badge Unlocked: ${badge.name}! 🏆`, 'success');
                awarded = true;
            }
        }
        if(awarded) fireConfetti();
    }

    window.teacherAddContent = async function() {
        const courseId = AppState.selectedCourseForContent, type = AppState.selectedContentType;
        const title = $('tac-title').value, isPremium = $('tac-premium').checked;
        if(!title) return showToast('Title required', 'error');
        
        let contentObj = { id: generateId(), type, title, isPremium, duration: "10 mins" };
        if (type === 'video') contentObj.url = $('tac-url').value || 'https://www.youtube.com/embed/dQw4w9WgXcQ';
        else if (type === 'pdf') contentObj.url = $('tac-pdf').value || '#';
        else if (type === 'note') contentObj.content = $('tac-note').value || 'Empty note.';
        else if (type === 'quiz') {
            const q = $('qb-q').value, o1 = $('qb-o1').value, o2 = $('qb-o2').value, o3 = $('qb-o3').value, o4 = $('qb-o4').value, a = parseInt($('qb-a').value);

        }

        try {
            const ref = getPubDoc('courses', courseId), snap = await getDoc(ref);
            if(snap.exists()) {

                await updateDoc(ref, { syllabus: syl, lessons: syl.length });
                AppState.modals.addContent = false; showToast('Content added!'); renderApp();

    window.renderApp = function() {
        const root = $('app-root'), desktopNav = $('desktop-nav'), mobileNav = $('mobile-nav');
        if (!AppState.authReady) { root.innerHTML = '<div class="flex items-center justify-center h-full"><div class="loader"></div></div>'; return; }

        if (AppState.user?.isPro) document.documentElement.classList.add('pro-theme');
        else document.documentElement.classList.remove('pro-theme');

        const hideNavPages = ['welcome', 'login', 'signup', 'editor', 'quiz'];
        const showNav = AppState.user && !hideNavPages.includes(AppState.currentPage);
        
        if (showNav) {
            desktopNav.style.display = 'flex'; mobileNav.style.display = 'flex';
            desktopNav.innerHTML = renderDesktopSidebar(); mobileNav.innerHTML = renderMobileNav();
        } else {
            desktopNav.style.display = 'none'; mobileNav.style.display = 'none';
        }

        let html = '';
        switch(AppState.currentPage) {
            case 'welcome': html = renderWelcome(); break;
            case 'login': html = renderAuth('login'); break;
            case 'signup': html = renderAuth('signup'); break;
            case 'dashboard': html = AppState.user ? renderDashboard() : renderWelcome(); break;
            case 'courses': html = AppState.user ? renderCourses() : renderWelcome(); break;
            case 'courseDetail': html = AppState.user ? renderCourseDetail() : renderWelcome(); break;
            case 'lesson': html = AppState.user ? renderLesson() : renderWelcome(); break;
            case 'community': html = AppState.user ? renderCommunity() : renderWelcome(); break;
            case 'profile': html = AppState.user ? renderProfile() : renderWelcome(); break;
            case 'admin': html = (AppState.user?.role === 'admin') ? renderAdmin() : renderDashboard(); break;
            case 'teacher': html = (AppState.user?.role === 'teacher' || AppState.user?.role === 'admin') ? renderTeacher() : renderDashboard(); break;
            case 'upgrade': html = AppState.user ? renderUpgrade() : renderWelcome(); break;
            case 'editor': html = renderEditor(); break;
            case 'certificate': html = renderCertificate(); break;
            case 'studentId': html = renderStudentId(); break;
            case 'quiz': html = renderQuiz(); break;
            default: html = renderDashboard();
        }
        
        if (AppState.modals.createCourse) html += renderCreateCourseModal();
        if (AppState.modals.editCourse) html += renderEditCourseModal();
        if (AppState.modals.addContent) html += renderAddContentModal();
        if (AppState.modals.settings) html += renderSettingsModal();
        if (AppState.modals.videoPlayer) html += renderVideoModal();

        root.innerHTML = html;
    }

    function renderCourses() {
        const filteredCourses = AppState.courses.filter(c => 
            c.title.toLowerCase().includes(AppState.searchQuery.toLowerCase()) || 
            (c.description && c.description.toLowerCase().includes(AppState.searchQuery.toLowerCase()))
        );

        return `
        <div class="animate-fade-in w-full max-w-6xl mx-auto p-4 md:p-8 flex flex-col h-full">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2 tracking-tight">Explore Courses</h1>
                    <p class="text-muted">Discover new skills and level up your career.</p>
                </div>
                <div class="relative w-full max-w-md">
                    <i class="ph ph-magnifying-glass absolute text-muted" style="left: 1rem; top: 50%; transform: translateY(-50%);"></i>
                    <input type="text" placeholder="Search courses..." value="${AppState.searchQuery}" oninput="AppState.searchQuery = this.value; renderApp()" class="input" style="padding-left: 2.5rem;">
                </div>
            </div>
            
            ${filteredCourses.length === 0 ? `
                <div class="flex-1 flex flex-col items-center justify-center text-muted" style="opacity: 0.7;">
                    <i class="ph-fill ph-magnifying-glass-minus text-5xl mb-4"></i>
                    <p>No courses found matching "${AppState.searchQuery}"</p>
                </div>
            ` : `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                ${filteredCourses.map((course, index) => {
                    const isUnlocked = AppState.user?.unlockedCourses?.includes(course.id);
                    const isBookmarked = AppState.user?.bookmarks?.includes(course.id);
                    const completedInCourse = (course.syllabus || []).filter(l => AppState.user?.completedLessons?.includes(l.id)).length;
                    const totalLessons = course.syllabus?.length || 0;
                    const progress = totalLessons > 0 ? Math.round((completedInCourse / totalLessons) * 100) : 0;
                    const shape = index % 2 === 0 ? 'shape-a' : 'shape-b';

                    return `
                    <div onclick="navigate('courseDetail', {courseId: '${course.id}'})" class="card ${shape} card-interactive relative" style="padding: 0; display: flex; flex-direction: column; overflow: hidden; cursor: pointer;">
                        
                        <button onclick="toggleBookmark('${course.id}', event)" class="btn-icon absolute z-20" style="top: 0.75rem; left: 0.75rem; background: var(--surface-color);">

                        </button>

                        <div class="relative" style="height: 10rem; background: var(--bg-color); display: flex; align-items: center; justify-content: center; overflow: hidden;">
                            ${course.thumbnail ? `<img src="${course.thumbnail}" alt="${course.title}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center" style="background: var(--primary-light);"><i class="ph-fill ${course.icon || 'ph-book-open'} text-surface-alt" style="font-size: 4rem;"></i></div>`}
                            ${isUnlocked ? '<div class="absolute" style="top: 0.75rem; right: 0.75rem; background: var(--surface-alt); color: var(--success); font-size: 0.75rem; font-weight: bold; padding: 0.25rem 0.5rem; border: 1px solid var(--border-color); border-radius: 0.5rem; display: flex; align-items: center; gap: 0.25rem;"><i class="ph-fill ph-check-circle"></i> Owned</div>' : ''}
                        </div>
                        <div class="p-4 flex flex-col flex-1">
                            <h3 class="font-bold text-lg mb-1 line-clamp-2">${course.title}</h3>
                            <p class="text-xs text-muted uppercase tracking-wider font-bold mb-4">${course.teacherName || 'Instructor'}</p>
                            
                            <div class="mt-auto">
                                ${isUnlocked ? `
                                    <div class="flex justify-between text-xs font-bold mb-1.5"><span class="text-muted">Progress</span><span class="text-primary">${progress}%</span></div>
                                    <div class="progress-bar-bg"><div class="progress-bar-fill progress-bar-primary" style="width: ${progress}%"></div></div>
                                ` : `
                                    <div class="flex justify-between items-center" style="padding-top: 0.75rem; border-top: 1px solid var(--border-color);">
                                        <span class="text-muted text-sm font-medium">${totalLessons} Lessons</span>
                                        <span class="font-bold text-lg text-primary">₹${course.price}</span>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>`
                }).join('')}
            </div>
            `}
        </div>`;
    }

    function renderCourseDetail() {
        const courseId = AppState.currentCourseId;
        const course = AppState.courses.find(c => c.id === courseId);
        if (!course) return renderWelcome();

        const isUnlocked = AppState.user?.unlockedCourses?.includes(courseId);
        const isBookmarked = AppState.user?.bookmarks?.includes(courseId);
        const isPending = AppState.paymentRequests?.some(r => r.courseId === courseId && r.uid === AppState.user?.uid);
        
        const completedInCourse = (course.syllabus || []).filter(l => AppState.user?.completedLessons?.includes(l.id)).length;
        const totalLessons = course.syllabus?.length || 0;
        const progress = totalLessons > 0 ? Math.round((completedInCourse / totalLessons) * 100) : 0;
        
        const reviews = course.reviews || [];
        const avgRating = reviews.length > 0 ? (reviews.reduce((a,b)=>a+b.rating,0)/reviews.length).toFixed(1) : 0;

        return `
        <div class="animate-fade-in w-full h-full flex flex-col">
            <div class="card shape-b" style="background: var(--primary); color: white; margin: 1rem 1rem 2rem 1rem; padding: 3rem 1.5rem; position: relative; overflow: hidden; border: none;">
                ${course.thumbnail ? `<img src="${course.thumbnail}" class="absolute inset-0 w-full h-full object-cover" style="opacity: 0.3;">` : `<div class="absolute inset-0" style="background: var(--primary-light); opacity: 0.1;"></div>`}
                
                <button onclick="navigate('courses')" class="btn-icon absolute z-20" style="top: 1.5rem; left: 1.5rem; background: var(--surface-alt); color: var(--text-main);"><i class="ph-bold ph-arrow-left"></i></button>
                <button onclick="toggleBookmark('${course.id}')" class="btn-icon absolute z-20" style="top: 1.5rem; right: 1.5rem; background: var(--surface-alt); color: ${isBookmarked ? 'var(--danger)' : 'var(--text-main)'};">
                    <i class="${isBookmarked ? 'ph-fill' : 'ph-bold'} ph-bookmark text-lg"></i>
                </button>

                <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center md:items-start gap-6 relative z-10" style="margin-top: 1rem;">
                    ${!course.thumbnail ? `
                    <div class="shape-a" style="width: 8rem; height: 8rem; background: var(--surface-alt); display: flex; align-items: center; justify-content: center; transform: rotate(-5deg); flex-shrink: 0; border: 1px solid var(--border-color);">
                        <i class="ph-fill ${course.icon} text-primary" style="font-size: 4rem;"></i>
                    </div>` : ''}
                    
                    <div class="flex-1 text-center md:text-left w-full">
                        <div class="badge" style="background: var(--secondary); color: var(--primary); margin-bottom: 0.75rem;">${course.teacherName}</div>
                        <h1 class="text-3xl md:text-5xl font-extrabold mb-3 text-white tracking-tight leading-tight">${course.title}</h1>
                        
                        <div class="flex flex-wrap justify-center md:justify-start gap-4 mb-4 text-sm" style="color: rgba(255,255,255,0.8);">
                            <div class="flex items-center gap-1 text-warning"><i class="ph-fill ph-star"></i> <span class="font-bold text-white">${avgRating}</span> (${reviews.length} reviews)</div>
                            <div class="flex items-center gap-1"><i class="ph-fill ph-users"></i> ${course.enrollmentCount || 0} students</div>
                        </div>

                        <p class="text-base md:text-lg mb-6 max-w-2xl font-medium mx-auto md:mx-0" style="color: rgba(255,255,255,0.9); line-height: 1.6;">${course.description}</p>
                        
                        <div class="flex flex-wrap justify-center md:justify-start gap-3 w-full">
                            ${course.promoVideoUrl ? `
                                <button onclick="AppState.currentVideoUrl = '${course.promoVideoUrl}'; AppState.modals.videoPlayer = true; renderApp()" class="btn btn-outline" style="background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.3);">
                                    <i class="ph-fill ph-play-circle text-xl"></i> Watch Trailer
                                </button>
                            ` : ''}
                            ${isUnlocked ? `
                                <div class="card shape-a" style="padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; min-width: 200px;">
                                    <div class="flex-1">
                                        <div class="flex justify-between text-xs font-bold mb-1"><span class="text-muted">Progress</span><span class="text-success">${progress}%</span></div>
                                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${progress}%"></div></div>
                                    </div>
                                </div>
                                <button onclick="navigate('lesson', {lessonId: '${course.syllabus?.[0]?.id}'})" class="btn btn-gradient">Resume</button>
                            ` : isPending ? `
                                <div class="badge badge-warning" style="padding: 0.75rem 1.5rem; font-size: 1rem;"><i class="ph-fill ph-clock text-xl"></i> Verification Pending</div>
                            ` : `
                                <button onclick="navigate('upgrade', {courseId: '${course.id}'})" class="btn btn-gradient" style="font-size: 1.125rem;">
                                    Get Access • ₹${course.price}
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex-1 p-4 md:p-8 relative" style="background: var(--bg-color);">
                <div class="max-w-4xl mx-auto flex flex-col gap-8">
                    
                    <!-- Syllabus -->
                    <div>
                        <h2 class="text-2xl font-bold mb-4">Course Syllabus</h2>
                        <div class="flex flex-col gap-3">
                            ${(course.syllabus || []).length === 0 ? '<p class="text-muted italic">Content is being prepared by the instructor.</p>' : 
                             course.syllabus.map((item, index) => {
                                const isLocked = item.isPremium && !isUnlocked;
                                const isCompleted = AppState.user?.completedLessons?.includes(item.id);
                                const icon = item.type === 'video' ? 'ph-play-circle' : item.type === 'pdf' ? 'ph-file-pdf' : item.type === 'quiz' ? 'ph-exam' : 'ph-article';
                                const shape = index % 2 === 0 ? 'shape-a' : 'shape-b';
                                
                                return `
                                <div onclick="${isLocked ? `Maps('upgrade', {courseId: '${course.id}'})` : `Maps('lesson', {lessonId: '${item.id}'})`}" 
                                     class="card ${shape} card-interactive flex items-center gap-4 p-4" style="cursor: pointer; padding: 1rem; border-color: ${isCompleted ? 'var(--success)' : 'var(--border-color)'}; background: ${isCompleted ? 'var(--surface-color)' : 'var(--surface-alt)'};">
                                    
                                    <div class="btn-icon shrink-0" style="background: ${isCompleted ? 'var(--success)' : isLocked ? 'var(--bg-color)' : 'var(--primary)'}; color: ${isCompleted ? 'white' : isLocked ? 'var(--text-muted)' : 'white'}; border-radius: 50%; border: none;">
                                        ${isCompleted ? '<i class="ph-bold ph-check text-xl"></i>' : isLocked ? '<i class="ph-fill ph-lock-key text-xl"></i>' : `<i class="ph-fill ${icon} text-xl"></i>`}
                                    </div>
                                    
                                    <div class="flex-1 min-w-0">

    function renderLesson() {
        const course = AppState.courses.find(c => c.id === AppState.currentCourseId);
        const lesson = course?.syllabus?.find(l => l.id === AppState.currentLessonId);
        
        if (!lesson) return `<div class="p-8 text-center"><p>Lesson not found.</p><button onclick="navigate('courses')" class="btn btn-outline mt-4">Go back</button></div>`;
        
        const isUnlocked = AppState.user?.unlockedCourses?.includes(course.id);
        if (lesson.isPremium && !isUnlocked) return renderUpgrade();

        const isCompleted = AppState.user?.completedLessons?.includes(lesson.id);

        let contentHtml = '';
        if (lesson.type === 'video') {
            contentHtml = `<div class="shape-b" style="width: 100%; aspect-ratio: 16/9; background: black; overflow: hidden; margin-bottom: 2rem; border: 1px solid var(--border-color);">
                <iframe style="width: 100%; height: 100%; border: none;" src="${lesson.url}" allowfullscreen></iframe>
            </div>`;
        } else if (lesson.type === 'note') {
            contentHtml = `<div class="card shape-a mb-8" style="font-size: 1.125rem; line-height: 1.8;">${lesson.content}</div>`;
        } else if (lesson.type === 'pdf') {
            contentHtml = `<div class="card shape-b mb-8 flex flex-col items-center justify-center text-center" style="padding: 4rem 2rem; background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.2);">
                <i class="ph-fill ph-file-pdf text-danger mb-4" style="font-size: 5rem;"></i>
                <h3 class="font-bold text-xl mb-2">Reference Material</h3>
                <p class="text-muted mb-6 max-w-sm">Download the PDF document to read offline or print.</p>
                <a href="${lesson.url}" target="_blank" class="btn" style="background: var(--danger); color: white;"><i class="ph-bold ph-download-simple"></i> Download PDF</a>
            </div>`;
        } else if (lesson.type === 'quiz') {
            return renderQuiz();
        }

        return `
        <div class="flex flex-col md:flex-row h-full w-full animate-fade-in bg-bg" style="position: absolute; inset: 0; z-index: 60;">
            <div class="flex-1 flex flex-col h-full overflow-hidden" style="border-right: 1px solid var(--border-color);">
                <div style="padding: 1rem; border-bottom: 1px solid var(--border-color); background: var(--surface-color); display: flex; align-items: center; justify-content: space-between; z-index: 10;">
                    <button onclick="navigate('courseDetail')" class="btn-icon"><i class="ph-bold ph-x text-lg"></i></button>
                    <div class="text-sm font-bold text-muted truncate px-4">${course.title}</div>
                    <div style="width: 2.5rem;"></div> 
                </div>

                <div class="flex-1 overflow-y-auto p-4 md:p-8">
                    <div class="max-w-4xl mx-auto w-full">
                        <div class="badge badge-primary mb-4">${lesson.type} &bull; ${lesson.duration}</div>
                        <h1 class="text-3xl md:text-4xl font-bold mb-8">${lesson.title}</h1>
                        
                        ${contentHtml}
                        
                        <div class="flex justify-center pb-8">
                            <button id="btn-mark-complete" onclick="markLessonComplete('${lesson.id}')" 
                                    class="btn ${isCompleted ? '' : 'btn-primary'}" style="width: 100%; max-width: 300px; padding: 1rem; font-size: 1.125rem; ${isCompleted ? 'background: var(--success); color: white; opacity: 0.8;' : ''}"
                                    ${isCompleted ? 'disabled' : ''}>
                                ${isCompleted ? 'Completed <i class="ph-bold ph-check"></i>' : 'Mark as Complete <i class="ph-bold ph-check-circle"></i>'}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Private Notes Panel -->
            <div class="w-full md:w-80 flex flex-col shrink-0" style="height: 400px; border-top: 1px solid var(--border-color); background: var(--surface-color);">
                <style>@media(min-width: 768px){ .md\\:w-80 { width: 20rem; height: auto !important; border-top: none !important; } }</style>
                <div style="padding: 1rem; border-bottom: 1px solid var(--border-color); background: var(--surface-alt); display: flex; align-items: center; gap: 0.5rem;">
                    <i class="ph-fill ph-notepad text-primary"></i> <span class="font-bold text-sm">My Private Notes</span>
                </div>
                <textarea id="lesson-notes" class="flex-1 w-full p-4" style="background: transparent; border: none; resize: none; outline: none; font-size: 0.875rem;" placeholder="Take notes here... They are saved securely in the cloud.">${AppState.currentLessonNotes === 'Loading notes...' ? '' : AppState.currentLessonNotes}</textarea>
                <div style="padding: 0.75rem; border-top: 1px solid var(--border-color); background: var(--surface-alt); display: flex; justify-content: flex-end;">
                    <button id="btn-save-notes" onclick="saveNotes()" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;"><i class="ph-bold ph-floppy-disk"></i> Save</button>
                </div>
            </div>
        </div>`;
    }

            <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
                <div class="flex-1 flex relative" style="background: #1a231b;">
                    <div id="line-numbers" class="font-mono text-sm" style="width: 3rem; background: #1a231b; border-right: 1px solid #2d3c2f; color: #6b7280; text-align: right; padding: 1rem 1rem 1rem 0; line-height: 1.5; user-select: none;">1</div>
                    <textarea id="code-editor-textarea" spellcheck="false" class="flex-1 font-mono text-sm" style="background: transparent; color: #e9ecea; padding: 1rem; outline: none; border: none; resize: none; line-height: 1.5; white-space: pre;" placeholder="function sum(a, b) {\n  // your code here\n}" oninput="updateLineNumbers(this)"></textarea>
                </div>

                <div class="flex flex-col shrink-0 z-10" style="height: 30vh; background: #243026; border-top: 1px solid #2d3c2f; @media(min-width: 768px){ height: 100%; width: 400px; border-top: none; border-left: 1px solid #2d3c2f; }">
                    <div class="flex justify-between items-center" style="padding: 0.5rem 1rem; border-bottom: 1px solid #2d3c2f; background: #1a231b;">
                        <span class="text-xs font-bold uppercase tracking-wider text-muted">Terminal</span>
                        <button onclick="$('console-output').innerHTML=''" class="text-xs text-muted"><i class="ph ph-trash"></i> Clear</button>
                    </div>
                    <div id="console-output" class="flex-1 overflow-y-auto font-mono text-sm flex flex-col gap-1" style="padding: 1rem;">
                        <div style="color: #6b7280;">ProgramPros Test Runner v1.0</div>
                    </div>
                </div>
            </div>
            <style>@media(min-width: 768px){ .md\\:flex-row > div:last-child { height: 100% !important; width: 400px !important; border-top: none !important; border-left: 1px solid #2d3c2f !important; } }</style>
        </div>`;
    }

    function renderQuiz() {
        if (!AppState.quizState.questions || AppState.quizState.questions.length === 0) return `<div class="text-center text-muted p-8">No questions available.</div>`;

        if (AppState.quizState.finished) {
            const passed = (AppState.quizState.score / AppState.quizState.questions.length) >= 0.5;
            return `
            <div class="flex flex-col h-full animate-fade-in items-center justify-center p-8 text-center bg-surface w-full">
                <div class="shape-a" style="width: 6rem; height: 6rem; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; background: ${passed ? 'var(--success)' : 'var(--danger)'}; color: white;">
                    <i class="ph-fill ${passed ? 'ph-check-circle' : 'ph-x-circle'} text-5xl"></i>
                </div>
                <h2 class="text-3xl font-bold mb-2">${passed ? 'Quiz Passed!' : 'Quiz Failed'}</h2>
                <p class="text-muted text-lg mb-8">You scored ${AppState.quizState.score} out of ${AppState.quizState.questions.length}.</p>
                <div class="flex gap-4">
                    <button onclick="navigate('lesson', {lessonId: '${AppState.currentLessonId}'})" class="btn btn-outline">Retry</button>
                    <button onclick="navigate('courseDetail')" class="btn btn-primary">Back to Course</button>
                </div>
            </div>`;
        }

        const q = AppState.quizState.questions[AppState.quizState.index];
        const progress = ((AppState.quizState.index) / AppState.quizState.questions.length) * 100;
        const letters = ['A', 'B', 'C', 'D'];

        return `
        <div class="flex flex-col h-full w-full animate-fade-in bg-surface">
            <div class="flex items-center justify-between p-4 border-b border-border z-10 sticky top-0" style="background: var(--surface-color);">
                <button onclick="navigate('courseDetail')" class="btn-icon"><i class="ph-bold ph-x text-xl"></i></button>
                <div class="flex-1 max-w-md mx-4">
                    <div class="progress-bar-bg"><div class="progress-bar-fill progress-bar-primary" style="width: ${progress}%"></div></div>
                </div>
                <div class="font-bold text-muted text-sm">${AppState.quizState.index + 1} / ${AppState.quizState.questions.length}</div>
            </div>

            <div class="flex-1 flex flex-col p-6 max-w-2xl mx-auto w-full justify-center pb-20">
                <span class="text-sm font-bold text-primary uppercase tracking-wider mb-2">Question ${AppState.quizState.index + 1}</span>
                <h2 class="text-2xl md:text-3xl font-bold mb-8">${q.q}</h2>
                <div class="flex flex-col gap-4">
                    ${q.options.map((opt, i) => `
                        <button onclick="handleQuizAnswer(${i})" class="card shape-${i % 2 === 0 ? 'a' : 'b'} card-interactive flex items-center text-left" style="padding: 1rem; border: 2px solid var(--border-color);">
                            <span class="font-bold text-muted" style="width: 2.5rem; height: 2.5rem; background: var(--bg-color); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; border-radius: 0.5rem; margin-right: 1rem;">${letters[i]}</span> 
                            <span class="text-lg font-medium">${opt}</span>
                        </button>
                    `).join('')}
                </div>
            </div>
        </div>`;
    }

    // --- EDITOR UTILS ---
    window.updateLineNumbers = function(textarea) {
        const lines = textarea.value.split('\n').length;
        const numbersDiv = $('line-numbers');
        if(numbersDiv) {
            numbersDiv.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br/>');
            numbersDiv.scrollTop = textarea.scrollTop;
        }
    }

    window.handleQuizAnswer = function(optionIndex) {
        if (AppState.quizState.finished) return;
        const q = AppState.quizState.questions[AppState.quizState.index];
        if (optionIndex === q.answer) { AppState.quizState.score++; showToast('Correct!', 'success'); } 
        else { showToast('Incorrect!', 'error'); }
        
        if (AppState.quizState.index < AppState.quizState.questions.length - 1) {
            AppState.quizState.index++; renderApp();
        } else {
            AppState.quizState.finished = true; renderApp();
            if (AppState.quizState.score / AppState.quizState.questions.length >= 0.5) markLessonComplete(AppState.currentLessonId, AppState.quizState.score * 10);
            else showToast('Finished. Score too low to pass.', 'info');
        }
    };

    function highlightOutput(text) {
        if (typeof text === 'string') return `<span style="color: #4cb970;">'${text}'</span>`;
        if (typeof text === 'number') return `<span style="color: #f4c03b;">${text}</span>`;
        if (typeof text === 'boolean') return `<span style="color: #8b5cf6;">${text}</span>`;
        if (text === null) return `<span style="color: #8b5cf6;">null</span>`;
        if (text === undefined) return `<span style="color: #8b5cf6;">undefined</span>`;
        if (typeof text === 'object') return `<span style="color: #f4c03b;">${JSON.stringify(text)}</span>`;
        return text;
    }

    window.runCodeWithTests = function() {
        const code = $('code-editor-textarea').value;
        const out = $('console-output');
        out.innerHTML = '<div style="color: var(--secondary); display: flex; align-items: center; gap: 0.5rem;"><i class="ph-bold ph-spinner animate-spin"></i> Running Tests...</div>';
        setTimeout(() => {
            try {
                const originalLog = console.log; let logs = [];
                console.log = (...args) => logs.push(args.map(highlightOutput).join(' '));
                const scriptWrapper = `
                    ${code};
                    if (typeof sum !== 'function') throw new Error("Function 'sum' is not defined.");
                    return { test1: sum(2, 3) === 5, test2: sum(-1, 1) === 0, test3: sum(10, 20) === 30 };
                `;
                const result = new Function(scriptWrapper)();
                let outHtml = logs.length ? logs.map(l => `<div>> ${l}</div>`).join('') : '';
                if(result.test1 && result.test2 && result.test3) {
                    outHtml += `<div style="color: var(--success); margin-top: 0.5rem;">✔ All tests passed!</div>`;
                    markLessonComplete('challenge_sum', 25);
                } else {
                    outHtml += `<div style="color: var(--danger); margin-top: 0.5rem;">✘ Some tests failed. Check your logic.</div>`;
                }
                out.innerHTML = outHtml; console.log = originalLog;
            } catch (error) { out.innerHTML = `<div style="color: var(--danger);">> Error: ${error.message}</div>`; }
        }, 500);
    };

    document.addEventListener('scroll', function(e) {
        if(e.target.id === 'code-editor-textarea') { $('line-numbers').scrollTop = e.target.scrollTop; }
    }, true);

    // --- APP LIFECYCLE ---
    async function initAuth() {
        const initToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        try { if (initToken) await signInWithCustomToken(auth, initToken); else await signInAnonymously(auth); } catch (e) {}
    }

    onAuthStateChanged(auth, async (user) => {
        AppState.authReady = true;
        clearSubscriptions(); 
        if (user && !user.isAnonymous) {
            await initializeUserData(user);
            await seedInitialCourses();
            if (['welcome', 'login', 'signup'].includes(AppState.currentPage)) AppState.currentPage = 'dashboard';
        } else {
            AppState.user = null;
            if (!['welcome', 'login', 'signup'].includes(AppState.currentPage)) AppState.currentPage = 'welcome';
        }
        renderApp();
    });

    initAuth();
</script>
</body>
</html>
