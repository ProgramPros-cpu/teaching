        tailwind.config = {
            darkMode: 'class',

                extend: {

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        #mobile-container { width: 100%; height: 100vh; overflow: hidden; position: relative; background-color: #f8fafc; }
        .dark #mobile-container { background-color: #0f172a; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .confetti-piece { position: absolute; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
        
        .cursor-blink { animation: blink 1s step-end infinite; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0; } }

        .pro-card {
            --white: hsl(0, 0%, 100%);
            --black: hsl(240, 15%, 9%);
            --paragraph: hsl(0, 0%, 83%);
            --line: hsl(240, 9%, 17%);
            --primary: hsl(266, 92%, 58%);
            position: relative; display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; width: 100%; max-width: 22rem;
            background-color: hsla(240, 15%, 9%, 1);
            background-image: radial-gradient(at 88% 40%, hsla(240, 15%, 9%, 1) 0px, transparent 85%), radial-gradient(at 49% 30%, hsla(240, 15%, 9%, 1) 0px, transparent 85%), radial-gradient(at 14% 26%, hsla(240, 15%, 9%, 1) 0px, transparent 85%), radial-gradient(at 0% 64%, hsla(263, 93%, 56%, 1) 0px, transparent 85%), radial-gradient(at 41% 94%, hsla(284, 100%, 84%, 1) 0px, transparent 85%), radial-gradient(at 100% 99%, hsla(306, 100%, 57%, 1) 0px, transparent 85%);
            border-radius: 1rem; box-shadow: 0px -16px 24px 0px rgba(255, 255, 255, 0.25) inset; margin: 0 auto;
        }
        .pro-card .card__border { overflow: hidden; pointer-events: none; position: absolute; z-index: -10; top: 50%; left: 50%; transform: translate(-50%, -50%); width: calc(100% + 2px); height: calc(100% + 2px); background-image: linear-gradient(0deg, hsl(0, 0%, 100%) -50%, hsl(0, 0%, 40%) 100%); border-radius: 1rem; }
        .pro-card .card__border::before { content: ""; pointer-events: none; position: fixed; z-index: 200; top: 50%; left: 50%; transform: translate(-50%, -50%), rotate(0deg); transform-origin: left; width: 200%; height: 10rem; background-image: linear-gradient(0deg, hsla(0, 0%, 100%, 0) 0%, hsl(277, 95%, 60%) 40%, hsl(277, 95%, 60%) 60%, hsla(0, 0%, 40%, 0) 100%); animation: rotate 8s linear infinite; }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .pro-card .card_title__container .card_title { font-size: 1.5rem; font-weight: bold; color: var(--white); }
        .pro-card .card_title__container .card_paragraph { margin-top: 0.25rem; font-size: 0.8rem; color: var(--paragraph); }
        .pro-card .line { width: 100%; height: 0.1rem; background-color: var(--line); border: none; }
        .pro-card .card__list { display: flex; flex-direction: column; gap: 0.75rem; }
        .pro-card .card__list .card__list_item { display: flex; align-items: center; gap: 0.75rem; }
        .pro-card .card__list .card__list_item .check { display: flex; justify-content: center; align-items: center; width: 1.25rem; height: 1.25rem; background-color: var(--primary); border-radius: 50%; }
        .pro-card .card__list .card__list_item .check .check_svg { width: 0.85rem; height: 0.85rem; fill: var(--black); }
        .pro-card .card__list .card__list_item .list_text { font-size: 0.9rem; color: var(--white); }
        .pro-card .pro-button { cursor: pointer; padding: 0.8rem; width: 100%; background-image: linear-gradient(0deg, rgba(94, 58, 238, 1) 0%, rgba(197, 107, 240, 1) 100%); font-size: 1rem; font-weight: bold; color: var(--white); border: 0; border-radius: 9999px; box-shadow: inset 0 -2px 25px -4px var(--white); transition: transform 0.2s; }
        .pro-card .pro-button:active { transform: scale(0.95); }
    </style>
</head>

                    { id: 'l3', title: 'Advanced OOP Concepts', type: 'video', duration: '25 mins', isPremium: true, url: 'https://www.youtube.com/embed/JeznW_7DlB0' },

            { id: 'c2', title: 'JavaScript Mastery', icon: 'ph-file-js', color: 'text-yellow-500', bg: 'bg-yellow-100 dark:bg-yellow-900/30', progress: 10, lessons: 20, price: 349, syllabus: [
                { id: 'l21', title: 'JS Basics', type: 'video', duration: '15 mins', isPremium: false, url: 'https://www.youtube.com/embed/W6NZfCO5SIk' },
                { id: 'l22', title: 'React Integration', type: 'video', duration: '30 mins', isPremium: true, url: '' }
            ] },
            { id: 'c3', title: 'HTML & CSS UI Design', icon: 'ph-file-html', color: 'text-orange-500', bg: 'bg-orange-100 dark:bg-orange-900/30', progress: 100, lessons: 8, price: 199, syllabus: [
                { id: 'l31', title: 'HTML5 Semantics', type: 'note', duration: '5 mins', isPremium: false, content: 'HTML5 introduces structural tags...' },
                { id: 'l32', title: 'CSS Flexbox & Grid', type: 'video', duration: '40 mins', isPremium: true, url: '' }
            ] }
        ],
        challenges: [
            { id: 1, title: 'Reverse a String', level: 'Easy', pts: 10, completed: true },
            { id: 2, title: 'Find the Factorial', level: 'Medium', pts: 20, completed: false },
            { id: 3, title: 'Binary Tree Inversion', level: 'Hard', pts: 50, completed: false }
        ],
        achievements: [
            { icon: 'ph-fire', title: '7 Day Streak', desc: 'Learned for 7 days straight', earned: true },
            { icon: 'ph-medal', title: 'JS Beginner', desc: 'Completed 5 JS lessons', earned: true },
            { icon: 'ph-trophy', title: 'Challenge Master', desc: 'Solve 10 Hard challenges', earned: false }
        ]
    };

    const $ = id => document.getElementById(id);
    
    window.getAllCourses = function() {
        return [...MockData.courses, ...AppState.dynamicCourses];
    }

    window.showToast = function(message, type = 'success') {
        const toast = document.createElement('div');
        const icon = type === 'success' ? '<i class="ph ph-check-circle text-xl text-green-500"></i>' : '<i class="ph ph-info text-xl text-blue-500"></i>';
        toast.className = `toast animate-slide-up flex items-center gap-3 p-4 rounded-xl shadow-lg bg-white dark:bg-darkCard border-l-4 ${type === 'success' ? 'border-green-500' : 'border-blue-500'}`;
        toast.innerHTML = `${icon} <span class="font-medium text-sm text-gray-800 dark:text-gray-200">${message}</span>`;
        $('toast-container').appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    window.togglePassword = function(inputId, btn) {
        const input = $(inputId); const icon = btn.querySelector('i');
        if (input.type === 'password') { input.type = 'text'; icon.classList.replace('ph-eye', 'ph-eye-slash'); } 
        else { input.type = 'password'; icon.classList.replace('ph-eye-slash', 'ph-eye'); }
    }

    window.handleEnter = function(e, actionFn) { if (e.key === 'Enter') { e.preventDefault(); actionFn(); } }

    window.fireConfetti = function() {
        const colors = ['#4F46E5', '#9333EA', '#10B981', '#F59E0B', '#EF4444', '#3B82F6'];
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-piece';
            confetti.style.left = Math.random() * 100 + 'vw'; confetti.style.top = '-20px';
            confetti.style.width = Math.random() * 8 + 6 + 'px'; confetti.style.height = Math.random() * 8 + 6 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            $('mobile-container').appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }
    }

    window.toggleTheme = function() {
        const html = document.documentElement;
        if (html.classList.contains('dark')) { html.classList.remove('dark'); AppState.theme = 'light'; } 
        else { html.classList.add('dark'); AppState.theme = 'dark'; }
        renderApp();
    }

    window.navigate = function(page, params = {}) {
        AppState.currentPage = page;
        if (params.courseId) AppState.currentCourseId = params.courseId;
        if (params.lessonId) AppState.currentLessonId = params.lessonId;
        AppState.isPostModalOpen = false;
        
        if (page === 'login') AppState.authMode = 'email';
        if (page === 'signup') { AppState.signupStep = 1; AppState.signupContact = ''; }
        if (page === 'courseBuilder') {
            AppState.editingCourse = { id: 'crs_' + Date.now(), title: '', price: 99, icon: 'ph-book', color: 'text-indigo-500', bg: 'bg-indigo-100 dark:bg-indigo-900/30', progress: 0, syllabus: [] };
        }
        
        if (window.recaptchaVerifier) { try { window.recaptchaVerifier.clear(); } catch(e){} window.recaptchaVerifier = null; }
        renderApp(); $('app-root').scrollTo(0,0);
    }

    window.logout = async function() {
        if (auth) await signOut(auth);
        AppState.user = null; showToast('Logged out securely.', 'info'); navigate('welcome');
    }

    window.mockLogin = function() {
        showToast('Demo Mode: Logging in...', 'info');
        setTimeout(() => { 
            AppState.user = { uid: 'mock-123', name: 'Alex Developer', email: 'alex@example.com', avatar: 'https://i.pravatar.cc/150?img=11', studentId: 'PP-2026-8942', joinDate: 'Jan 2026', level: 12, points: 1450, unlockedCourses: [], pendingCourses: [], isAdmin: false, isTeacher: false, isPro: false };
            navigate('dashboard'); 
        }, 800);
    }

    // --- AUTHENTICATION LOGIC ---
    window.handleGoogleLogin = async function(event) {
        const btn = event.currentTarget; const originalContent = btn.innerHTML;
        btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i>'; btn.disabled = true;
        try {
            await signInWithPopup(auth, new GoogleAuthProvider());
            showToast('Logged in with Google!', 'success'); navigate('dashboard'); 
        } catch (error) {
            if (error.code === 'auth/popup-closed-by-user' || error.message.includes('cross-origin')) {
                showToast('Popup blocked by browser. Using demo login...', 'info'); mockLogin();
            } else {
                showToast(error.message.replace('Firebase: ', ''), 'error'); btn.innerHTML = originalContent; btn.disabled = false;
            }
        }
    }

    window.handleLogin = async function() {
        const email = $('login-email').value; const pwd = $('login-pwd').value;
        if (!email || !pwd) return showToast('Please fill all fields', 'error');
        const btn = $('btn-login'); btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; btn.disabled = true;
        try {
            await signInWithEmailAndPassword(auth, email, pwd);
            showToast('Logged in successfully!', 'success'); navigate('dashboard'); 
        } catch (error) {
            showToast('Invalid email or password.', 'error'); btn.innerHTML = 'Log In'; btn.disabled = false;
        }
    }

    // --- SIGNUP WIZARD LOGIC ---
    window.processSignupStep1 = async function() {
        const contact = $('signup-contact').value.trim();
        if (!contact) return showToast('Please enter an Email or Mobile Number', 'error');
        const btn = $('btn-signup-1'); btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; btn.disabled = true;
        const isPhone = /^\+?[0-9\s\-]{7,15}$/.test(contact);
        AppState.signupType = isPhone ? 'phone' : 'email'; AppState.signupContact = contact;

        if (isPhone) {
            let phone = contact.startsWith('+') ? contact : '+91' + contact; 
            try {
                if (!window.recaptchaVerifier) window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container-signup', { 'size': 'invisible' });
                window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                showToast('OTP sent via SMS!', 'success'); AppState.signupStep = 2; renderApp();
            } catch (e) {
                showToast(e.message.replace('Firebase: ', ''), 'error'); btn.innerHTML = 'Send OTP'; btn.disabled = false;
            }
        } else {
            showToast('Demo Mode: Email OTP sent! Use 123456.', 'info');
            setTimeout(() => { AppState.signupStep = 2; renderApp(); }, 1000);
        }
    }

    window.processSignupStep2 = async function() {
        const otp = $('signup-otp').value.trim();
        if (!otp) return showToast('Enter OTP', 'error');
        const btn = $('btn-signup-2'); btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; btn.disabled = true;

        if (AppState.signupType === 'phone') {
            try { await window.confirmationResult.confirm(otp); AppState.signupStep = 3; renderApp(); } 
            catch (e) { showToast('Invalid OTP entered', 'error'); btn.innerHTML = 'Verify OTP'; btn.disabled = false; }
        } else {
            if (otp === '123456') { AppState.signupStep = 3; renderApp(); } 
            else { showToast('Invalid OTP. Use 123456 for demo.', 'error'); btn.innerHTML = 'Verify OTP'; btn.disabled = false; }
        }
    }

    window.processSignupStep3 = async function() {
        const name = $('signup-name').value.trim(); const pwd = $('signup-pwd').value;
        const email = AppState.signupType === 'email' ? AppState.signupContact : $('signup-extra-email').value.trim();
        if (!name || !pwd || !email) return showToast('Please fill all fields', 'error');

        const btn = $('btn-signup-3'); btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; btn.disabled = true;
        try {
            if (AppState.signupType === 'phone') {
                await linkWithCredential(auth.currentUser, EmailAuthProvider.credential(email, pwd));
                await updateProfile(auth.currentUser, { displayName: name });
            } else {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
                await updateProfile(userCredential.user, { displayName: name });
            }
            showToast('Account created successfully!', 'success'); navigate('dashboard'); 
        } catch (e) {
            showToast(e.message.replace('Firebase: ', ''), 'error'); btn.innerHTML = 'Complete Sign Up'; btn.disabled = false;
        }
    }

    window.switchAuthMode = function(mode) {
        AppState.authMode = mode;
        if (window.recaptchaVerifier) { try { window.recaptchaVerifier.clear(); } catch(e){} window.recaptchaVerifier = null; }
        renderApp();
    }

    window.sendAuthOTP = async function() {
        const phone = $('auth-phone').value.trim();
        if (!phone.startsWith('+')) return showToast('Include country code (e.g., +91)', 'error');
        try {
            if (!window.recaptchaVerifier) window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            $('btn-auth-send').innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; $('btn-auth-send').disabled = true;
            window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
            showToast('OTP sent via SMS!', 'success');
            $('btn-auth-send').innerHTML = '<i class="ph ph-check"></i> Sent'; $('auth-otp-section').style.display = 'block'; $('auth-phone').disabled = true;
        } catch (error) {
            showToast(error.message.replace('Firebase: ', ''), 'error'); $('btn-auth-send').innerHTML = 'Send OTP'; $('btn-auth-send').disabled = false;
        }
    }

    window.verifyAuthOTP = async function() {
        const otp = $('auth-otp').value.trim();
        if (!otp) return showToast('Enter OTP', 'error');
        try {
            $('btn-auth-verify').innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; $('btn-auth-verify').disabled = true;
            await window.confirmationResult.confirm(otp);
            showToast('Logged in successfully!', 'success'); navigate('dashboard'); 
        } catch (error) {
            showToast('Invalid OTP entered.', 'error'); $('btn-auth-verify').innerHTML = 'Log In'; $('btn-auth-verify').disabled = false;
        }
    }

    // --- COMMUNITY POST LOGIC ---
    window.togglePostModal = function() { AppState.isPostModalOpen = !AppState.isPostModalOpen; renderApp(); }

    window.submitNewPost = async function() {
        const text = $('new-post-text').value.trim();
        if(!text) return showToast('Post cannot be empty', 'error');
        $('btn-submit-post').innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; $('btn-submit-post').disabled = true;
        const newPost = { user: AppState.user.name, avatar: AppState.user.avatar, time: Date.now(), text: text, uid: AppState.user.uid };
        try {
            if(db) { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'forum_posts'), newPost); } 
            else { AppState.forumPosts.unshift(newPost); }
            showToast('Posted successfully!', 'success'); AppState.isPostModalOpen = false; renderApp();
        } catch(e) {
            showToast('Failed to post', 'error'); $('btn-submit-post').innerHTML = 'Post'; $('btn-submit-post').disabled = false;
        }
    }

    // --- FIREBASE DATA SYNC ---
    async function initializeUserData(uid, firebaseUser) {
        if (!db) return;
        const userRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'main');
        const userSnap = await getDoc(userRef);
        const email = firebaseUser.email || 'student@example.com';
        
        const isJoyAdmin = email.toLowerCase() === 'joykumbhakar101@gmail.com';
        
        if (!userSnap.exists()) {
            await setDoc(userRef, {
                name: firebaseUser.displayName || 'Student ' + uid.substring(0, 4).toUpperCase(),
                email: email, phone: firebaseUser.phoneNumber || '',
                avatar: firebaseUser.photoURL || ('https://ui-avatars.com/api/?name=' + encodeURIComponent(firebaseUser.displayName || 'Student') + '&background=random'),
                studentId: 'PP-' + Math.floor(Math.random() * 90000 + 10000),
                joinDate: new Date().toLocaleDateString('en-US', { month: 'short', year: 'numeric' }),
                level: 1, points: 0, unlockedCourses: [], pendingCourses: [],
                isAdmin: isJoyAdmin, isTeacher: false, isPro: isJoyAdmin
            });
        } else {
            let updates = {};
            if (firebaseUser.phoneNumber && !userSnap.data().phone) updates.phone = firebaseUser.phoneNumber;
            if (isJoyAdmin && !userSnap.data().isAdmin) { updates.isAdmin = true; updates.isPro = true; }
            if (Object.keys(updates).length > 0) await updateDoc(userRef, updates);
        }

        onSnapshot(userRef, (doc) => {
            if (doc.exists()) {
                AppState.user = { uid, ...doc.data() };
                if (!AppState.user.unlockedCourses) AppState.user.unlockedCourses = [];
                if (!AppState.user.pendingCourses) AppState.user.pendingCourses = [];
                if (['dashboard', 'profile', 'community', 'courses', 'challenges', 'courseDetail', 'upgrade', 'settings', 'admin', 'teacherDashboard'].includes(AppState.currentPage)) renderApp();
            }
        });
    }

    function listenToDynamicData() {
        if (!db) return;
        // Listen for Forum Posts
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'forum_posts'), (snapshot) => {
            let posts = []; snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
            posts.sort((a, b) => b.time - a.time); AppState.forumPosts = posts;
            if (AppState.currentPage === 'community') renderApp();
        });
        
        // Listen for Dynamic Courses added by Teachers
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'courses'), (snapshot) => {
            let dynamicCourses = []; snapshot.forEach(doc => dynamicCourses.push({ dbId: doc.id, ...doc.data() }));
            AppState.dynamicCourses = dynamicCourses;
            if (['dashboard', 'courses', 'courseDetail', 'teacherDashboard'].includes(AppState.currentPage)) renderApp();
        });

        // Listen for Student Scores (For Teachers)
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'student_scores'), (snapshot) => {
            let scores = []; snapshot.forEach(doc => scores.push({ id: doc.id, ...doc.data() }));
            scores.sort((a, b) => b.date - a.date); AppState.studentScores = scores;
            if (AppState.currentPage === 'studentAnalytics') renderApp();
        });
    }

    function hasCourseAccess(courseId) {
        if (!AppState.user) return false;
        if (AppState.user.isAdmin || AppState.user.isPro || AppState.user.isTeacher) return true;
        return AppState.user.unlockedCourses.includes(courseId);

    window.notifyAdminPayment = async function(courseId, courseName) {
        const btn = $('pay-button');
        if (btn) { btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Submitting...'; btn.disabled = true; }
        try {
            if (db && AppState.user) {
                await updateDoc(doc(db, 'artifacts', appId, 'users', AppState.user.uid, 'profile', 'main'), { pendingCourses: arrayUnion(courseId) });
            } else {
                AppState.user.pendingCourses.push(courseId);
            }
            showToast(`Request sent! Verification pending.`, 'success');
            navigate('courseDetail', { courseId: courseId });
        } catch (e) {
            showToast('Error submitting request.', 'error');
            if (btn) { btn.innerHTML = 'I have paid <i class="ph-fill ph-check-circle"></i>'; btn.disabled = false; }
        }
    }

                    <div class="px-4 py-3 border-b border-gray-800 flex justify-between items-center bg-gray-900/50"><span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Console Output</span><button onclick="$('console-output').innerHTML='<span class=\\'text-gray-600 italic\\'>Output cleared...</span><span class=\\'cursor-blink text-gray-400 ml-1\\'>_</span>'" class="text-gray-500 hover:text-white p-1 hover:bg-gray-800 rounded transition-colors"><i class="ph ph-trash"></i></button></div>
                    <div class="flex-1 p-4 overflow-y-auto font-mono text-sm" id="console-output"><span class="text-gray-600 italic">Ready for execution...</span><span class="cursor-blink text-gray-400 ml-1">_</span></div>
                </div>
            </div>
            <button onclick="finishQuiz(100)" class="absolute bottom-6 md:bottom-10 right-6 md:right-10 w-14 h-14 md:w-16 md:h-16 bg-primary text-white rounded-full shadow-2xl shadow-primary/50 flex items-center justify-center text-2xl hover:scale-105 active:scale-95 transition-all z-50"><i class="ph ph-check-fat"></i></button>

    window.runCode = function() {
        const code = $('code-editor-textarea').value; const out = $('console-output'); const runBtn = $('run-btn');
        out.innerHTML = '<div class="flex items-center gap-2 text-blue-400"><i class="ph ph-spinner animate-spin text-xl"></i> Executing...</div>';
        runBtn.disabled = true; runBtn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Running'; runBtn.classList.add('opacity-75');
        setTimeout(() => {
            out.innerHTML = ''; runBtn.disabled = false; runBtn.innerHTML = '<i class="ph-fill ph-play"></i> Run'; runBtn.classList.remove('opacity-75');
            const originalLog = console.log; let logs = [];
            console.log = (...args) => { logs.push(args.join(' ')); originalLog(...args); };
            try {
                eval(code);
                if (logs.length > 0) out.innerHTML = logs.map(l => `<div class="text-green-400">> ${l}</div>`).join('') + '<span class="cursor-blink text-gray-400 ml-1">_</span>';
                else out.innerHTML = `<div class="text-gray-400 italic">Code executed successfully (No output)</div><span class="cursor-blink text-gray-400 ml-1">_</span>`;
            } catch (error) { out.innerHTML = `<div class="text-red-500 font-bold">> Error: ${error.message}</div><span class="cursor-blink text-gray-400 ml-1">_</span>`; } 
            finally { console.log = originalLog; }
        }, 800);
    }

    window.finishQuiz = async function(score) {
        if(AppState.user && db) {

            await updateDoc(userRef, { points: AppState.user.points + score });
            
            // Record to Public Analytics for Teachers
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'student_scores'), {
                studentName: AppState.user.name,
                studentId: AppState.user.studentId,
                courseId: AppState.currentCourseId || 'Global Task',
                lessonId: AppState.currentLessonId || 'General Code',

    window.addSyllabusItem = function(type) {
        let title = prompt(`Enter Title for this ${type.toUpperCase()}:`);
        if (!title) return;
        let isPremium = confirm('Is this a PREMIUM (Paid) lesson?\n\nClick OK for Premium.\nClick Cancel for Free.');
        let item = { id: 'l_' + Date.now(), title, type, isPremium, duration: '10 mins' };
        
        if (type === 'video') item.url = prompt('Enter YouTube Embed URL:\n(e.g., https://www.youtube.com/embed/...)') || '';
        else if (type === 'note') item.content = prompt('Enter HTML text content:') || '<p>New notes</p>';
        else if (type === 'pdf') { item.url = prompt('Enter PDF Link URL:') || '#'; item.duration = prompt('File Size (e.g., 2 MB):') || '1 MB'; }
        else if (type === 'quiz') item.duration = prompt('Number of questions:') || '10 Qs';

        AppState.editingCourse.syllabus.push(item);
        renderApp();
    }

    window.saveCourseToDB = async function() {
        const c = AppState.editingCourse;
        if (!c.title) return showToast('Course title is required!', 'error');
        if (!db) return showToast('Database unavailable', 'error');

        try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', c.id), c);
            showToast('Course Published to live database!', 'success');
            navigate('teacherDashboard');
        } catch(e) { showToast(e.message, 'error'); }
    }

                                    <th class="py-3 px-4 font-bold">Course ID</th>
                                    <th class="py-3 px-4 font-bold text-right">Score</th>

    // Include rendering for settings, navigation, empty shells exactly as context
    // Re-use rendering shells omitted above logically
    function renderSearch() { return `<div class="p-6 text-center mt-20"><h1 class="text-2xl font-bold">Search</h1><button onclick="navigate('dashboard')" class="mt-4 text-primary underline">Back</button></div>`; }
    function renderNotifications() { return `<div class="p-6 text-center mt-20"><h1 class="text-2xl font-bold">Notifications</h1><button onclick="navigate('dashboard')" class="mt-4 text-primary underline">Back</button></div>`; }
    function renderAchievements() { return `<div class="p-6 text-center mt-20"><h1 class="text-2xl font-bold">Achievements</h1><button onclick="navigate('profile')" class="mt-4 text-primary underline">Back</button></div>`; }

    // --- INITIALIZATION ---
    async function startApp() {
        renderApp();
        if (auth) {
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                } catch(e) { showToast("Proceeding offline.", 'info'); }
            };
            await initAuth();

            onAuthStateChanged(auth, async (user) => {
                AppState.authReady = true;
                if (user) {
                    await initializeUserData(user.uid, user);
                    listenToDynamicData(); // Start listening to Courses, Posts, and Scores
                    if (AppState.currentPage === 'signup') return;
                    if (['login', 'welcome'].includes(AppState.currentPage)) navigate('dashboard');
                } else {
                    AppState.user = null;
                }
            });
        }
    }

    startApp();
</script>
