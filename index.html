<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <title>ProgramPros - Learn to Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    },
                    colors: {
                        primary: 'var(--color-primary, #4F46E5)',
                        primaryHover: 'var(--color-primary-hover, #4338CA)',
                        secondary: 'var(--color-secondary, #9333EA)',
                        darkBg: '#0B1120',
                        darkCard: '#1E293B',
                        darkBorder: '#334155'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'slide-in-right': 'slideInRight 0.3s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideInRight: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Safe Area Padding & Dynamic Viewport for Modern Mobile Devices */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 0.5rem); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .h-screen-safe { height: 100vh; height: 100dvh; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box;}
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; border: 2px solid transparent; background-clip: padding-box;}
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .gradient-text {
            background: linear-gradient(135deg, #4F46E5, #9333EA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5, #9333EA); }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        #code-editor-textarea {
            tab-size: 4;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
            caret-color: #4F46E5;
        }
        
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; pointer-events: none; display: flex; flex-direction: column; gap: 8px; }
        .toast { pointer-events: auto; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        
        .confetti-piece { position: absolute; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        /* Loader */
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #4F46E5; width: 24px; height: 24px; -webkit-animation: spin 1s linear infinite; animation: spin 1s linear infinite; }
        .dark .loader { border: 3px solid #334155; border-top: 3px solid #818cf8; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-gray-800 dark:text-gray-100 transition-colors duration-300 font-sans antialiased overflow-hidden selection:bg-primary/30 selection:text-primary dark:selection:text-white pt-safe">

<div id="app-container" class="flex flex-col md:flex-row h-screen-safe w-full relative">    
    <!-- Sidebar / Bottom Nav (Injected via JS) -->
    <nav id="navigation-bar" class="hidden md:flex flex-col w-20 lg:w-64 bg-white dark:bg-darkCard border-r border-gray-200 dark:border-darkBorder h-full z-40 transition-all duration-300 shrink-0"></nav>
    <nav id="mobile-bottom-nav" class="md:hidden hidden fixed bottom-0 w-full bg-white/90 dark:bg-darkCard/90 backdrop-blur-xl border-t border-gray-200 dark:border-darkBorder z-50 px-2 pb-safe pt-2 flex-row justify-around items-center shadow-[0_-4px_25px_rgba(0,0,0,0.05)] dark:shadow-[0_-4px_25px_rgba(0,0,0,0.2)]"></nav>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col relative h-full w-full min-w-0">
        <main id="app-root" class="flex-1 overflow-y-auto overflow-x-hidden relative w-full h-full bg-gray-50 dark:bg-darkBg pb-24 md:pb-0 scroll-smooth"></main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, addDoc, arrayUnion, query, getDocs, deleteDoc, orderBy, serverTimestamp, arrayRemove, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- FIREBASE INITIALIZATION & RULES ---
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'programpros-v3-app';
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyCgJvSkhGL-zJ0pXYrXt43z7LZB-CfOI48",
        authDomain: "font-changer-4667c.firebaseapp.com",
        projectId: "font-changer-4667c",
        storageBucket: "font-changer-4667c.firebasestorage.app",
        messagingSenderId: "200130160747",
        appId: "1:200130160747:web:747975551ddb296dc2a92e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Rule 1: Strict Paths Helpers
    const getPubCol = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
    const getPubDoc = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);
    const getPrivCol = (uid, colName) => collection(db, 'artifacts', appId, 'users', uid, colName);
    const getPrivDoc = (uid, colName, docId) => doc(db, 'artifacts', appId, 'users', uid, colName, docId);

    // --- APP STATE ---
    window.AppState = {
        currentPage: 'welcome',
        user: null, 
        authReady: false,
        theme: localStorage.getItem('theme') || 'light',
        courses: [],
        communityPosts: [],
        paymentRequests: [],
        teacherRequests: [],
        proRequests: [],
        leaderboard: [],
        searchQuery: '',
        currentCourseId: null,
        currentLessonId: null,
        currentLessonNotes: '', // Track notes state locally
        modals: {
            createCourse: false,
            addContent: false,
            settings: false,
            editCourse: false,
            videoPlayer: false
        },
        selectedCourseForContent: null,
        selectedCourseToEdit: null,
        currentVideoUrl: null,
        selectedContentType: 'video'
    };

    const BADGES = {
        'beginner': { icon: 'ph-seedling', name: 'Seedling', color: 'text-green-500', bg: 'bg-green-100 dark:bg-green-900/30', req: 50 },
        'scholar': { icon: 'ph-student', name: 'Scholar', color: 'text-blue-500', bg: 'bg-blue-100 dark:bg-blue-900/30', req: 150 },
        'master': { icon: 'ph-crown', name: 'Master', color: 'text-yellow-500', bg: 'bg-yellow-100 dark:bg-yellow-900/30', req: 300 }
    };

    // --- UTILITIES ---
    const $ = id => document.getElementById(id);
    
    window.showToast = function(message, type = 'success') {
        const container = $('toast-container');
        const toast = document.createElement('div');
        const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-green-500 text-xl"></i>' : 
                     type === 'error' ? '<i class="ph-fill ph-warning-circle text-red-500 text-xl"></i>' : 
                     '<i class="ph-fill ph-info text-blue-500 text-xl"></i>';
        
        toast.className = `toast translate-y-10 opacity-0 flex items-center gap-3 p-4 rounded-xl shadow-lg border glass-panel ${
            type === 'success' ? 'border-green-500/30' : type === 'error' ? 'border-red-500/30' : 'border-blue-500/30'
        }`;
        toast.innerHTML = `${icon} <span class="font-medium text-sm">${message}</span>`;
        
        container.appendChild(toast);
        
        requestAnimationFrame(() => {
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
        });

        setTimeout(() => {
            toast.classList.remove('translate-y-0', 'opacity-100');
            toast.classList.add('translate-y-10', 'opacity-0');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    window.toggleTheme = function() {
        const html = document.documentElement;
        html.classList.toggle('dark');
        AppState.theme = html.classList.contains('dark') ? 'dark' : 'light';
        localStorage.setItem('theme', AppState.theme);
        renderApp();
    }

    if (AppState.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        AppState.theme = 'dark';
    }

    window.navigate = function(page, params = {}) {
        AppState.currentPage = page;
        if (params.courseId) AppState.currentCourseId = params.courseId;
        if (params.lessonId) {
            AppState.currentLessonId = params.lessonId;
            loadPrivateNotes(params.lessonId);
        }
        
        AppState.modals.createCourse = false;
        AppState.modals.addContent = false;
        AppState.modals.settings = false;
        AppState.modals.editCourse = false;
        AppState.modals.videoPlayer = false;
        
        renderApp();
        $('app-root').scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.togglePassword = function(inputId, btn) {
        const input = $(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('ph-eye', 'ph-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('ph-eye-slash', 'ph-eye');
        }
    }

    window.fireConfetti = function() {
        const colors = ['#4F46E5', '#9333EA', '#10B981', '#F59E0B', '#EF4444', '#3B82F6'];
        const container = $('app-root');
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-piece';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = (container.scrollTop - 20) + 'px';
            confetti.style.width = Math.random() * 8 + 6 + 'px';
            confetti.style.height = Math.random() * 8 + 6 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            container.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }
    }

    function generateId() { return Math.random().toString(36).substring(2, 15); }

    // --- DATA FETCHING & SYNC ---
    let unsubscribes = [];

    function clearSubscriptions() {
        unsubscribes.forEach(unsub => unsub());
        unsubscribes = [];
    }

    async function initializeUserData(authUser) {
        if (!authUser) return;
        
        const uid = authUser.uid;
        const isAdminEmail = authUser.email === 'joykumbhakar101@gmail.com';
        const userRef = getPubDoc('users', uid); 

        try {
            const docSnap = await getDoc(userRef);
            
            if (!docSnap.exists()) {
                const newProfile = {
                    uid: uid,
                    name: authUser.displayName || 'Learner ' + uid.substring(0, 4),
                    email: authUser.email || '',
                    avatar: authUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(authUser.displayName || 'User')}&background=4F46E5&color=fff`,
                    studentId: 'PP-' + Math.floor(Math.random() * 90000 + 10000),
                    joinDate: new Date().toLocaleDateString('en-US', { month: 'short', year: 'numeric' }),
                    level: 1,
                    points: 0,
                    unlockedCourses: [],
                    completedLessons: [], 
                    bookmarks: [],
                    badges: [],
                    isPro: false,
                    role: isAdminEmail ? 'admin' : 'student'
                };
                await setDoc(userRef, newProfile);
                AppState.user = newProfile;
            } else {
                let data = docSnap.data();
                if (isAdminEmail && data.role !== 'admin') {
                    await updateDoc(userRef, { role: 'admin' });
                    data.role = 'admin';
                }
                // Ensure new fields exist for legacy users
                if (!data.bookmarks) data.bookmarks = [];
                if (!data.badges) data.badges = [];
                AppState.user = data;
            }

            const unsubUser = onSnapshot(userRef, (doc) => {
                if (doc.exists()) {
                    const oldPoints = AppState.user?.points || 0;
                    AppState.user = doc.data();
                    if (!AppState.user.bookmarks) AppState.user.bookmarks = [];
                    if (!AppState.user.badges) AppState.user.badges = [];
                    
                    checkAndAwardBadges(oldPoints, AppState.user.points || 0);

                    if (['dashboard', 'profile', 'courses', 'courseDetail', 'admin', 'teacher'].includes(AppState.currentPage) || AppState.modals.settings) {
                        renderApp();
                    }
                }
            }, (error) => console.error("User sync error:", error));
            
            unsubscribes.push(unsubUser);
            setupRoleListeners();

        } catch (e) {
            console.error("Error initializing user data:", e);
            showToast("Failed to load profile data", "error");
        }
    }

    function setupRoleListeners() {
        const coursesRef = getPubCol('courses');
        const unsubCourses = onSnapshot(coursesRef, (snapshot) => {
            const courses = [];
            snapshot.forEach(doc => courses.push({ id: doc.id, ...doc.data() }));
            AppState.courses = courses.sort((a, b) => b.createdAt - a.createdAt);
            if (['dashboard', 'courses', 'courseDetail', 'teacher'].includes(AppState.currentPage)) renderApp();
        }, (error) => console.error("Courses sync error:", error));
        unsubscribes.push(unsubCourses);

        const postsRef = getPubCol('community_posts');
        const unsubPosts = onSnapshot(postsRef, (snapshot) => {
            const posts = [];
            snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
            AppState.communityPosts = posts.sort((a, b) => b.timestamp - a.timestamp);
            if (AppState.currentPage === 'community') renderApp();
        }, (error) => console.error("Community sync error:", error));
        unsubscribes.push(unsubPosts);

        const unsubTopUsers = onSnapshot(getPubCol('users'), (snapshot) => {
            const users = [];
            snapshot.forEach(doc => users.push(doc.data()));
            AppState.leaderboard = users.sort((a, b) => (b.points || 0) - (a.points || 0)).slice(0, 5);
            if (AppState.currentPage === 'dashboard') renderApp();
        }, (error) => console.error("Leaderboard sync error:", error));
        unsubscribes.push(unsubTopUsers);

        if (AppState.user?.role === 'admin') {
            const paymentsRef = getPubCol('payment_requests');
            const unsubPayments = onSnapshot(paymentsRef, (snapshot) => {
                const reqs = [];
                snapshot.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                AppState.paymentRequests = reqs.filter(r => r.status === 'pending');
                if (AppState.currentPage === 'admin') renderApp();
            });
            unsubscribes.push(unsubPayments);

            const proRef = getPubCol('pro_requests');
            const unsubPro = onSnapshot(proRef, (snapshot) => {
                const reqs = [];
                snapshot.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                AppState.proRequests = reqs.filter(r => r.status === 'pending');
                if (AppState.currentPage === 'admin') renderApp();
            });
            unsubscribes.push(unsubPro);
        }
    }

    async function seedInitialCourses() {
        if (!auth.currentUser) return;
        const coursesRef = getPubCol('courses');
        try {
            const snap = await getDocs(coursesRef);
            if (snap.empty) {
                const dummyCourses = [
                    {
                        title: "Python for Beginners", description: "Start your coding journey with Python. Master variables, control flow, and functions in this comprehensive guide.", price: 299,
                        icon: "ph-snake", color: "text-blue-500", bg: "bg-blue-100 dark:bg-blue-900/30",
                        thumbnail: "https://images.unsplash.com/photo-1526379095098-d400fd0bf935?auto=format&fit=crop&w=800&q=80",
                        teacherName: "ProgramPros", createdAt: Date.now(), lessons: 2,
                        syllabus: [
                            { id: generateId(), title: "Introduction to Variables", type: "video", duration: "5 mins", url: "https://www.youtube.com/embed/kqtD5dpn9C8", isPremium: false },
                            { id: generateId(), title: "Control Flow (If/Else)", type: "note", duration: "10 mins", content: "<h2>If Statements</h2><p>Used for decision making.</p><pre><code>if x > 5:\n  print('Large')</code></pre>", isPremium: true }
                        ]
                    },
                    {
                        title: "Web Dev Bootcamp", description: "HTML, CSS, and JS basics. Build your very first responsive website from scratch.", price: 499,
                        icon: "ph-browsers", color: "text-purple-500", bg: "bg-purple-100 dark:bg-purple-900/30",
                        thumbnail: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80",
                        teacherName: "ProgramPros", createdAt: Date.now() - 1000, lessons: 1,
                        syllabus: [
                            { id: generateId(), title: "HTML Basics PDF", type: "pdf", duration: "15 mins", url: "#", isPremium: false }
                        ]
                    }
                ];
                for (let c of dummyCourses) {
                    await setDoc(doc(coursesRef, generateId()), c);
                }
            }
        } catch (e) {
            console.error("Seed error:", e);
        }
    }

    // --- AUTH ACTIONS ---
    window.handleAuthAction = async function(action, event) {
        if(event) event.preventDefault();
        const btn = event ? event.currentTarget.querySelector('button[type="submit"]') : null;
        const originalText = btn ? btn.innerHTML : '';
        if(btn) { btn.innerHTML = '<div class="loader mx-auto border-white border-t-transparent"></div>'; btn.disabled = true; }

        try {
            if (action === 'google') {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
                showToast('Logged in successfully!');
            } else if (action === 'login') {
                const email = $('login-email').value;
                const pwd = $('login-pwd').value;
                if (!email || !pwd) throw new Error("Please fill all fields");
                await signInWithEmailAndPassword(auth, email, pwd);
                showToast('Welcome back!');
            } else if (action === 'signup') {
                const name = $('signup-name').value;
                const email = $('signup-email').value;
                const pwd = $('signup-pwd').value;
                if (!name || !email || !pwd) throw new Error("Please fill all fields");
                const cred = await createUserWithEmailAndPassword(auth, email, pwd);
                await updateProfile(cred.user, { displayName: name });
                showToast('Account created!');
            } else if (action === 'logout') {
                clearSubscriptions();
                await signOut(auth);
                AppState.user = null;
                showToast('Logged out');
                navigate('welcome');
                await initAuth();
            }
        } catch (error) {
            console.error("Auth error:", error);
            showToast(error.message.replace('Firebase: ', ''), 'error');
            if(btn) { btn.innerHTML = originalText; btn.disabled = false; }
        }
    }

    // --- APP ACTIONS ---
    
    // Gamification Logic
    async function checkAndAwardBadges(oldPoints, newPoints) {
        if (!AppState.user) return;
        let awarded = false;
        
        for (const [key, badge] of Object.entries(BADGES)) {
            if (newPoints >= badge.req && !AppState.user.badges.includes(key)) {
                await updateDoc(getPubDoc('users', AppState.user.uid), {
                    badges: arrayUnion(key)
                });
                showToast(`New Badge Unlocked: ${badge.name}! 🏆`, 'success');
                awarded = true;
            }
        }
        if(awarded) fireConfetti();
    }

    window.markLessonComplete = async function(lessonId, bonusXP = 0) {
        if (!AppState.user || !AppState.user.uid) return;
        
        const btn = document.getElementById('btn-mark-complete');
        if(btn) { btn.innerHTML = '<div class="loader mx-auto"></div>'; btn.disabled = true; }

        try {
            const userRef = getPubDoc('users', AppState.user.uid);
            const gainedXP = 20 + bonusXP;
            
            if (!AppState.user.completedLessons?.includes(lessonId)) {
                await updateDoc(userRef, {
                    completedLessons: arrayUnion(lessonId),
                    points: (AppState.user.points || 0) + gainedXP
                });
                fireConfetti();
                showToast(`Lesson Completed! +${gainedXP} Points`, 'success');
            } else if (bonusXP > 0) {
                // Already complete, but award bonus for challenges
                await updateDoc(userRef, {
                    points: (AppState.user.points || 0) + bonusXP
                });
                fireConfetti();
                showToast(`Challenge Passed! +${bonusXP} Points`, 'success');
            } else {
                showToast('Lesson already completed.', 'info');
            }
            
            if (AppState.currentPage !== 'editor') {
                setTimeout(() => navigate('courseDetail'), 1500);
            }
        } catch (error) {
            console.error("Error marking complete:", error);
            showToast('Failed to save progress', 'error');
            if(btn) { btn.innerHTML = 'Try Again'; btn.disabled = false; }
        }
    };

    window.toggleBookmark = async function(courseId, event) {
        if (event) event.stopPropagation();
        if (!AppState.user) return showToast('Please login to bookmark', 'info');
        
        const userRef = getPubDoc('users', AppState.user.uid);
        const isBookmarked = AppState.user.bookmarks?.includes(courseId);
        
        try {
            await updateDoc(userRef, {
                bookmarks: isBookmarked ? arrayRemove(courseId) : arrayUnion(courseId)
            });
            showToast(isBookmarked ? 'Removed from bookmarks' : 'Added to bookmarks');
        } catch (error) {
            showToast('Failed to update bookmark', 'error');
        }
    };

    // Private Notes
    async function loadPrivateNotes(lessonId) {
        if (!AppState.user) return;
        AppState.currentLessonNotes = 'Loading notes...';
        try {
            const noteDoc = await getDoc(getPrivDoc(AppState.user.uid, 'notes', lessonId));
            AppState.currentLessonNotes = noteDoc.exists() ? noteDoc.data().content : '';
            if (AppState.currentPage === 'lesson') renderApp();
        } catch (e) {
            console.error("Notes load error:", e);
            AppState.currentLessonNotes = '';
        }
    }

    window.toggleLike = async function(postId) {
        if (!AppState.user) return showToast('Please login to like posts', 'info');
        
        const postRef = getPubDoc('community_posts', postId);
        const post = AppState.communityPosts.find(p => p.id === postId);
        if (!post) return;

        const likedBy = post.likedBy || [];
        const hasLiked = likedBy.includes(AppState.user.uid);

        try {
            if (hasLiked) {
                await updateDoc(postRef, {
                    likes: Math.max(0, (post.likes || 1) - 1),
                    likedBy: arrayRemove(AppState.user.uid)
                });
            } else {
                await updateDoc(postRef, {
                    likes: (post.likes || 0) + 1,
                    likedBy: arrayUnion(AppState.user.uid)
                });
            }
        } catch (e) {
            console.error("Like error:", e);
            showToast("Failed to like post", "error");
        }
    };

        if (type === 'video') contentObj.url = $('tac-url').value || 'https://www.youtube.com/embed/dQw4w9WgXcQ';

    // --- RENDER ENGINE ---
    window.renderApp = function() {
        const root = $('app-root');
        const navBar = $('navigation-bar');
        const mobileNav = $('mobile-bottom-nav');
        
        if (!AppState.authReady) {
            root.innerHTML = renderLoader();
            navBar.classList.add('hidden');
            mobileNav.classList.add('hidden');
            return;
        }

        // Apply Pro Theme Colors
        if (AppState.user?.isPro) {
            document.documentElement.style.setProperty('--color-primary', '#d4af37');
            document.documentElement.style.setProperty('--color-primary-hover', '#b8860b');
            document.documentElement.style.setProperty('--color-secondary', '#ffd700');
        } else {
            document.documentElement.style.setProperty('--color-primary', '#4F46E5');
            document.documentElement.style.setProperty('--color-primary-hover', '#4338CA');
            document.documentElement.style.setProperty('--color-secondary', '#9333EA');
        }

        const hideNavPages = ['welcome', 'login', 'signup', 'editor', 'quiz'];
        const showNav = AppState.user && !hideNavPages.includes(AppState.currentPage);
        
        if (showNav) {
            navBar.classList.remove('hidden');
            mobileNav.classList.remove('hidden');
            navBar.innerHTML = renderDesktopSidebar();
            mobileNav.innerHTML = renderMobileNav();
        } else {
            navBar.classList.add('hidden');
            mobileNav.classList.add('hidden');
        }

        let html = '';
        switch(AppState.currentPage) {
            case 'welcome': html = renderWelcome(); break;
            case 'login': html = renderAuth('login'); break;
            case 'signup': html = renderAuth('signup'); break;
            case 'dashboard': html = AppState.user ? renderDashboard() : renderWelcome(); break;
            case 'courses': html = AppState.user ? renderCourses() : renderWelcome(); break;
            case 'courseDetail': html = AppState.user ? renderCourseDetail() : renderWelcome(); break;
            case 'lesson': html = AppState.user ? renderLesson() : renderWelcome(); break;
            case 'community': html = AppState.user ? renderCommunity() : renderWelcome(); break;
            case 'profile': html = AppState.user ? renderProfile() : renderWelcome(); break;
            case 'admin': html = (AppState.user?.role === 'admin') ? renderAdmin() : renderDashboard(); break;
            case 'teacher': html = (AppState.user?.role === 'teacher' || AppState.user?.role === 'admin') ? renderTeacher() : renderDashboard(); break;
            case 'upgrade': html = AppState.user ? renderUpgrade() : renderWelcome(); break;
            case 'editor': html = renderEditor(); break;
            case 'certificate': html = renderCertificate(); break;
            case 'studentId': html = renderStudentId(); break;
            default: html = renderDashboard();
        }
        
        if (AppState.modals.createCourse) html += renderCreateCourseModal();
        if (AppState.modals.editCourse) html += renderEditCourseModal();
        if (AppState.modals.addContent) html += renderAddContentModal();
        if (AppState.modals.settings) html += renderSettingsModal();
        if (AppState.modals.videoPlayer) html += renderVideoModal();

        root.innerHTML = html;
    }

        const isBookmarked = AppState.user?.bookmarks?.includes(courseId);
        const isPending = AppState.paymentRequests?.some(r => r.courseId === courseId && r.uid === AppState.user?.uid);
        
        const completedInCourse = (course.syllabus || []).filter(l => AppState.user?.completedLessons?.includes(l.id)).length;

                        <div class="flex flex-col sm:flex-row flex-wrap items-stretch sm:items-center justify-center md:justify-start gap-3 w-full">
                            ${course.promoVideoUrl ? `
                                <button onclick="AppState.currentVideoUrl = '${course.promoVideoUrl}'; AppState.modals.videoPlayer = true; renderApp()" class="px-6 py-3.5 sm:py-3 bg-white/20 hover:bg-white/30 backdrop-blur border border-white/30 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 text-base md:text-lg w-full sm:w-auto">
                                    <i class="ph-fill ph-play-circle text-xl"></i> Watch Trailer

        if (!lesson) return `<div class="p-8 text-center"><p>Lesson not found.</p><button onclick="navigate('courses')" class="mt-4 text-primary">Go back</button></div>`;
        
        const isUnlocked = AppState.user?.unlockedCourses?.includes(course.id);
        if (lesson.isPremium && !isUnlocked) return renderUpgrade();

        const isCompleted = AppState.user?.completedLessons?.includes(lesson.id);

        let contentHtml = '';
        if (lesson.type === 'video') {
            contentHtml = `<div class="w-full aspect-video bg-black rounded-2xl overflow-hidden shadow-xl mb-8 border border-gray-800">
                <iframe class="w-full h-full" src="${lesson.url}" frameborder="0" allowfullscreen></iframe>

        } else if (lesson.type === 'note') {
            contentHtml = `<div class="prose dark:prose-invert max-w-none bg-white dark:bg-darkCard p-8 rounded-2xl border border-gray-100 dark:border-darkBorder mb-8 shadow-sm text-gray-800 dark:text-gray-200 leading-relaxed">${lesson.content}</div>`;

            contentHtml = `<div class="bg-red-50 dark:bg-red-900/10 border border-red-100 dark:border-red-900/30 rounded-2xl p-12 text-center flex flex-col items-center justify-center mb-8">

            </div>`;
        } else if (lesson.type === 'quiz') {
            return renderQuiz();
        }

        return `
        <div class="h-full flex flex-col bg-gray-50 dark:bg-darkBg animate-fade-in relative lg:flex-row">
            <div class="flex-1 flex flex-col h-full overflow-hidden border-r border-gray-200 dark:border-darkBorder">
                <div class="p-4 border-b border-gray-200 dark:border-darkBorder bg-white dark:bg-darkCard flex items-center justify-between sticky top-0 z-20 shadow-sm shrink-0">

                    <div class="w-10"></div> 
                </div>

                <div class="flex-1 overflow-y-auto p-4 md:p-8">

                        <h1 class="text-3xl md:text-4xl font-bold mb-8 text-gray-900 dark:text-white">${lesson.title}</h1>

                        <div class="flex justify-center pb-12">
                            <button id="btn-mark-complete" onclick="markLessonComplete('${lesson.id}')" 
                                     class="w-full sm:w-auto px-12 py-4 ${isCompleted ? 'bg-green-500 hover:bg-green-600' : 'gradient-bg hover:shadow-xl'} text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3 text-lg"

                            <p class="text-[10px] md:text-lg uppercase tracking-[0.2em] md:tracking-[0.4em] text-gray-500 mb-3 md:mb-10 font-bold">Of Completion</p>
                            <p class="text-xs md:text-xl text-gray-600 mb-2 md:mb-4 font-serif italic">This is proudly presented to</p>
                            
                            <h1 class="text-2xl md:text-5xl font-serif text-gray-900 border-b md:border-b-2 border-gray-400 pb-1 md:pb-4 mb-3 md:mb-8 px-6 md:px-24 inline-block italic font-bold">
                                ${u?.name}
                            </h1>
                            
                            <p class="text-[10px] md:text-lg text-gray-600 mb-1 md:mb-4 font-serif italic">for successfully completing the course</p>
                            <h3 class="text-base md:text-3xl font-bold text-gray-800 mb-auto tracking-wide line-clamp-2 px-2">${recentCourse}</h3>
                            
                            <div class="w-full flex justify-between items-end mt-4 md:mt-12 px-2 md:px-12 relative z-10">
                                <div class="text-center w-20 md:w-56">
                                    <div class="border-b md:border-b-2 border-gray-400 pb-1 md:pb-2 mb-1 md:mb-2">
                                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Signature_of_John_Hancock.svg" class="h-6 md:h-16 mx-auto opacity-80 mix-blend-multiply">
                                    </div>
                                    <p class="text-[8px] md:text-sm text-gray-600 font-bold uppercase tracking-wider">Instructor</p>
                                </div>
                                <div class="bg-white p-1 md:p-3 border border-gray-200 shadow-md transform rotate-3">
                                    <img src="QR.png" class="w-10 h-10 md:w-24 md:h-24" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CERT:${u?.studentId}'">
                                </div>
                                <div class="text-center w-20 md:w-56">
                                    <div class="border-b md:border-b-2 border-gray-400 pb-1 md:pb-2 mb-1 md:mb-2 text-[10px] md:text-xl font-bold text-gray-800 h-8 md:h-16 flex items-end justify-center">
                                        ${new Date().toLocaleDateString('en-US', {month: 'short', year: 'numeric'})}
                                    </div>
                                    <p class="text-[8px] md:text-sm text-gray-600 font-bold uppercase tracking-wider">Date</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    function renderEditor() {
        return `
        <div class="flex flex-col h-full animate-fade-in bg-[#1e1e1e] text-gray-300 w-full absolute inset-0 z-50">
            <!-- Topbar -->
            <div class="flex items-center justify-between bg-[#2d2d2d] border-b border-[#404040] p-2 md:p-0">
                <div class="flex flex-col md:flex-row items-start md:items-center w-full">
                    <div class="px-4 py-2 bg-[#1e1e1e] border-r border-l border-t md:border-t-primary border-r-[#404040] border-l-transparent text-white text-sm flex items-center gap-2">
                        <i class="ph-fill ph-file-js text-yellow-400"></i> sum.js
                    </div>
                    <div class="px-4 text-xs text-gray-400 flex items-center gap-2 mt-2 md:mt-0">
                        <i class="ph-fill ph-info"></i> Task: Write a function named 'sum' that takes two parameters and returns their sum.
                    </div>
                </div>
                <div class="flex items-center pr-4 gap-2 mt-2 md:mt-0 shrink-0">
                    <button onclick="runCodeWithTests()" class="flex items-center gap-2 bg-green-600 hover:bg-green-500 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors">
                        <i class="ph-fill ph-play"></i> Run & Submit
                    </button>
                    <button onclick="navigate('dashboard')" class="text-gray-400 hover:text-white p-1.5 hover:bg-white/10 rounded transition-colors"><i class="ph-bold ph-x text-lg"></i></button>
                </div>
            </div>

            <!-- Main Area -->
            <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
                <!-- Editor -->
                <div class="flex-1 flex flex-col relative bg-[#1e1e1e]">
                    <div class="flex-1 relative flex overflow-hidden">
                        <div id="line-numbers" class="w-12 bg-[#1e1e1e] border-r border-[#404040] text-[#858585] text-right pr-4 pt-4 font-mono text-sm leading-6 select-none">1</div>
                        <textarea id="code-editor-textarea" spellcheck="false" class="flex-1 bg-transparent text-[#d4d4d4] p-4 pt-4 outline-none resize-none font-mono text-sm leading-6 whitespace-pre" placeholder="function sum(a, b) {\n  // your code here\n}" oninput="updateLineNumbers(this)"></textarea>
                    </div>
                </div>

                <!-- Console -->
                <div class="h-64 sm:h-1/3 md:h-full md:w-[400px] bg-[#181818] flex flex-col shrink-0 border-t md:border-t-0 md:border-l border-[#404040] z-10">
                    <div class="px-4 py-2 border-b border-[#404040] flex justify-between items-center bg-[#2d2d2d]">
                        <span class="text-xs font-medium text-gray-300 uppercase tracking-wider">Terminal</span>
                        <button onclick="$('console-output').innerHTML=''" class="text-gray-400 hover:text-white text-xs"><i class="ph ph-trash"></i> Clear</button>
                    </div>
                    <div class="flex-1 p-4 overflow-y-auto font-mono text-sm space-y-1" id="console-output">
                        <div class="text-[#858585]">ProgramPros Test Runner v1.0</div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    function renderQuiz() {
        return `
        <div class="flex flex-col h-full animate-fade-in bg-white dark:bg-darkBg">
            <div class="p-4 flex items-center justify-between border-b border-gray-100 dark:border-darkBorder sticky top-0 bg-white/80 dark:bg-darkBg/80 backdrop-blur z-10">
                <button onclick="navigate('dashboard')" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors"><i class="ph-bold ph-x text-xl"></i></button>
                <div class="flex-1 max-w-md mx-4">
                    <div class="w-full bg-gray-200 dark:bg-darkCard rounded-full h-2 overflow-hidden">
                        <div class="gradient-bg h-2 rounded-full" style="width: 33%"></div>
                    </div>
                </div>
                <div class="font-bold text-gray-400">1/3</div>
            </div>

            <div class="flex-1 flex flex-col p-6 max-w-2xl mx-auto w-full justify-center pb-20">
                <span class="text-sm font-bold text-primary uppercase tracking-wider mb-2">Question 1</span>
                <h2 class="text-2xl md:text-3xl font-bold mb-8 text-gray-900 dark:text-white">How do you declare a constant variable in JavaScript?</h2>
                
                <div class="space-y-4">
                    <button onclick="handleQuizAnswer(this, false)" class="w-full p-4 border-2 border-gray-200 dark:border-darkBorder rounded-2xl text-left font-medium hover:border-gray-400 dark:hover:border-gray-500 transition-all text-lg flex items-center">
                        <span class="inline-block w-8 h-8 bg-gray-100 dark:bg-darkCard text-gray-500 text-center leading-8 rounded-lg mr-3">A</span> var
                    </button>
                    <button onclick="handleQuizAnswer(this, false)" class="w-full p-4 border-2 border-gray-200 dark:border-darkBorder rounded-2xl text-left font-medium hover:border-gray-400 dark:hover:border-gray-500 transition-all text-lg flex items-center">
                        <span class="inline-block w-8 h-8 bg-gray-100 dark:bg-darkCard text-gray-500 text-center leading-8 rounded-lg mr-3">B</span> let
                    </button>
                    <button onclick="handleQuizAnswer(this, true)" class="w-full p-4 border-2 border-gray-200 dark:border-darkBorder rounded-2xl text-left font-medium hover:border-gray-400 dark:hover:border-gray-500 transition-all text-lg flex items-center">
                        <span class="inline-block w-8 h-8 bg-gray-100 dark:bg-darkCard text-gray-500 text-center leading-8 rounded-lg mr-3">C</span> const
                    </button>
                    <button onclick="handleQuizAnswer(this, false)" class="w-full p-4 border-2 border-gray-200 dark:border-darkBorder rounded-2xl text-left font-medium hover:border-gray-400 dark:hover:border-gray-500 transition-all text-lg flex items-center">
                        <span class="inline-block w-8 h-8 bg-gray-100 dark:bg-darkCard text-gray-500 text-center leading-8 rounded-lg mr-3">D</span> constant
                    </button>
                </div>
            </div>

            <div class="p-4 border-t border-gray-100 dark:border-darkBorder bg-white dark:bg-darkCard flex justify-center sticky bottom-0">
                <button onclick="navigate('dashboard')" class="w-full max-w-2xl py-4 bg-gray-200 dark:bg-darkBorder text-gray-600 dark:text-gray-300 font-bold rounded-2xl active:scale-95 transition-all text-lg hover:bg-gray-300 dark:hover:bg-gray-700">
                    Skip Question
                </button>
            </div>
        </div>`;
    }

    // --- EDITOR UTILS ---
    window.updateLineNumbers = function(textarea) {
        const lines = textarea.value.split('\n').length;
        const numbersDiv = $('line-numbers');
        if(numbersDiv) {
            numbersDiv.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br/>');
            numbersDiv.scrollTop = textarea.scrollTop;
        }
    }

    function highlightOutput(text) {
        if (typeof text === 'string') return `<span class="text-green-400">'${text}'</span>`;
        if (typeof text === 'number') return `<span class="text-[#b5cea8]">${text}</span>`;
        if (typeof text === 'boolean') return `<span class="text-[#569cd6]">${text}</span>`;
        if (text === null) return `<span class="text-[#569cd6]">null</span>`;
        if (text === undefined) return `<span class="text-[#569cd6]">undefined</span>`;
        if (typeof text === 'object') return `<span class="text-[#9cdcfe]">${JSON.stringify(text)}</span>`;
        return text;
    }

    window.runCodeWithTests = function() {
        const code = $('code-editor-textarea').value;
        const out = $('console-output');
        
        out.innerHTML = '<div class="text-[#dcdcaa] flex items-center gap-2"><i class="ph-bold ph-spinner animate-spin"></i> Running Tests...</div>';
        
        setTimeout(() => {
            try {
                const originalLog = console.log;
                let logs = [];
                console.log = (...args) => logs.push(args.map(highlightOutput).join(' '));
                
                // Safe-ish eval for demo
                const scriptWrapper = `
                    ${code};
                    if (typeof sum !== 'function') throw new Error("Function 'sum' is not defined.");
                    return {
                        test1: sum(2, 3) === 5,
                        test2: sum(-1, 1) === 0,
                        test3: sum(10, 20) === 30
                    };
                `;
                
                const result = new Function(scriptWrapper)();
                
                let outHtml = logs.length ? logs.map(l => `<div class="font-mono">> ${l}</div>`).join('') : '';
                
                if(result.test1 && result.test2 && result.test3) {
                    outHtml += `<div class="text-green-400 font-mono mt-2">✔ All tests passed!</div>`;
                    markLessonComplete('challenge_sum', 25); // Award points on pass
                } else {
                    outHtml += `<div class="text-red-400 font-mono mt-2">✘ Some tests failed. Check your logic.</div>`;
                }

                out.innerHTML = outHtml;
                console.log = originalLog;
            } catch (error) {
                out.innerHTML = `<div class="text-red-400 font-mono">> Error: ${error.message}</div>`;
            }
        }, 500);
    };

    document.addEventListener('scroll', function(e) {
        if(e.target.id === 'code-editor-textarea') {
            $('line-numbers').scrollTop = e.target.scrollTop;
        }
    }, true);

    // --- APP LIFECYCLE ---
    async function initAuth() {
        const initToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        try {
            if (initToken) {
                await signInWithCustomToken(auth, initToken);
            }
        } catch (e) {
            console.error("Init Auth Error:", e);
        }
    }

    onAuthStateChanged(auth, async (user) => {
        AppState.authReady = true;
        clearSubscriptions(); 
        
        if (user && !user.isAnonymous) {
            await initializeUserData(user);
            await seedInitialCourses();
            
            if (['welcome', 'login', 'signup'].includes(AppState.currentPage)) {
                AppState.currentPage = 'dashboard';
            }
        } else {
            AppState.user = null;
            if (!['welcome', 'login', 'signup'].includes(AppState.currentPage)) {
                AppState.currentPage = 'welcome';
            }
        }
        
        renderApp();
    });

    initAuth();

</script>
</body>
</html>
