<html lang="en" class="light">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: '#4F46E5', // Indigo 600
                        secondary: '#9333EA', // Purple 600
                        dark: '#0F172A',
                        darkCard: '#1E293B'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        /* Main App Container */
        #mobile-container {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #f8fafc;
        }
        .dark #mobile-container { background-color: #0f172a; }
        
        /* Better Scrollbar for Desktop */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .gradient-text {
            background: linear-gradient(135deg, #4F46E5, #9333EA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5, #9333EA); }
        
        /* Code Editor Textarea */
        #code-editor-textarea {
            tab-size: 4;
            font-family: monospace;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        
        /* Toast */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { pointer-events: auto; transition: all 0.3s ease; }
        
        /* Confetti */
        .confetti-piece { position: absolute; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
        
        /* Terminal Cursor */
        .cursor-blink { animation: blink 1s step-end infinite; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Pro Upgrade Card (From Uiverse.io) */
        .pro-card {
            --white: hsl(0, 0%, 100%);
            --black: hsl(240, 15%, 9%);
            --paragraph: hsl(0, 0%, 83%);
            --line: hsl(240, 9%, 17%);
            --primary: hsl(266, 92%, 58%);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 22rem;
            background-color: hsla(240, 15%, 9%, 1);
            background-image: radial-gradient(at 88% 40%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
                radial-gradient(at 49% 30%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
                radial-gradient(at 14% 26%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
                radial-gradient(at 0% 64%, hsla(263, 93%, 56%, 1) 0px, transparent 85%),
                radial-gradient(at 41% 94%, hsla(284, 100%, 84%, 1) 0px, transparent 85%),
                radial-gradient(at 100% 99%, hsla(306, 100%, 57%, 1) 0px, transparent 85%);
            border-radius: 1rem;
            box-shadow: 0px -16px 24px 0px rgba(255, 255, 255, 0.25) inset;
            margin: 0 auto;
        }

        .pro-card .card__border {
            overflow: hidden;
            pointer-events: none;
            position: absolute;
            z-index: -10;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 2px);
            height: calc(100% + 2px);
            background-image: linear-gradient(0deg, hsl(0, 0%, 100%) -50%, hsl(0, 0%, 40%) 100%);
            border-radius: 1rem;
        }

        .pro-card .card__border::before {
            content: "";
            pointer-events: none;
            position: fixed;
            z-index: 200;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%), rotate(0deg);
            transform-origin: left;
            width: 200%;
            height: 10rem;
            background-image: linear-gradient(0deg, hsla(0, 0%, 100%, 0) 0%, hsl(277, 95%, 60%) 40%, hsl(277, 95%, 60%) 60%, hsla(0, 0%, 40%, 0) 100%);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate { to { transform: rotate(360deg); } }

        .pro-card .card_title__container .card_title { font-size: 1.5rem; font-weight: bold; color: var(--white); }
        .pro-card .card_title__container .card_paragraph { margin-top: 0.25rem; font-size: 0.8rem; color: var(--paragraph); }
        .pro-card .line { width: 100%; height: 0.1rem; background-color: var(--line); border: none; }
        .pro-card .card__list { display: flex; flex-direction: column; gap: 0.75rem; }
        .pro-card .card__list .card__list_item { display: flex; align-items: center; gap: 0.75rem; }
        .pro-card .card__list .card__list_item .check { display: flex; justify-content: center; align-items: center; width: 1.25rem; height: 1.25rem; background-color: var(--primary); border-radius: 50%; }
        .pro-card .card__list .card__list_item .check .check_svg { width: 0.85rem; height: 0.85rem; fill: var(--black); }
        .pro-card .card__list .card__list_item .list_text { font-size: 0.9rem; color: var(--white); }
        
        .pro-card .pro-button {
            cursor: pointer;
            padding: 0.8rem;
            width: 100%;
            background-image: linear-gradient(0deg, rgba(94, 58, 238, 1) 0%, rgba(197, 107, 240, 1) 100%);
            font-size: 1rem;
            font-weight: bold;
            color: var(--white);
            border: 0;
            border-radius: 9999px;
            box-shadow: inset 0 -2px 25px -4px var(--white);
            transition: transform 0.2s;
        }
        .pro-card .pro-button:active { transform: scale(0.95); }
    </style>
</head>

                    { id: 'l3', title: 'Advanced OOP Concepts', type: 'video', duration: '25 mins', isPremium: true, url: 'https://www.youtube.com/embed/JeznW_7DlB0' },

                ]
            },
            { id: 'c2', title: 'JavaScript Mastery', icon: 'ph-file-js', color: 'text-yellow-500', bg: 'bg-yellow-100 dark:bg-yellow-900/30', progress: 10, lessons: 20, price: 349, syllabus: [
                { id: 'l21', title: 'JS Basics', type: 'video', duration: '15 mins', isPremium: false, url: '' },

            ] },
            { id: 'c3', title: 'HTML & CSS UI Design', icon: 'ph-file-html', color: 'text-orange-500', bg: 'bg-orange-100 dark:bg-orange-900/30', progress: 100, lessons: 8, price: 199, syllabus: [
                { id: 'l31', title: 'HTML5 Semantics', type: 'note', duration: '5 mins', isPremium: false, content: 'HTML5 introduces structural tags...' },

        ],
        challenges: [
            { id: 1, title: 'Reverse a String', level: 'Easy', pts: 10, completed: true },
            { id: 2, title: 'Find the Factorial', level: 'Medium', pts: 20, completed: false },
            { id: 3, title: 'Binary Tree Inversion', level: 'Hard', pts: 50, completed: false }
        ],
        achievements: [
            { icon: 'ph-fire', title: '7 Day Streak', desc: 'Learned for 7 days straight', earned: true },
            { icon: 'ph-medal', title: 'JS Beginner', desc: 'Completed 5 JS lessons', earned: true },
            { icon: 'ph-trophy', title: 'Challenge Master', desc: 'Solve 10 Hard challenges', earned: false }
        ]
    };

    // --- UTILITIES ---
    const $ = id => document.getElementById(id);
    
    window.showToast = function(message, type = 'success') {
        const toast = document.createElement('div');
        const icon = type === 'success' ? '<i class="ph ph-check-circle text-xl text-green-500"></i>' : '<i class="ph ph-info text-xl text-blue-500"></i>';
        toast.className = `toast animate-slide-up flex items-center gap-3 p-4 rounded-xl shadow-lg bg-white dark:bg-darkCard border-l-4 ${type === 'success' ? 'border-green-500' : 'border-blue-500'}`;
        toast.innerHTML = `${icon} <span class="font-medium text-sm text-gray-800 dark:text-gray-200">${message}</span>`;
        $('toast-container').appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // UX Feature: Toggle password visibility
    window.togglePassword = function(inputId, btn) {
        const input = $(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('ph-eye', 'ph-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('ph-eye-slash', 'ph-eye');
        }
    }

    // UX Feature: Support Enter key submission
    window.handleEnter = function(e, actionFn) {
        if (e.key === 'Enter') {
            e.preventDefault();
            actionFn();
        }
    }

    window.fireConfetti = function() {
        const colors = ['#4F46E5', '#9333EA', '#10B981', '#F59E0B', '#EF4444', '#3B82F6'];
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-piece';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-20px';
            confetti.style.width = Math.random() * 8 + 6 + 'px';
            confetti.style.height = Math.random() * 8 + 6 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            $('mobile-container').appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }
    }

    window.toggleTheme = function() {
        const html = document.documentElement;
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            AppState.theme = 'light';
        } else {
            html.classList.add('dark');
            AppState.theme = 'dark';
        }
        renderApp();
    }

    window.navigate = function(page, params = {}) {
        AppState.currentPage = page;
        if (params.courseId) AppState.currentCourseId = params.courseId;
        if (params.lessonId) AppState.currentLessonId = params.lessonId;
        
        // Reset modals and auth states securely when changing screens
        AppState.isPostModalOpen = false;
        
        if (page === 'login') {
            AppState.authMode = 'email';
        }
        if (page === 'signup') {
            AppState.signupStep = 1;
            AppState.signupContact = '';
        }
        
        // Clear recaptcha state securely when changing screens
        if (window.recaptchaVerifier) {
            try { window.recaptchaVerifier.clear(); } catch(e){}
            window.recaptchaVerifier = null;
        }

        renderApp();
        $('app-root').scrollTo(0,0);
    }

    window.logout = async function() {
        if (auth) await signOut(auth);
        AppState.user = null;
        showToast('Logged out securely.', 'info');
        navigate('welcome');
    }

    window.mockLogin = function() {
        showToast('Demo Mode: Logging in...', 'info');
        setTimeout(() => { 
            AppState.user = {
                uid: 'mock-123',
                name: 'Alex Developer',
                email: 'alex@example.com',
                avatar: 'https://i.pravatar.cc/150?img=11',
                studentId: 'PP-2026-8942',
                joinDate: 'Jan 2026',
                level: 12,
                points: 1450,
                unlockedCourses: [] // Replaces isPro flag
            };
            navigate('dashboard'); 
        }, 800);
    }

    // --- AUTHENTICATION LOGIC ---
    window.handleGoogleLogin = async function(event) {
        const btn = event.currentTarget;
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i>';
        btn.disabled = true;

        try {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
            showToast('Logged in with Google successfully!', 'success');
            navigate('dashboard'); // Explicit redirect
        } catch (error) {
            console.error("Google Auth Error:", error);
            
            // SMART FALLBACK: Web popup blockers or iframes block Firebase popups.
            // If this happens, we use mockLogin so the user never gets stuck.
            if (error.code === 'auth/popup-closed-by-user' || error.message.includes('cross-origin')) {
                showToast('Popup blocked by browser. Using demo login...', 'info');
                mockLogin();
            } else {
                showToast(error.message.replace('Firebase: ', ''), 'error');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }
    }

    window.handleLogin = async function() {
        const email = $('login-email').value;
        const pwd = $('login-pwd').value;
        
        if (!email || !pwd) return showToast('Please fill all fields', 'error');

        const btn = $('btn-login');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Processing...';
        btn.disabled = true;

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, pwd);
            
            showToast('Logged in successfully!', 'success');
            navigate('dashboard'); // Explicit navigation prevents getting stuck!
        } catch (error) {
            showToast('Invalid email or password.', 'error');
            btn.innerHTML = 'Log In';
            btn.disabled = false;
        }
    }

    // --- SIGNUP WIZARD LOGIC (EMAIL OR PHONE -> OTP -> PASSWORD) ---
    
    window.processSignupStep1 = async function() {
        const contact = $('signup-contact').value.trim();
        if (!contact) return showToast('Please enter an Email or Mobile Number', 'error');

        const btn = $('btn-signup-1');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Processing...';
        btn.disabled = true;

        // Auto-detect if input is a phone number (min 7 digits)
        const isPhone = /^\+?[0-9\s\-]{7,15}$/.test(contact);
        AppState.signupType = isPhone ? 'phone' : 'email';
        AppState.signupContact = contact;

        if (isPhone) {
            // Prepend India code if user typed exactly 10 digits without code
            let phone = contact.startsWith('+') ? contact : '+91' + contact; 
            try {
                if (!window.recaptchaVerifier) {
                    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container-signup', { 'size': 'invisible' });
                }
                window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                showToast('OTP sent via SMS!', 'success');
                AppState.signupStep = 2;
                renderApp();
            } catch (e) {
                showToast(e.message.replace('Firebase: ', ''), 'error');
                btn.innerHTML = 'Send OTP';
                btn.disabled = false;
            }
        } else {
            // Email Flow - Firebase SDK doesn't natively send 6-digit OTPs to email without a custom backend.
            // We simulate it here for the UI flow demo.
            showToast('Demo Mode: Email OTP sent! Use 123456.', 'info');
            setTimeout(() => {
                AppState.signupStep = 2;
                renderApp();
            }, 1000);
        }
    }

    window.processSignupStep2 = async function() {
        const otp = $('signup-otp').value.trim();
        if (!otp) return showToast('Enter OTP', 'error');

        const btn = $('btn-signup-2');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Verifying...';
        btn.disabled = true;

        if (AppState.signupType === 'phone') {
            try {
                await window.confirmationResult.confirm(otp);
                // OTP verified successfully, proceed to set name and password
                AppState.signupStep = 3;
                renderApp();
            } catch (e) {
                showToast('Invalid OTP entered', 'error');
                btn.innerHTML = 'Verify OTP';
                btn.disabled = false;
            }
        } else {
            // Mock Email Verification
            if (otp === '123456') {
                AppState.signupStep = 3;
                renderApp();
            } else {
                showToast('Invalid OTP. Use 123456 for demo.', 'error');
                btn.innerHTML = 'Verify OTP';
                btn.disabled = false;
            }
        }
    }

    window.processSignupStep3 = async function() {
        const name = $('signup-name').value.trim();
        const pwd = $('signup-pwd').value;
        // If they used phone, Firebase requires an email to set a password credential, so we ask for it now.
        const email = AppState.signupType === 'email' ? AppState.signupContact : $('signup-extra-email').value.trim();

        if (!name || !pwd || !email) return showToast('Please fill all fields', 'error');

        const btn = $('btn-signup-3');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Creating...';
        btn.disabled = true;

        try {
            if (AppState.signupType === 'phone') {
                // User is signed in via Phone Auth. Link an Email/Password so they can log in with it later.
                const credential = EmailAuthProvider.credential(email, pwd);
                await linkWithCredential(auth.currentUser, credential);
                await updateProfile(auth.currentUser, { displayName: name });
            } else {
                // Email Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
                await updateProfile(userCredential.user, { displayName: name });
            }
            
            showToast('Account created successfully!', 'success');
            navigate('dashboard'); // Explicit navigation fixes the stuck UI bug
        } catch (e) {
            showToast(e.message.replace('Firebase: ', ''), 'error');
            btn.innerHTML = 'Complete Sign Up';
            btn.disabled = false;
        }
    }

    // --- OTP AUTHENTICATION (LOGIN TAB) ---
    window.switchAuthMode = function(mode) {
        AppState.authMode = mode;
        if (window.recaptchaVerifier) {
            try { window.recaptchaVerifier.clear(); } catch(e){}
            window.recaptchaVerifier = null;
        }
        renderApp();
    }

    window.sendAuthOTP = async function(isSignup) {
        const phone = $('auth-phone').value.trim();
        if (!phone.startsWith('+')) return showToast('Include country code (e.g., +91)', 'error');

        try {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }
            $('btn-auth-send').innerHTML = '<i class="ph ph-spinner animate-spin"></i>';
            $('btn-auth-send').disabled = true;

            // This single API handles both Phone signups and logins!

    // --- FIREBASE DATA SYNC ---
    async function initializeUserData(uid, firebaseUser) {
        if (!db) return;
        const userRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'main');
        const userSnap = await getDoc(userRef);
        
        if (!userSnap.exists()) {
            // Create default profile for new user
            await setDoc(userRef, {
                name: firebaseUser.displayName || 'Student ' + uid.substring(0, 4).toUpperCase(),
                email: firebaseUser.email || 'student@example.com',
                phone: firebaseUser.phoneNumber || '',
                avatar: firebaseUser.photoURL || ('https://ui-avatars.com/api/?name=' + encodeURIComponent(firebaseUser.displayName || 'Student') + '&background=random'),
                studentId: 'PP-' + Math.floor(Math.random() * 90000 + 10000),
                joinDate: new Date().toLocaleDateString('en-US', { month: 'short', year: 'numeric' }),
                level: 1,
                points: 0,
                unlockedCourses: [] // Array of course IDs they've bought
            });
        } else if (firebaseUser.phoneNumber && !userSnap.data().phone) {
            // If phone was linked, update document
            await updateDoc(userRef, { phone: firebaseUser.phoneNumber });
        }

        // Listen for live updates
        onSnapshot(userRef, (doc) => {
            if (doc.exists()) {
                AppState.user = { uid, ...doc.data() };
                // Ensure unlockedCourses exists safely
                if (!AppState.user.unlockedCourses) AppState.user.unlockedCourses = [];
                
                if (['dashboard', 'profile', 'community', 'courses', 'challenges'].includes(AppState.currentPage)) {
                    renderApp(); // Re-render to show updated points/access
                }
            }
        }, (error) => console.error("Error listening to profile:", error));
    }

    function listenToForum() {
        if (!db) return;
        const forumRef = collection(db, 'artifacts', appId, 'public', 'data', 'forum_posts');
        onSnapshot(forumRef, (snapshot) => {
            let posts = [];
            snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
            // Sort by time descending in memory
            posts.sort((a, b) => b.time - a.time);
            
            // Seed default posts if empty
            if (posts.length === 0 && AppState.user) {
                seedDefaultForumPosts(forumRef);
            }
            
            AppState.forumPosts = posts;
            if (AppState.currentPage === 'community') renderApp();
        }, (error) => console.error("Error listening to forum:", error));
    }

    async function seedDefaultForumPosts(forumRef) {
        const defaults = [
            { user: 'Alex J.', avatar: 'https://i.pravatar.cc/150?u=alex', time: Date.now() - 7200000, text: 'What is the difference between let and var in JS?' },
            { user: 'Sarah M.', avatar: 'https://i.pravatar.cc/150?u=sarah', time: Date.now() - 18000000, text: 'Finally built my first React app using ProgramPros! 🎉' }
        ];
        for (let post of defaults) {
            await addDoc(forumRef, post);
        }
    }

    // Interactive Code Runner Engine
    window.runCode = function() {
        const code = $('code-editor-textarea').value;
        const out = $('console-output');
        const runBtn = $('run-btn');
        
        // Show loading state
        out.innerHTML = '<div class="flex items-center gap-2 text-blue-400"><i class="ph ph-spinner animate-spin text-xl"></i> Executing code...</div>';
        runBtn.disabled = true;
        runBtn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Running';
        runBtn.classList.add('opacity-75', 'cursor-not-allowed');

        // Simulate backend execution delay
        setTimeout(() => {
            out.innerHTML = '';
            runBtn.disabled = false;
            runBtn.innerHTML = '<i class="ph-fill ph-play"></i> Run';
            runBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            
            // Mocking console.log
            const originalLog = console.log;
            let logs = [];
            console.log = (...args) => {
                logs.push(args.join(' '));
                originalLog(...args);
            };

            try {
                // Evaluates the JS code
                eval(code);
                if (logs.length > 0) {
                    out.innerHTML = logs.map(l => `<div class="text-green-400">> ${l}</div>`).join('') + '<span class="cursor-blink text-gray-400 ml-1">_</span>';
                } else {
                    out.innerHTML = `<div class="text-gray-400 italic">Code executed successfully (No output)</div><span class="cursor-blink text-gray-400 ml-1">_</span>`;
                }
            } catch (error) {
                out.innerHTML = `<div class="text-red-500 font-bold">> Error: ${error.message}</div><span class="cursor-blink text-gray-400 ml-1">_</span>`;
            } finally {
                console.log = originalLog; // Restore normal console.log
            }
        }, 800);
    }

                <button id="download-cert-btn" onclick="downloadCertificate(this)" class="mt-8 md:mt-12 w-full max-w-sm py-4 md:py-5 gradient-bg text-white font-bold rounded-xl md:rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-2 md:text-lg">
                    <i class="ph ph-download-simple text-xl md:text-2xl"></i> Download PDF
                </button>
            </div>
        </div>
        `;
    }

    window.downloadCertificate = function(btn) {
        btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Generating PDF...';
        btn.classList.add('opacity-80', 'cursor-wait');
        setTimeout(() => {
            btn.innerHTML = '<i class="ph ph-check-circle text-xl"></i> Downloaded';
            btn.classList.replace('gradient-bg', 'bg-green-500');
            showToast('Certificate saved to your device!', 'success');
            fireConfetti();
        }, 1500);
    }

    function renderBottomNav() {
        const cp = AppState.currentPage;
        const navItems = [
            { id: 'dashboard', icon: 'ph-house', label: 'Home' },
            { id: 'courses', icon: 'ph-book-open', label: 'Courses' },
            { id: 'challenges', icon: 'ph-target', label: 'Tasks' },
            { id: 'community', icon: 'ph-users', label: 'Forum' },
            { id: 'profile', icon: 'ph-user', label: 'Profile' }
        ];

        return navItems.map(item => `
            <div onclick="navigate('${item.id}')" class="flex flex-col items-center justify-center w-16 md:w-full md:py-4 cursor-pointer group hover:bg-gray-50 dark:hover:bg-gray-800/50 md:rounded-xl transition-colors">
                <div class="relative p-1">
                    <i class="${cp === item.id ? 'ph-fill text-primary' : 'ph text-gray-400 dark:text-gray-500 group-hover:text-gray-600 dark:group-hover:text-gray-300'} ${item.icon} text-2xl md:text-3xl transition-colors"></i>
                    ${cp === item.id ? '<div class="absolute -bottom-1 md:bottom-auto md:top-1/2 md:-translate-y-1/2 md:-left-4 left-1/2 -translate-x-1/2 md:translate-x-0 w-1 md:w-1.5 h-1 md:h-8 rounded-full md:rounded-r-full bg-primary transition-all"></div>' : ''}
                </div>
                <span class="text-[10px] md:text-[11px] mt-1 font-medium ${cp === item.id ? 'text-primary' : 'text-gray-400 dark:text-gray-500'} tracking-wide">${item.label}</span>
            </div>
        `).join('');
    }

    function renderUpgrade() {
        const courseId = AppState.currentCourseId || 'c1';
        const course = MockData.courses.find(c => c.id === courseId) || MockData.courses[0];
        
        const isUnlocked = AppState.user && AppState.user.unlockedCourses?.includes(courseId);

        if (isUnlocked) {
            return `
            <div class="animate-fade-in bg-gray-50 dark:bg-[#0f172a] min-h-full flex flex-col">
                <div class="p-4 md:p-6 flex items-center gap-4 sticky top-0 z-10 max-w-4xl mx-auto w-full">
                    <button onclick="navigate('courseDetail')" class="w-10 h-10 md:w-12 md:h-12 bg-white dark:bg-darkCard hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full flex items-center justify-center shadow-sm text-gray-500 active:scale-95 transition-colors"><i class="ph ph-arrow-left text-xl md:text-2xl"></i></button>
                </div>
                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
                    <div class="w-24 h-24 md:w-32 md:h-32 rounded-full bg-green-100 flex items-center justify-center text-green-500 mb-6 shadow-inner"><i class="ph-fill ph-check-circle text-5xl md:text-7xl"></i></div>
                    <h2 class="text-2xl md:text-4xl font-bold mb-3 md:mb-4">Course Unlocked!</h2>
                    <p class="text-gray-500 md:text-lg max-w-md mx-auto mb-8">You already own <strong>${course.title}</strong>. All premium lessons and materials are available.</p>
                    <button onclick="navigate('courseDetail')" class="px-8 py-3 bg-primary text-white font-bold rounded-xl active:scale-95 transition-all">Go to Course</button>
                </div>
            </div>`;
        }

        // Generate QR Code URL securely using upi deep linking
        const upiId = "bholanathk460@okhdfcbank";
        const payeeName = "ProgramPros";
        const transactionNote = `Purchase ${course.title} (${course.id})`;
        const upiUrl = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&am=${course.price}&cu=INR&tn=${encodeURIComponent(transactionNote)}`;
        const qrCodeImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiUrl)}&margin=10`;

        return `
        <div class="animate-fade-in bg-gray-50 dark:bg-[#0f172a] min-h-full flex flex-col items-center">
            <div class="p-4 md:p-6 flex items-center gap-4 sticky top-0 z-10 w-full max-w-4xl mx-auto">
                <button onclick="navigate('courseDetail')" class="w-10 h-10 md:w-12 md:h-12 bg-white dark:bg-darkCard hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full flex items-center justify-center shadow-sm text-gray-500 active:scale-95 transition-colors"><i class="ph ph-arrow-left text-xl md:text-2xl"></i></button>
            </div>
            
            <div class="flex-1 flex flex-col items-center justify-center p-6 py-4 md:py-8 w-full">
                
                <div class="pro-card transition-transform duration-300">
                    <div class="card__border"></div>
                    <div class="card_title__container">
                        <span class="card_title text-center block w-full">Unlock Full Course</span>
                        <p class="card_paragraph text-center w-full block mt-2 text-white font-bold text-lg">${course.title}</p>
                    </div>
                    <hr class="line" />
                    
                    <div class="bg-white p-2 rounded-xl mx-auto my-2 w-fit relative group">
                        <img src="${qrCodeImageUrl}" alt="Pay via UPI QR" class="w-48 h-48 md:w-56 md:h-56 rounded-lg">
                        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm rounded-lg opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center text-white font-bold text-sm">
                            <i class="ph ph-scan text-3xl mb-1"></i> Scan with any UPI App
                        </div>
                    </div>
                    
                    <div class="text-center mt-2 mb-4">
                        <p class="text-xs text-gray-400 mb-1 uppercase tracking-widest">Amount to Pay</p>
                        <span class="text-3xl font-bold text-white">₹${course.price}</span>
                        <span class="text-xs text-gray-400">/ lifetime</span>
                    </div>

                    <button onclick="notifyAdminPayment('${course.title}')" class="pro-button flex justify-center items-center gap-2">
                        I have paid <i class="ph-fill ph-check-circle"></i>
                    </button>
                </div>
                
                <div class="text-center mt-8 max-w-sm">
                    <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed"><strong class="text-gray-800 dark:text-gray-200">Instructions:</strong> Scan the QR code using Google Pay, PhonePe, or Paytm. After successful payment, click the button above.</p>
                </div>
            </div>
        </div>
        `;
    }

    window.notifyAdminPayment = function(courseName) {
        showToast(`Request sent! Admin will verify payment and unlock ${courseName} within 2 hours.`, 'success');
        setTimeout(() => {
            navigate('dashboard');
        }, 3500);
    }

    // --- INITIALIZATION ---
    async function startApp() {
        // Render initial screen
        renderApp();

        if (auth) {
            // Setup Firebase Authentication
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch(e) {
                    console.error("Auth init failed:", e);
                    showToast("Failed to connect securely. Proceeding offline.", 'info');
                }
            };

            await initAuth();

            onAuthStateChanged(auth, async (user) => {
                AppState.authReady = true;
                
                if (user) {
                    await initializeUserData(user.uid, user);
                    listenToForum();
                    
                    // PREVENT auto-redirecting if the user is still in the middle of the Signup Wizard (e.g. entering password)
                    if (AppState.currentPage === 'signup') return;

                    if (AppState.currentPage === 'login' || AppState.currentPage === 'welcome') {
                        navigate('dashboard');
                    }
                } else {
                    AppState.user = null;
                }
            });
        }
    }

    // Execute immediately (type="module" scripts are deferred automatically, so DOM is ready)
    startApp();
</script>

</body>
