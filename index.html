<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProgramPros - Learn to Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: '#4F46E5', // Indigo 600
                        secondary: '#9333EA', // Purple 600
                        dark: '#0F172A',
                        darkCard: '#1E293B'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        /* Mobile Simulator Container */
        #mobile-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            background-color: #f8fafc;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }
        .dark #mobile-container { background-color: #0f172a; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        /* Hide scrollbar for clean app look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .gradient-text {
            background: linear-gradient(135deg, #4F46E5, #9333EA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5, #9333EA); }
        
        /* Code Editor Textarea */
        #code-editor-textarea {
            tab-size: 4;
            font-family: monospace;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        
        /* Toast */
        #toast-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; pointer-events: none; }
        .toast { pointer-events: auto; transition: all 0.3s ease; }
        
        /* Confetti */
        .confetti-piece { position: absolute; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
        
        /* Pro Upgrade Card (From Uiverse.io) */
        .pro-card {
            --white: hsl(0, 0%, 100%);
            --black: hsl(240, 15%, 9%);
            --paragraph: hsl(0, 0%, 83%);
            --line: hsl(240, 9%, 17%);
            --primary: hsl(266, 92%, 58%);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 22rem;
            background-color: hsla(240, 15%, 9%, 1);
            background-image: radial-gradient(at 88% 40%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
                radial-gradient(at 49% 30%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
                radial-gradient(at 14% 26%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
                radial-gradient(at 0% 64%, hsla(263, 93%, 56%, 1) 0px, transparent 85%),
                radial-gradient(at 41% 94%, hsla(284, 100%, 84%, 1) 0px, transparent 85%),
                radial-gradient(at 100% 99%, hsla(306, 100%, 57%, 1) 0px, transparent 85%);
            border-radius: 1rem;
            box-shadow: 0px -16px 24px 0px rgba(255, 255, 255, 0.25) inset;
            margin: 0 auto;
        }

        .pro-card .card__border {
            overflow: hidden;
            pointer-events: none;
            position: absolute;
            z-index: -10;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 2px);
            height: calc(100% + 2px);
            background-image: linear-gradient(0deg, hsl(0, 0%, 100%) -50%, hsl(0, 0%, 40%) 100%);
            border-radius: 1rem;
        }

        .pro-card .card__border::before {
            content: "";
            pointer-events: none;
            position: fixed;
            z-index: 200;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%), rotate(0deg);
            transform-origin: left;
            width: 200%;
            height: 10rem;
            background-image: linear-gradient(0deg, hsla(0, 0%, 100%, 0) 0%, hsl(277, 95%, 60%) 40%, hsl(277, 95%, 60%) 60%, hsla(0, 0%, 40%, 0) 100%);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate { to { transform: rotate(360deg); } }

        .pro-card .card_title__container .card_title { font-size: 1.5rem; font-weight: bold; color: var(--white); }
        .pro-card .card_title__container .card_paragraph { margin-top: 0.25rem; font-size: 0.8rem; color: var(--paragraph); }
        .pro-card .line { width: 100%; height: 0.1rem; background-color: var(--line); border: none; }
        .pro-card .card__list { display: flex; flex-direction: column; gap: 0.75rem; }
        .pro-card .card__list .card__list_item { display: flex; align-items: center; gap: 0.75rem; }
        .pro-card .card__list .card__list_item .check { display: flex; justify-content: center; align-items: center; width: 1.25rem; height: 1.25rem; background-color: var(--primary); border-radius: 50%; }
        .pro-card .card__list .card__list_item .check .check_svg { width: 0.85rem; height: 0.85rem; fill: var(--black); }
        .pro-card .card__list .card__list_item .list_text { font-size: 0.9rem; color: var(--white); }
        
        .pro-card .pro-button {
            cursor: pointer;
            padding: 0.8rem;
            width: 100%;
            background-image: linear-gradient(0deg, rgba(94, 58, 238, 1) 0%, rgba(197, 107, 240, 1) 100%);
            font-size: 1rem;
            font-weight: bold;
            color: var(--white);
            border: 0;
            border-radius: 9999px;
            box-shadow: inset 0 -2px 25px -4px var(--white);
            transition: transform 0.2s;
        }
        .pro-card .pro-button:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

<div id="mobile-container" class="flex flex-col h-screen text-gray-800 dark:text-gray-100">
    <div id="toast-container" class="flex flex-col gap-2"></div>
    <main id="app-root" class="flex-1 overflow-y-auto overflow-x-hidden"></main>
    <nav id="bottom-nav" class="hidden bg-white dark:bg-darkCard border-t border-gray-200 dark:border-gray-800 px-6 py-3 pb-safe flex justify-between items-center z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]"></nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, updateProfile, signOut, RecaptchaVerifier, linkWithPhoneNumber } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

    // --- FIREBASE INITIALIZATION ---
    let app, auth, db, analytics;
    
    // Default to your project ID if not in the preview environment
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'font-changer-4667c';
    
    try {
        // Your Custom Firebase Configuration
        const myFirebaseConfig = {
            apiKey: "AIzaSyCgJvSkhGL-zJ0pXYrXt43z7LZB-CfOI48",
            authDomain: "font-changer-4667c.firebaseapp.com",
            projectId: "font-changer-4667c",
            storageBucket: "font-changer-4667c.firebasestorage.app",
            messagingSenderId: "200130160747",
            appId: "1:200130160747:web:747975551ddb296dc2a92e",
            measurementId: "G-ECHQ4K1R5J"
        };

        // Uses preview config if in Canvas, otherwise uses YOUR config for local/live hosting
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myFirebaseConfig;
        
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        
        // Initialize Analytics safely
        if (firebaseConfig.measurementId) {
            analytics = getAnalytics(app);
        }
    } catch (e) {
        console.error("Firebase init failed:", e);
    }

    // --- APP STATE & DATA ---
    window.AppState = {
        currentPage: 'welcome',
        user: null, // Populated from Firestore
        forumPosts: [], // Populated from Firestore
        theme: 'light',
        currentCourseId: null,
        currentLessonId: null,
        authReady: false
    };

    window.MockData = {
        courses: [
            { id: 'c1', title: 'Python for Beginners', icon: 'ph-file-py', color: 'text-blue-500', bg: 'bg-blue-100 dark:bg-blue-900/30', progress: 45, lessons: 12 },
            { id: 'c2', title: 'JavaScript Mastery', icon: 'ph-file-js', color: 'text-yellow-500', bg: 'bg-yellow-100 dark:bg-yellow-900/30', progress: 10, lessons: 20 },
            { id: 'c3', title: 'HTML & CSS UI Design', icon: 'ph-file-html', color: 'text-orange-500', bg: 'bg-orange-100 dark:bg-orange-900/30', progress: 100, lessons: 8 },
            { id: 'c4', title: 'C++ Data Structures', icon: 'ph-file-c', color: 'text-indigo-500', bg: 'bg-indigo-100 dark:bg-indigo-900/30', progress: 0, lessons: 15 }
        ],
        challenges: [
            { id: 1, title: 'Reverse a String', level: 'Easy', pts: 10, completed: true },
            { id: 2, title: 'Find the Factorial', level: 'Medium', pts: 20, completed: false },
            { id: 3, title: 'Binary Tree Inversion', level: 'Hard', pts: 50, completed: false }
        ],
        achievements: [
            { icon: 'ph-fire', title: '7 Day Streak', desc: 'Learned for 7 days straight', earned: true },
            { icon: 'ph-medal', title: 'JS Beginner', desc: 'Completed 5 JS lessons', earned: true },
            { icon: 'ph-trophy', title: 'Challenge Master', desc: 'Solve 10 Hard challenges', earned: false }
        ],
        plans: [
            {
                id: 'pro_lifetime',
                title: 'ProgramPros PRO',
                price: 499,
                desc: 'Unlock all premium courses, advanced challenges, and priority support.',
                features: ['All Premium Courses', 'Unlimited Code Execution', 'Priority Forum Support', 'Verified Pro Badge', 'Downloadable Source Codes']
            }
        ]
    };

    // --- UTILITIES ---
    const $ = id => document.getElementById(id);
    
    window.showToast = function(message, type = 'success') {
        const toast = document.createElement('div');
        const icon = type === 'success' ? '<i class="ph ph-check-circle text-xl text-green-500"></i>' : '<i class="ph ph-info text-xl text-blue-500"></i>';
        toast.className = `toast animate-slide-up flex items-center gap-3 p-4 rounded-xl shadow-lg bg-white dark:bg-darkCard border-l-4 ${type === 'success' ? 'border-green-500' : 'border-blue-500'}`;
        toast.innerHTML = `${icon} <span class="font-medium text-sm text-gray-800 dark:text-gray-200">${message}</span>`;
        $('toast-container').appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    window.fireConfetti = function() {
        const colors = ['#4F46E5', '#9333EA', '#10B981', '#F59E0B', '#EF4444', '#3B82F6'];
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-piece';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-20px';
            confetti.style.width = Math.random() * 8 + 6 + 'px';
            confetti.style.height = Math.random() * 8 + 6 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            $('mobile-container').appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }
    }

    window.toggleTheme = function() {
        const html = document.documentElement;
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            AppState.theme = 'light';
        } else {
            html.classList.add('dark');
            AppState.theme = 'dark';
        }
        renderApp();
    }

    window.navigate = function(page, params = {}) {
        AppState.currentPage = page;
        if (params.courseId) AppState.currentCourseId = params.courseId;
        renderApp();
        $('app-root').scrollTo(0,0);
    }

    window.logout = async function() {
        if (auth) await signOut(auth);
        AppState.user = null;
        showToast('Logged out securely.', 'info');
        navigate('welcome');
    }

    // --- AUTHENTICATION LOGIC ---
    window.handleSignup = async function(event) {
        const name = $('signup-name').value;
        const email = $('signup-email').value;
        const pwd = $('signup-pwd').value;
        
        if (!name || !email || !pwd) return showToast('Please fill all fields', 'error');
        
        const btn = event.currentTarget;
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Processing...';
        btn.disabled = true;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
            await updateProfile(userCredential.user, { displayName: name });
            await sendEmailVerification(userCredential.user);
            
            showToast('Account created! Verification email sent. Please check your inbox.', 'success');
            await signOut(auth); // Force log out until they verify
            navigate('login');
        } catch (error) {
            showToast(error.message.replace('Firebase: ', ''), 'error');
            btn.innerHTML = 'Sign Up';
            btn.disabled = false;
        }
    }

    window.handleLogin = async function(event) {
        const email = $('login-email').value;
        const pwd = $('login-pwd').value;
        
        if (!email || !pwd) return showToast('Please fill all fields', 'error');

        const btn = event.currentTarget;
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Processing...';
        btn.disabled = true;

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, pwd);
            
            // Check Email Verification
            if (!userCredential.user.emailVerified) {
                showToast('Please verify your email address to continue.', 'error');
                await signOut(auth);
                btn.innerHTML = 'Log In';
                btn.disabled = false;
                return;
            }
            
            showToast('Logged in successfully!', 'success');
            // Note: onAuthStateChanged will handle the redirect to dashboard
        } catch (error) {
            showToast('Invalid email or password.', 'error');
            btn.innerHTML = 'Log In';
            btn.disabled = false;
        }
    }

    // --- PHONE VERIFICATION LOGIC ---
    window.sendPhoneOTP = async function() {
        const phone = $('phone-input').value.trim();
        if (!phone.startsWith('+')) return showToast('Include country code (e.g., +91)', 'error');

        try {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }
            $('btn-send-otp').innerHTML = '<i class="ph ph-spinner animate-spin"></i>';
            
            window.confirmationResult = await linkWithPhoneNumber(auth.currentUser, phone, window.recaptchaVerifier);
            
            showToast('OTP sent via SMS!', 'success');
            $('btn-send-otp').innerHTML = 'Sent';
            $('otp-section').style.display = 'flex';
        } catch (error) {
            showToast(error.message.replace('Firebase: ', ''), 'error');
            $('btn-send-otp').innerHTML = 'Send OTP';
        }
    }

    window.verifyOTP = async function() {
        const otp = $('otp-input').value.trim();
        if (!otp) return showToast('Enter OTP', 'error');

        try {
            $('btn-verify-otp').innerHTML = '<i class="ph ph-spinner animate-spin"></i>';
            await window.confirmationResult.confirm(otp);
            
            showToast('Mobile number verified & linked!', 'success');
            $('otp-section').style.display = 'none';
            $('phone-input').disabled = true;
            $('btn-send-otp').style.display = 'none';
            
            // Sync to firestore
            if (db && AppState.user) {
                const userRef = doc(db, 'artifacts', appId, 'users', AppState.user.uid, 'profile', 'main');
                await updateDoc(userRef, { phone: $('phone-input').value });
            }
        } catch (error) {
            showToast('Invalid OTP entered.', 'error');
            $('btn-verify-otp').innerHTML = 'Verify';
        }
    }

    // --- FIREBASE DATA SYNC ---
    async function initializeUserData(uid, firebaseUser) {
        if (!db) return;
        const userRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'main');
        const userSnap = await getDoc(userRef);
        
        if (!userSnap.exists()) {
            // Create default profile for new user
            await setDoc(userRef, {
                name: firebaseUser.displayName || 'Student ' + uid.substring(0, 4).toUpperCase(),
                email: firebaseUser.email || 'student@example.com',
                phone: firebaseUser.phoneNumber || '',
                avatar: 'https://ui-avatars.com/api/?name=' + (firebaseUser.displayName || 'Student') + '&background=random',
                studentId: 'PP-' + Math.floor(Math.random() * 90000 + 10000),
                joinDate: new Date().toLocaleDateString('en-US', { month: 'short', year: 'numeric' }),
                level: 1,
                points: 0,
                isPro: false
            });
        } else if (firebaseUser.phoneNumber && !userSnap.data().phone) {
            // If phone was linked, update document
            await updateDoc(userRef, { phone: firebaseUser.phoneNumber });
        }

        // Listen for live updates
        onSnapshot(userRef, (doc) => {
            if (doc.exists()) {
                AppState.user = { uid, ...doc.data() };
                if (['dashboard', 'profile', 'community', 'courses', 'challenges'].includes(AppState.currentPage)) {
                    renderApp(); // Re-render to show updated points/pro status
                }
            }
        }, (error) => console.error("Error listening to profile:", error));
    }

    function listenToForum() {
        if (!db) return;
        const forumRef = collection(db, 'artifacts', appId, 'public', 'data', 'forum_posts');
        onSnapshot(forumRef, (snapshot) => {
            let posts = [];
            snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
            // Sort by time descending in memory
            posts.sort((a, b) => b.time - a.time);
            
            // Seed default posts if empty
            if (posts.length === 0 && AppState.user) {
                seedDefaultForumPosts(forumRef);
            }
            
            AppState.forumPosts = posts;
            if (AppState.currentPage === 'community') renderApp();
        }, (error) => console.error("Error listening to forum:", error));
    }

    async function seedDefaultForumPosts(forumRef) {
        const defaults = [
            { user: 'Alex J.', avatar: 'https://i.pravatar.cc/150?u=alex', time: Date.now() - 7200000, text: 'What is the difference between let and var in JS?' },
            { user: 'Sarah M.', avatar: 'https://i.pravatar.cc/150?u=sarah', time: Date.now() - 18000000, text: 'Finally built my first React app using ProgramPros! 🎉' }
        ];
        for (let post of defaults) {
            await addDoc(forumRef, post);
        }
    }

    // --- RENDER ENGINE ---
    window.renderApp = function() {
        const root = $('app-root');
        const nav = $('bottom-nav');
        
        let html = '';
        switch(AppState.currentPage) {
            case 'welcome': html = renderWelcome(); break;
            case 'login': html = renderLogin(); break;
            case 'signup': html = renderSignup(); break;
            case 'dashboard': html = AppState.user ? renderDashboard() : renderLoading(); break;
            case 'courses': html = AppState.user ? renderCourses() : renderLoading(); break;
            case 'courseDetail': html = renderCourseDetail(); break;
            case 'lesson': html = renderLesson(); break;
            case 'editor': html = renderEditor(); break;
            case 'quiz': html = renderQuiz(); break;
            case 'challenges': html = AppState.user ? renderChallenges() : renderLoading(); break;
            case 'community': html = AppState.user ? renderCommunity() : renderLoading(); break;
            case 'profile': html = AppState.user ? renderProfile() : renderLoading(); break;
            case 'achievements': html = renderAchievements(); break;
            case 'search': html = renderSearch(); break;
            case 'notifications': html = renderNotifications(); break;
            case 'settings': html = renderSettings(); break;
            case 'studentId': html = renderStudentId(); break;
            case 'teacherId': html = renderTeacherId(); break;
            case 'certificate': html = renderCertificate(); break;
            case 'upgrade': html = renderUpgrade(); break;
            default: html = renderDashboard();
        }
        
        root.innerHTML = html;

        // Manage Bottom Navigation
        const mainPages = ['dashboard', 'courses', 'challenges', 'community', 'profile'];
        if (AppState.user && mainPages.includes(AppState.currentPage)) {
            nav.style.display = 'flex';
            nav.innerHTML = renderBottomNav();
        } else {
            nav.style.display = 'none';
        }
    }

    // --- SCREENS ---

    function renderLoading() {
        return `
        <div class="h-full flex items-center justify-center bg-gray-50 dark:bg-dark">
            <div class="flex flex-col items-center gap-4">
                <i class="ph ph-spinner animate-spin text-4xl text-primary"></i>
                <p class="text-gray-500 font-medium text-sm">Loading user profile...</p>
            </div>
        </div>`;
    }

    function renderWelcome() {
        return `
        <div class="h-full flex flex-col items-center justify-center p-8 bg-gradient-to-br from-blue-600 to-purple-700 text-white animate-fade-in relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none">
                <div class="absolute top-10 left-10 w-32 h-32 bg-white rounded-full mix-blend-overlay blur-3xl animate-pulse-slow"></div>
                <div class="absolute bottom-10 right-10 w-48 h-48 bg-purple-300 rounded-full mix-blend-overlay blur-3xl animate-pulse-slow" style="animation-delay: 1s;"></div>
            </div>
            
            <div class="z-10 flex flex-col items-center text-center">
                <div class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center mb-8 shadow-2xl border border-white/30">
                    <i class="ph-fill ph-code text-5xl text-white"></i>
                </div>
                <h1 class="text-4xl font-bold mb-3 tracking-tight">ProgramPros</h1>
                <p class="text-blue-100 text-lg mb-10 max-w-xs">Master programming step-by-step with interactive lessons and real code.</p>
                
                <div class="w-full space-y-4 max-w-sm">
                    <button onclick="navigate('signup')" class="w-full py-4 bg-white text-primary font-bold rounded-2xl shadow-lg hover:shadow-xl transition-all active:scale-95 text-lg">Get Started</button>
                    <button onclick="navigate('login')" class="w-full py-4 bg-white/10 backdrop-blur-md text-white font-bold rounded-2xl border border-white/20 hover:bg-white/20 transition-all active:scale-95 text-lg">Log In</button>
                </div>
            </div>
        </div>
        `;
    }

    function renderLogin() {
        return `
        <div class="h-full flex flex-col p-6 animate-fade-in bg-white dark:bg-dark">
            <button onclick="navigate('welcome')" class="self-start p-2 -ml-2 text-gray-500 dark:text-gray-400 mb-6"><i class="ph ph-arrow-left text-2xl"></i></button>
            <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-8">Sign in to continue your learning journey.</p>

        // Show loading state
        out.innerHTML = '<div class="flex items-center gap-2 text-blue-400"><i class="ph ph-spinner animate-spin text-xl"></i> Executing code...</div>';
        runBtn.disabled = true;
        runBtn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Running';
        runBtn.classList.add('opacity-75', 'cursor-not-allowed');

        // Simulate backend execution delay
        setTimeout(() => {
            out.innerHTML = '';
            runBtn.disabled = false;
            runBtn.innerHTML = '<i class="ph-fill ph-play"></i> Run';
            runBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            
            // Mocking console.log
            const originalLog = console.log;
            let logs = [];
            console.log = (...args) => {
                logs.push(args.join(' '));
                originalLog(...args);
            };

            try {
                // Evaluates the JS code
                eval(code);
                if (logs.length > 0) {
                    out.innerHTML = logs.map(l => `<div class="text-green-400">> ${l}</div>`).join('');
                } else {
                    out.innerHTML = `<div class="text-gray-400 italic">Code executed successfully (No output)</div>`;
                }
            } catch (error) {
                out.innerHTML = `<div class="text-red-500 font-bold">> Error: ${error.message}</div>`;
            } finally {
                console.log = originalLog; // Restore normal console.log
            }
        }, 800);
    }

    window.processUPIPayment = function(amount, planName) {
        const btn = $('pay-button');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Processing...';
        const upiId = "bholanathk460@okhdfcbank";
        const payeeName = "ProgramPros";
        const transactionNote = "Upgrade to " + planName;
        const upiUrl = \`upi://pay?pa=\${upiId}&pn=\${encodeURIComponent(payeeName)}&am=\${amount}&cu=INR&tn=\${encodeURIComponent(transactionNote)}\`;

        showToast('Opening payment app...', 'info');

        setTimeout(() => {
            // Attempt to open the UPI app
            window.location.href = upiUrl;

            // Simulate the secure backend Webhook Verification
            // (In a real app, a payment gateway verifies this and updates the DB via webhook)
            setTimeout(async () => {
                if (AppState.user) {
                    try {
                        if (db) {
                            const userRef = doc(db, 'artifacts', appId, 'users', AppState.user.uid, 'profile', 'main');
                            await updateDoc(userRef, { isPro: true });
                        } else {
                            AppState.user.isPro = true; // Fallback update
                        }
                        showToast('Payment Verified! Welcome to Pro.', 'success');
                        fireConfetti();
                        navigate('profile');
                    } catch (e) {
                        console.error("Upgrade failed:", e);
                    }
                }
            }, 3000);
        }, 500);
    }

    // --- INITIALIZATION ---
    async function startApp() {
        // Render initial screen
        renderApp();

        if (auth) {
            // Setup Firebase Authentication
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch(e) {
                    console.error("Auth init failed:", e);
                    showToast("Failed to connect securely. Proceeding offline.", 'info');
                }
            };

            await initAuth();

            onAuthStateChanged(auth, async (user) => {
                AppState.authReady = true;
                if (user && user.emailVerified === false && !user.isAnonymous) {
                    // Do nothing, force them to log out/verify
                    return;
                }
                
                if (user) {
                    await initializeUserData(user.uid, user);
                    listenToForum();
                    if (AppState.currentPage === 'login' || AppState.currentPage === 'welcome' || AppState.currentPage === 'signup') {
                        navigate('dashboard');
                    }
                } else {
                    AppState.user = null;
                }
            });
        }
    }

    // Execute immediately (type="module" scripts are deferred automatically, so DOM is ready)
    startApp();
