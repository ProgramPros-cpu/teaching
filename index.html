<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <title>ProgramPros - Learn to Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#9333EA',
                        dark: '#0F172A',
                        darkCard: '#1E293B'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        #mobile-container {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #f8fafc;
        }
        .dark #mobile-container { background-color: #0f172a; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .gradient-text {
            background: linear-gradient(135deg, #4F46E5, #9333EA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5, #9333EA); }
        
        #code-editor-textarea {
            tab-size: 4;
            font-family: monospace;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { pointer-events: auto; transition: all 0.3s ease; }
        
        .confetti-piece { position: absolute; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
        
        .cursor-blink { animation: blink 1s step-end infinite; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

<div id="mobile-container" class="flex flex-col-reverse md:flex-row h-screen text-gray-800 dark:text-gray-100">
    <nav id="bottom-nav" class="hidden bg-white dark:bg-darkCard border-t md:border-t-0 md:border-r border-gray-200 dark:border-gray-800 px-6 py-3 md:py-8 md:px-2 flex-row md:flex-col justify-between md:justify-start items-center z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] md:w-20 shrink-0 gap-1 md:gap-8 overflow-y-auto hide-scroll"></nav>
    <div class="flex-1 flex flex-col relative overflow-hidden h-full w-full">
        <div id="toast-container" class="flex flex-col gap-2"></div>
        <main id="app-root" class="flex-1 overflow-y-auto overflow-x-hidden relative w-full h-full bg-gray-50 dark:bg-[#0f172a]"></main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut, RecaptchaVerifier, linkWithPhoneNumber, signInWithPhoneNumber, EmailAuthProvider, linkWithCredential, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, addDoc, arrayUnion, query, where, getDocs, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

    // --- FIREBASE INITIALIZATION ---
    let app, auth, db, storage, analytics;
    
    const firebaseConfig = {
        apiKey: "AIzaSyCgJvSkhGL-zJ0pXYrXt43z7LZB-CfOI48",
        authDomain: "font-changer-4667c.firebaseapp.com",
        projectId: "font-changer-4667c",
        storageBucket: "font-changer-4667c.firebasestorage.app",
        messagingSenderId: "200130160747",
        appId: "1:200130160747:web:747975551ddb296dc2a92e",
        measurementId: "G-ECHQ4K1R5J"
    };

    try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        storage = getStorage(app);
        analytics = getAnalytics(app);
    } catch (e) {
        console.error("Firebase init failed:", e);
    }

    // --- APP STATE & DATA ---
    window.AppState = {
        currentPage: 'welcome',
        user: null,
        isAdmin: false,
        isTeacher: false,
        isPro: false,
        forumPosts: [],
        theme: 'light',
        authMode: 'email',
        signupStep: 1,
        signupContact: '',
        signupType: 'email',
        currentCourseId: null,
        currentLessonId: null,
        authReady: false,
        isPostModalOpen: false,
        isCreateCourseModalOpen: false,
        isAddContentModalOpen: false,
        selectedCourseForContent: null,
        selectedContentType: 'video',
        teacherRequests: [],
        studentDetails: [],
        courses: [],
        teacherCourses: []
    };

    // --- UTILITIES ---
    const $ = id => document.getElementById(id);
    
    window.showToast = function(message, type = 'success') {
        const toast = document.createElement('div');
        const icon = type === 'success' ? '<i class="ph ph-check-circle text-xl text-green-500"></i>' : type === 'error' ? '<i class="ph ph-warning-circle text-xl text-red-500"></i>' : '<i class="ph ph-info text-xl text-blue-500"></i>';
        toast.className = `toast animate-slide-up flex items-center gap-3 p-4 rounded-xl shadow-lg bg-white dark:bg-darkCard border-l-4 ${type === 'success' ? 'border-green-500' : type === 'error' ? 'border-red-500' : 'border-blue-500'}`;
        toast.innerHTML = `${icon} <span class="font-medium text-sm text-gray-800 dark:text-gray-200">${message}</span>`;
        $('toast-container').appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    window.togglePassword = function(inputId, btn) {
        const input = $(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('ph-eye', 'ph-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('ph-eye-slash', 'ph-eye');
        }
    }

    window.handleEnter = function(e, actionFn) {
        if (e.key === 'Enter') {
            e.preventDefault();
            actionFn();
        }
    }

    window.fireConfetti = function() {
        const colors = ['#4F46E5', '#9333EA', '#10B981', '#F59E0B', '#EF4444', '#3B82F6'];
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-piece';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-20px';
            confetti.style.width = Math.random() * 8 + 6 + 'px';
            confetti.style.height = Math.random() * 8 + 6 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            $('mobile-container').appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }
    }

    window.toggleTheme = function() {
        const html = document.documentElement;
        html.classList.toggle('dark');
        AppState.theme = html.classList.contains('dark') ? 'dark' : 'light';
        renderApp();
    }

    window.navigate = function(page, params = {}) {
        AppState.currentPage = page;
        if (params.courseId) AppState.currentCourseId = params.courseId;
        if (params.lessonId) AppState.currentLessonId = params.lessonId;
        
        AppState.isPostModalOpen = false;
        AppState.isCreateCourseModalOpen = false;
        AppState.isAddContentModalOpen = false;
        
        if (page === 'login') AppState.authMode = 'email';
        if (page === 'signup') {
            AppState.signupStep = 1;
            AppState.signupContact = '';
        }
        
        if (window.recaptchaVerifier) {
            try { window.recaptchaVerifier.clear(); } catch(e){}
            window.recaptchaVerifier = null;
        }

        renderApp();
        $('app-root').scrollTo(0,0);
    }

    window.logout = async function() {
        if (auth) await signOut(auth);
        AppState.user = null;
        AppState.isAdmin = false;
        AppState.isTeacher = false;
        AppState.isPro = false;
        showToast('Logged out securely.', 'info');
        navigate('welcome');
    }

    // --- PASSWORD GENERATOR ---
    function generatePassword(length = 12) {
        const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
        let password = '';
        for (let i = 0; i < length; i++) {
            password += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return password;
    }

    // --- ADMIN FUNCTIONS ---
    window.createTeacherAccount = async function() {
        const email = document.getElementById('teacher-email').value;
        if (!email) return showToast('Please enter teacher email', 'error');
        
        const btn = document.getElementById('create-teacher-btn');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Creating...';
        btn.disabled = true;
        
        try {
            const password = generatePassword();
            
            // Create user in Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCredential.user.uid;
            
            // Set teacher role in Firestore
            const teacherRef = doc(db, 'users', uid);
            await setDoc(teacherRef, {
                email: email,
                name: email.split('@')[0],
                role: 'teacher',
                isTeacher: true,
                isAdmin: false,
                isPro: true,
                createdAt: new Date().toISOString(),
                createdBy: AppState.user?.uid || 'admin'
            });
            
            // Store credentials temporarily
            const tempCredRef = doc(db, 'temp_teacher_creds', uid);
            await setDoc(tempCredRef, {
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            });
            
            showToast(`Teacher created! Email: ${email}, Password: ${password}`, 'success');
            
            // Clear input
            document.getElementById('teacher-email').value = '';
            
            // Refresh teacher list
            loadTeacherRequests();
            
        } catch (error) {
            showToast('Error creating teacher: ' + error.message, 'error');
        } finally {
            btn.innerHTML = 'Create Teacher Account';
            btn.disabled = false;
        }
    };

    window.approvePayment = async function(userId, courseId) {
        try {
            const userRef = doc(db, 'users', userId);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists()) {
                const userData = userSnap.data();
                const pendingCourses = userData.pendingCourses || [];
                const unlockedCourses = userData.unlockedCourses || [];
                
                // Remove from pending, add to unlocked
                const updatedPending = pendingCourses.filter(id => id !== courseId);
                const updatedUnlocked = [...unlockedCourses, courseId];
                
                await updateDoc(userRef, {
                    pendingCourses: updatedPending,
                    unlockedCourses: updatedUnlocked,
                    isPro: updatedUnlocked.length > 0 ? true : userData.isPro
                });
                
                showToast('Payment approved! Course unlocked.', 'success');
                loadTeacherRequests();
            }
        } catch (error) {
            showToast('Error approving payment: ' + error.message, 'error');
        }
    };

    window.rejectPayment = async function(userId, courseId) {
        try {
            const userRef = doc(db, 'users', userId);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists()) {
                const userData = userSnap.data();
                const pendingCourses = userData.pendingCourses || [];
                
                // Remove from pending
                const updatedPending = pendingCourses.filter(id => id !== courseId);
                
                await updateDoc(userRef, {
                    pendingCourses: updatedPending
                });
                
                showToast('Payment rejected.', 'info');
                loadTeacherRequests();
            }
        } catch (error) {
            showToast('Error rejecting payment: ' + error.message, 'error');
        }
    };

    // --- TEACHER FUNCTIONS ---
    window.createCourse = async function() {
        const title = document.getElementById('course-title').value;
        const description = document.getElementById('course-description').value;
        const price = document.getElementById('course-price').value;
        const icon = document.getElementById('course-icon').value || 'ph-book-open';
        const color = document.getElementById('course-color').value || 'text-blue-500';
        
        if (!title || !description || !price) {
            return showToast('Please fill all required fields', 'error');
        }
        
        const btn = document.getElementById('create-course-btn');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Creating...';
        btn.disabled = true;
        
        try {
            const courseId = 'course_' + Date.now();
            const courseData = {
                id: courseId,
                title: title,
                description: description,
                price: parseFloat(price),
                icon: icon,
                color: color,
                bg: 'bg-blue-100 dark:bg-blue-900/30',
                progress: 0,
                lessons: 0,
                teacherId: AppState.user?.uid,
                teacherName: AppState.user?.name || 'Teacher',
                createdAt: new Date().toISOString(),
                syllabus: [],
                students: []
            };
            
            // Save to Firestore
            const courseRef = doc(db, 'courses', courseId);
            await setDoc(courseRef, courseData);
            
            showToast('Course created successfully!', 'success');
            AppState.isCreateCourseModalOpen = false;
            
            // Refresh courses
            loadTeacherCourses();
            
        } catch (error) {
            showToast('Error creating course: ' + error.message, 'error');
        } finally {
            btn.innerHTML = 'Create Course';
            btn.disabled = false;
        }
    };

    window.addCourseContent = async function() {
        const courseId = AppState.selectedCourseForContent;
        const type = AppState.selectedContentType;
        
        let contentData = {
            id: 'content_' + Date.now(),
            type: type,
            title: document.getElementById('content-title').value,
            duration: document.getElementById('content-duration').value || '10 mins',
            isPremium: document.getElementById('content-premium').checked,
            order: Date.now()
        };
        
        if (type === 'video') {
            contentData.url = document.getElementById('content-url').value;
        } else if (type === 'pdf') {
            contentData.url = document.getElementById('content-pdf').value;
        } else if (type === 'note') {
            contentData.content = document.getElementById('content-note').value;
        } else if (type === 'quiz') {
            // Quiz creation logic
            contentData.questions = [];
        }
        
        if (!contentData.title) {
            return showToast('Please enter a title', 'error');
        }
        
        const btn = document.getElementById('add-content-btn');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Adding...';
        btn.disabled = true;
        
        try {
            const courseRef = doc(db, 'courses', courseId);
            const courseSnap = await getDoc(courseRef);
            
            if (courseSnap.exists()) {
                const courseData = courseSnap.data();
                const syllabus = courseData.syllabus || [];
                syllabus.push(contentData);
                
                await updateDoc(courseRef, {
                    syllabus: syllabus,
                    lessons: syllabus.length
                });
                
                showToast('Content added successfully!', 'success');
                AppState.isAddContentModalOpen = false;
                
                // Refresh course data
                loadTeacherCourses();
            }
        } catch (error) {
            showToast('Error adding content: ' + error.message, 'error');
        } finally {
            btn.innerHTML = 'Add Content';
            btn.disabled = false;
        }
    };

    // --- TEACHER REQUEST FUNCTIONS ---
    window.requestTeacherAccess = async function() {
        if (!AppState.user) {
            return showToast('Please login first', 'error');
        }
        
        const btn = document.getElementById('request-teacher-btn');
        if (btn) {
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Requesting...';
            btn.disabled = true;
        }
        
        try {
            const requestRef = collection(db, 'teacher_requests');
            await addDoc(requestRef, {
                userId: AppState.user.uid,
                userName: AppState.user.name,
                userEmail: AppState.user.email,
                requestedAt: new Date().toISOString(),
                status: 'pending'
            });
            
            showToast('Teacher access requested. Admin will review.', 'success');
        } catch (error) {
            showToast('Error requesting teacher access: ' + error.message, 'error');
        } finally {
            if (btn) {
                btn.innerHTML = 'Request Teacher Access';
                btn.disabled = false;
            }
        }
    };

    window.approveTeacherRequest = async function(requestId, userId, userEmail) {
        try {
            // Generate teacher credentials
            const teacherEmail = userEmail || `teacher${Date.now()}@programpros.com`;
            const password = generatePassword();
            
            // Update user role
            const userRef = doc(db, 'users', userId);
            await updateDoc(userRef, {
                isTeacher: true,
                role: 'teacher',
                teacherId: `TCH-${Date.now().toString().slice(-6)}`
            });
            
            // Update request status
            const requestRef = doc(db, 'teacher_requests', requestId);
            await updateDoc(requestRef, {
                status: 'approved',
                approvedAt: new Date().toISOString(),
                teacherEmail: teacherEmail,
                teacherPassword: password
            });
            
            showToast(`Teacher approved! Email: ${teacherEmail}, Password: ${password}`, 'success');
            loadTeacherRequests();
            
        } catch (error) {
            showToast('Error approving teacher: ' + error.message, 'error');
        }
    };

    // --- LOAD DATA FUNCTIONS ---
    async function loadTeacherRequests() {
        if (!db || !AppState.isAdmin) return;
        
        try {
            const requestsRef = collection(db, 'teacher_requests');
            const q = query(requestsRef, where('status', '==', 'pending'));
            const querySnapshot = await getDocs(q);
            
            const requests = [];
            querySnapshot.forEach((doc) => {
                requests.push({ id: doc.id, ...doc.data() });
            });
            
            AppState.teacherRequests = requests;
            
            // Load payment requests
            const usersRef = collection(db, 'users');
            const usersSnap = await getDocs(usersRef);
            
            const paymentRequests = [];
            usersSnap.forEach((doc) => {
                const userData = doc.data();
                if (userData.pendingCourses && userData.pendingCourses.length > 0) {
                    paymentRequests.push({
                        userId: doc.id,
                        ...userData,
                        pendingCourses: userData.pendingCourses
                    });
                }
            });
            
            AppState.studentDetails = paymentRequests;
            
            if (AppState.currentPage === 'admin') {
                renderApp();
            }
        } catch (error) {
            console.error("Error loading requests:", error);
        }
    }

    async function loadTeacherCourses() {
        if (!db || !AppState.user) return;
        
        try {
            const coursesRef = collection(db, 'courses');
            const q = query(coursesRef, where('teacherId', '==', AppState.user.uid));
            const querySnapshot = await getDocs(q);
            
            const courses = [];
            querySnapshot.forEach((doc) => {
                courses.push({ id: doc.id, ...doc.data() });
            });
            
            AppState.teacherCourses = courses;
            
            // Also load all courses for general view
            const allCoursesSnap = await getDocs(coursesRef);
            const allCourses = [];
            allCoursesSnap.forEach((doc) => {
                allCourses.push({ id: doc.id, ...doc.data() });
            });
            
            AppState.courses = allCourses;
            
            if (AppState.currentPage === 'teacher' || AppState.currentPage === 'courses') {
                renderApp();
            }
        } catch (error) {
            console.error("Error loading courses:", error);
        }
    }

    async function loadStudentDetails() {
        if (!db || !(AppState.isAdmin || AppState.isTeacher)) return;
        
        try {
            const usersRef = collection(db, 'users');
            const usersSnap = await getDocs(usersRef);
            
            const students = [];
            usersSnap.forEach((doc) => {
                const userData = doc.data();
                if (userData.role !== 'teacher' && userData.role !== 'admin') {
                    students.push({
                        uid: doc.id,
                        ...userData
                    });
                }
            });
            
            AppState.studentDetails = students;
            
            if (AppState.currentPage === 'teacher') {
                renderApp();
            }
        } catch (error) {
            console.error("Error loading students:", error);
        }
    }

    // --- INITIALIZE USER DATA ---
    async function initializeUserData(uid, firebaseUser) {
        if (!db) return;
        
        const userRef = doc(db, 'users', uid);
        const userSnap = await getDoc(userRef);
        
        // Check if this is the admin email
        const isAdminEmail = firebaseUser.email === 'joykumbhakar101@gmail.com';
        
        if (!userSnap.exists()) {
            // Create new user profile
            const userData = {
                uid: uid,
                name: firebaseUser.displayName || 'Student ' + uid.substring(0, 4).toUpperCase(),
                email: firebaseUser.email || '',
                phone: firebaseUser.phoneNumber || '',
                avatar: firebaseUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(firebaseUser.displayName || 'Student')}&background=random`,
                studentId: 'PP-' + Math.floor(Math.random() * 90000 + 10000),
                joinDate: new Date().toLocaleDateString('en-US', { month: 'short', year: 'numeric' }),
                level: 1,
                points: 0,
                unlockedCourses: [],
                pendingCourses: [],
                isAdmin: isAdminEmail,
                isTeacher: false,
                isPro: false,
                role: isAdminEmail ? 'admin' : 'student'
            };
            
            await setDoc(userRef, userData);
            
            AppState.user = userData;
            AppState.isAdmin = isAdminEmail;
            AppState.isTeacher = false;
            AppState.isPro = false;
            
        } else {
            // Update existing user
            const userData = userSnap.data();
            
            // Update admin status if email matches
            if (isAdminEmail && !userData.isAdmin) {
                await updateDoc(userRef, { 
                    isAdmin: true,
                    role: 'admin'
                });
                userData.isAdmin = true;
                userData.role = 'admin';
            }
            
            AppState.user = { uid, ...userData };
            AppState.isAdmin = userData.isAdmin || false;
            AppState.isTeacher = userData.isTeacher || false;
            AppState.isPro = userData.isPro || false;
        }
        
        // Set up real-time listener
        onSnapshot(userRef, (doc) => {
            if (doc.exists()) {
                const updatedData = doc.data();
                AppState.user = { uid, ...updatedData };
                AppState.isAdmin = updatedData.isAdmin || false;
                AppState.isTeacher = updatedData.isTeacher || false;
                AppState.isPro = updatedData.isPro || false;
                
                if (['dashboard', 'profile', 'courses', 'admin', 'teacher'].includes(AppState.currentPage)) {
                    renderApp();
                }
            }
        });
        
        // Load relevant data based on role
        if (AppState.isAdmin) {
            loadTeacherRequests();
        }
        
        if (AppState.isTeacher) {
            loadTeacherCourses();
            loadStudentDetails();
        }
        
        // Load all courses
        const coursesRef = collection(db, 'courses');
        const coursesSnap = await getDocs(coursesRef);
        const courses = [];
        coursesSnap.forEach((doc) => {
            courses.push({ id: doc.id, ...doc.data() });
        });
        AppState.courses = courses;
    }

    // --- AUTHENTICATION FUNCTIONS ---
    window.handleGoogleLogin = async function(event) {
        const btn = event.currentTarget;
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i>';
        btn.disabled = true;

        try {
            const provider = new GoogleAuthProvider();
            const result = await signInWithPopup(auth, provider);
            showToast('Logged in with Google successfully!', 'success');
            navigate('dashboard');
        } catch (error) {
            console.error("Google Auth Error:", error);
            showToast(error.message.replace('Firebase: ', ''), 'error');
            btn.innerHTML = originalContent;
            btn.disabled = false;
        }
    }

    window.handleLogin = async function() {
        const email = $('login-email').value;
        const pwd = $('login-pwd').value;
        
        if (!email || !pwd) return showToast('Please fill all fields', 'error');

        const btn = $('btn-login');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Processing...';
        btn.disabled = true;

        try {
            await signInWithEmailAndPassword(auth, email, pwd);
            showToast('Logged in successfully!', 'success');
            navigate('dashboard');
        } catch (error) {
            showToast('Invalid email or password.', 'error');
            btn.innerHTML = 'Log In';
            btn.disabled = false;
        }
    }

    window.handleSignup = async function() {
        const name = $('signup-name').value.trim();
        const email = $('signup-email').value.trim();
        const pwd = $('signup-pwd').value;

        if (!name || !email || !pwd) return showToast('Please fill all fields', 'error');

        const btn = $('btn-signup');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Creating...';
        btn.disabled = true;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
            await updateProfile(userCredential.user, { displayName: name });
            showToast('Account created successfully!', 'success');
            navigate('dashboard');
        } catch (e) {
            showToast(e.message.replace('Firebase: ', ''), 'error');
            btn.innerHTML = 'Sign Up';
            btn.disabled = false;
        }
    }

    // --- PAYMENT FUNCTIONS ---
    window.notifyAdminPayment = async function(courseId, courseName) {
        const btn = $('pay-button');
        if (btn) {
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Submitting...';
            btn.disabled = true;
        }

        try {
            const userRef = doc(db, 'users', AppState.user.uid);
            await updateDoc(userRef, { 
                pendingCourses: arrayUnion(courseId) 
            });
            
            showToast(`Payment notification sent! Verification pending.`, 'success');
            navigate('courseDetail', { courseId: courseId });
        } catch (e) {
            console.error("Payment notification failed:", e);
            showToast('Error submitting request. Please try again.', 'error');
            if (btn) {
                btn.innerHTML = 'I have paid <i class="ph-fill ph-check-circle"></i>';
                btn.disabled = false;
            }
        }
    }

    // --- INITIALIZATION ---
    async function startApp() {
        renderApp();

        if (auth) {
            onAuthStateChanged(auth, async (user) => {
                AppState.authReady = true;
                
                if (user) {
                    await initializeUserData(user.uid, user);
                    
                    if (AppState.currentPage === 'login' || AppState.currentPage === 'welcome' || AppState.currentPage === 'signup') {
                        navigate('dashboard');
                    }
                } else {
                    AppState.user = null;
                    AppState.isAdmin = false;
                    AppState.isTeacher = false;
                    AppState.isPro = false;
                }
                
                renderApp();
            });
        }
    }

    // --- RENDER FUNCTIONS ---
    window.renderApp = function() {
        const root = $('app-root');
        const nav = $('bottom-nav');
        
        let html = '';
        
        // Check role-based routing
        if (AppState.isAdmin && AppState.currentPage === 'admin') {
            html = renderAdminDashboard();
        } else if (AppState.isTeacher && AppState.currentPage === 'teacher') {
            html = renderTeacherDashboard();
        } else {
            switch(AppState.currentPage) {
                case 'welcome': html = renderWelcome(); break;
                case 'login': html = renderLogin(); break;
                case 'signup': html = renderSignup(); break;
                case 'dashboard': html = AppState.user ? renderDashboard() : renderLoading(); break;
                case 'courses': html = AppState.user ? renderCourses() : renderLoading(); break;
                case 'courseDetail': html = renderCourseDetail(); break;
                case 'lesson': html = renderLesson(); break;
                case 'editor': html = renderEditor(); break;
                case 'quiz': html = renderQuiz(); break;
                case 'challenges': html = AppState.user ? renderChallenges() : renderLoading(); break;
                case 'community': html = AppState.user ? renderCommunity() : renderLoading(); break;
                case 'profile': html = AppState.user ? renderProfile() : renderLoading(); break;
                case 'studentId': html = renderStudentId(); break;
                case 'certificate': html = renderCertificate(); break;
                case 'upgrade': html = renderUpgrade(); break;
                default: html = renderDashboard();
            }
        }
        
        root.innerHTML = html;

        // Bottom Navigation
        const mainPages = ['dashboard', 'courses', 'challenges', 'community', 'profile'];
        if (AppState.user && mainPages.includes(AppState.currentPage)) {
            nav.style.display = 'flex';
            nav.innerHTML = renderBottomNav();
        } else {
            nav.style.display = 'none';
        }
    }

        const courseId = AppState.currentCourseId || 'c1';
        const course = AppState.courses.find(c => c.id === courseId) || { title: 'Course', price: 299 };
        
        const isUnlocked = AppState.user && AppState.user.unlockedCourses?.includes(courseId);
        const isPending = AppState.user && AppState.user.pendingCourses?.includes(courseId) && !isUnlocked;

        if (isUnlocked) {
            return `

    // --- RENDER LESSON ---
    function renderLesson() {
        const courseId = AppState.currentCourseId;

        const lesson = course?.syllabus?.find(l => l.id === lessonId) || course?.syllabus?.[0];
        
        if (!lesson) return '<div class="p-6 text-center">Lesson not found</div>';
        
        const isUnlocked = AppState.user?.unlockedCourses?.includes(courseId);
        
        if (lesson.isPremium && !isUnlocked) {
            return `
            <div class="flex flex-col h-full items-center justify-center p-6 bg-gray-50 dark:bg-dark text-center">

                <button onclick="navigate('courseDetail')" class="mt-4 text-gray-500 hover:underline">Go Back</button>
            </div>`;
        }

        let contentArea = '';
        if (lesson.type === 'video') {
            contentArea = `

                </div>
            `;
        } else if (lesson.type === 'note') {

                            <h1 class="text-6xl font-serif text-gray-900 border-b-2 border-gray-300 pb-4 mb-8 px-16 inline-block italic">
                                ${AppState.user?.name}
                            </h1>
                            
                            <p class="text-base text-gray-600 mb-3">for successfully completing</p>
                            <h3 class="text-2xl font-bold text-gray-800 mb-auto">Python for Beginners</h3>
                            
                            <div class="w-full flex justify-between items-end mt-12 px-8">
                                <div class="text-center w-48">
                                    <div class="border-b-2 border-gray-400 pb-2 mb-2">
                                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Signature_of_John_Hancock.svg" class="h-12 mx-auto opacity-70">
                                    </div>
                                    <p class="text-xs text-gray-500 uppercase">Lead Instructor</p>
                                </div>
                                
                                <div class="bg-white p-2 border border-gray-200 shadow-sm">
                                    <img src="QR.png" class="w-20 h-20" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CERT:${AppState.user?.studentId}'">
                                </div>
                                
                                <div class="text-center w-48">
                                    <div class="border-b-2 border-gray-400 pb-2 mb-2 text-lg font-bold text-gray-800 h-12 flex items-end justify-center">
                                        March 2026
                                    </div>
                                    <p class="text-xs text-gray-500 uppercase">Date</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button class="mt-8 w-full max-w-sm py-4 gradient-bg text-white font-bold rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="ph ph-download-simple text-xl"></i> Download PDF
                </button>
            </div>
        </div>
        `;
    }

    // --- RENDER EDITOR ---
    function renderEditor() {
        return `
        <div class="flex flex-col h-full animate-fade-in bg-gray-900 text-gray-100">
            <div class="p-4 flex items-center justify-between border-b border-gray-800 bg-gray-900">
                <button onclick="navigate('dashboard')" class="text-gray-400 hover:text-white p-2 hover:bg-gray-800 rounded"><i class="ph ph-x text-xl"></i></button>
                <div class="flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">
                    <i class="ph-fill ph-file-js text-yellow-400"></i>
                    <span class="text-sm">JavaScript</span>
                </div>
                <button onclick="runCode()" class="flex items-center gap-1.5 bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-lg text-sm font-bold">
                    <i class="ph-fill ph-play"></i> Run
                </button>
            </div>

            <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
                <div class="flex-1 flex flex-col">
                    <div class="bg-gray-800/80 border-b border-gray-700 p-4">
                        <p class="font-bold">Task: Print "Hello, World!"</p>
                    </div>
                    
                    <div class="flex-1 relative flex">
                        <div class="w-10 bg-[#0d1117] border-r border-gray-800 text-gray-600 text-right pr-3 pt-4 font-mono">
                            <span>1</span><span>2</span><span>3</span>
                        </div>
                        <textarea id="code-editor-textarea" class="flex-1 bg-gray-900 text-gray-200 p-4 outline-none resize-none font-mono text-sm" placeholder="// Write your code here..."></textarea>
                    </div>
                </div>

                <div class="h-1/3 md:h-full md:w-1/3 bg-[#0d1117] flex flex-col shrink-0 border-t md:border-t-0 md:border-l border-gray-800">
                    <div class="px-4 py-3 border-b border-gray-800 flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-400 uppercase">Console Output</span>
                    </div>
                    <div class="flex-1 p-4 overflow-y-auto font-mono text-sm" id="console-output">
                        <span class="text-gray-600 italic">Ready...</span>
                    </div>
                </div>
            </div>
        </div>
        `;
    }

    // --- RENDER BOTTOM NAV ---
    function renderBottomNav() {
        const cp = AppState.currentPage;
        const navItems = [
            { id: 'dashboard', icon: 'ph-house', label: 'Home' },
            { id: 'courses', icon: 'ph-book-open', label: 'Courses' },
            { id: 'challenges', icon: 'ph-target', label: 'Tasks' },
            { id: 'community', icon: 'ph-users', label: 'Forum' },
            { id: 'profile', icon: 'ph-user', label: 'Profile' }
        ];

        return navItems.map(item => `
            <div onclick="navigate('${item.id}')" class="flex flex-col items-center justify-center w-16 md:w-full md:py-4 cursor-pointer group hover:bg-gray-50 dark:hover:bg-gray-800/50 md:rounded-xl transition-colors">
                <i class="${cp === item.id ? 'ph-fill text-primary' : 'ph text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-300'} ${item.icon} text-2xl md:text-3xl"></i>
                <span class="text-[10px] mt-1 font-medium ${cp === item.id ? 'text-primary' : 'text-gray-400'}">${item.label}</span>
            </div>
        `).join('');
    }

    // --- RENDER LOADING ---
    function renderLoading() {
        return `
        <div class="h-full flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <i class="ph ph-spinner animate-spin text-4xl text-primary"></i>
                <p class="text-gray-500">Loading...</p>
            </div>
        </div>`;
    }

    // --- UTILITY FUNCTIONS ---
    window.runCode = function() {
        const code = $('code-editor-textarea').value;
        const out = $('console-output');
        
        out.innerHTML = '<div class="text-blue-400"><i class="ph ph-spinner animate-spin"></i> Running...</div>';
        
        setTimeout(() => {
            try {
                const originalLog = console.log;
                let logs = [];
                console.log = (...args) => logs.push(args.join(' '));
                
                eval(code);
                
                out.innerHTML = logs.length ? 
                    logs.map(l => `<div class="text-green-400">> ${l}</div>`).join('') : 
                    '<div class="text-gray-400">Code executed (no output)</div>';
                    
                console.log = originalLog;
            } catch (error) {
                out.innerHTML = `<div class="text-red-500">> Error: ${error.message}</div>`;
            }
        }, 500);
    };

    window.finishLesson = function() {
        fireConfetti();
        showToast('Lesson Completed! +20 XP', 'success');
        setTimeout(() => navigate('dashboard'), 1500);
    };

    // --- START APP ---
    startApp();
</script>

</body>
</html>
