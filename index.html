<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <title>ProgramPros - Learn to Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    },
                    colors: {
                        primary: 'var(--color-primary, #4F46E5)',
                        primaryHover: 'var(--color-primary-hover, #4338CA)',
                        secondary: 'var(--color-secondary, #9333EA)',
                        darkBg: '#0B1120',
                        darkCard: '#1E293B',
                        darkBorder: '#334155'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'slide-in-right': 'slideInRight 0.3s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideInRight: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box;}
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; border: 2px solid transparent; background-clip: padding-box;}
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .gradient-text {
            background: linear-gradient(135deg, #4F46E5, #9333EA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5, #9333EA); }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        #code-editor-textarea {
            tab-size: 4;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
            caret-color: #4F46E5;
        }
        
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; pointer-events: none; display: flex; flex-direction: column; gap: 8px; }
        .toast { pointer-events: auto; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        
        .confetti-piece { position: absolute; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        /* Loader */
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #4F46E5; width: 24px; height: 24px; -webkit-animation: spin 1s linear infinite; animation: spin 1s linear infinite; }
        .dark .loader { border: 3px solid #334155; border-top: 3px solid #818cf8; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-gray-800 dark:text-gray-100 transition-colors duration-300 font-sans antialiased overflow-hidden selection:bg-primary/30 selection:text-primary dark:selection:text-white">

<div id="app-container" class="flex flex-col md:flex-row h-screen w-full relative">
    
    <!-- Sidebar / Bottom Nav (Injected via JS) -->
    <nav id="navigation-bar" class="hidden md:flex flex-col w-20 lg:w-64 bg-white dark:bg-darkCard border-r border-gray-200 dark:border-darkBorder h-full z-40 transition-all duration-300 shrink-0"></nav>
    <nav id="mobile-bottom-nav" class="md:hidden hidden fixed bottom-0 w-full bg-white/80 dark:bg-darkCard/80 backdrop-blur-lg border-t border-gray-200 dark:border-darkBorder z-40 px-2 pb-safe pt-2 flex-row justify-around items-center"></nav>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col relative h-full w-full min-w-0">
        <!-- Header (Injected via JS if needed, currently baked into pages) -->
        <main id="app-root" class="flex-1 overflow-y-auto overflow-x-hidden relative w-full h-full bg-gray-50 dark:bg-darkBg pb-16 md:pb-0 scroll-smooth"></main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, addDoc, arrayUnion, query, getDocs, deleteDoc, orderBy, serverTimestamp, arrayRemove, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- FIREBASE INITIALIZATION & RULES ---
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'programpros-v2-app';
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyCgJvSkhGL-zJ0pXYrXt43z7LZB-CfOI48",
        authDomain: "font-changer-4667c.firebaseapp.com",
        projectId: "font-changer-4667c",
        storageBucket: "font-changer-4667c.firebasestorage.app",
        messagingSenderId: "200130160747",
        appId: "1:200130160747:web:747975551ddb296dc2a92e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Rule 1: Strict Paths Helpers
    const getPubCol = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
    const getPubDoc = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);
    const getPrivCol = (uid, colName) => collection(db, 'artifacts', appId, 'users', uid, colName);
    const getPrivDoc = (uid, colName, docId) => doc(db, 'artifacts', appId, 'users', uid, colName, docId);

    // --- APP STATE ---
    window.AppState = {
        currentPage: 'welcome',
        user: null, // Full user object from DB
        authReady: false,
        theme: localStorage.getItem('theme') || 'light',
        courses: [],
        communityPosts: [],
        paymentRequests: [],
        teacherRequests: [],
        proRequests: [],
        leaderboard: [],
        currentCourseId: null,
        currentLessonId: null,
        modals: {
            createCourse: false,
            addContent: false,
            settings: false
        },
        selectedCourseForContent: null,
        selectedContentType: 'video'
    };

    // --- UTILITIES ---
    const $ = id => document.getElementById(id);
    
    window.showToast = function(message, type = 'success') {
        const container = $('toast-container');
        const toast = document.createElement('div');
        const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-green-500 text-xl"></i>' : 
                     type === 'error' ? '<i class="ph-fill ph-warning-circle text-red-500 text-xl"></i>' : 
                     '<i class="ph-fill ph-info text-blue-500 text-xl"></i>';
        
        toast.className = `toast translate-y-10 opacity-0 flex items-center gap-3 p-4 rounded-xl shadow-lg border glass-panel ${
            type === 'success' ? 'border-green-500/30' : type === 'error' ? 'border-red-500/30' : 'border-blue-500/30'
        }`;
        toast.innerHTML = `${icon} <span class="font-medium text-sm">${message}</span>`;
        
        container.appendChild(toast);
        
        // Animate in
        requestAnimationFrame(() => {
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
        });

        setTimeout(() => {
            toast.classList.remove('translate-y-0', 'opacity-100');
            toast.classList.add('translate-y-10', 'opacity-0');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    window.toggleTheme = function() {
        const html = document.documentElement;
        html.classList.toggle('dark');
        AppState.theme = html.classList.contains('dark') ? 'dark' : 'light';
        localStorage.setItem('theme', AppState.theme);
        renderApp();
    }

    // Apply initial theme
    if (AppState.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        AppState.theme = 'dark';
    }

    window.navigate = function(page, params = {}) {
        AppState.currentPage = page;
        if (params.courseId) AppState.currentCourseId = params.courseId;
        if (params.lessonId) AppState.currentLessonId = params.lessonId;
        
        // Close modals on navigation
        AppState.modals.createCourse = false;
        AppState.modals.addContent = false;
        AppState.modals.settings = false;
        
        renderApp();
        $('app-root').scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.togglePassword = function(inputId, btn) {
        const input = $(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('ph-eye', 'ph-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('ph-eye-slash', 'ph-eye');
        }
    }

    window.fireConfetti = function() {
        const colors = ['#4F46E5', '#9333EA', '#10B981', '#F59E0B', '#EF4444', '#3B82F6'];
        const container = $('app-root');
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-piece';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = (container.scrollTop - 20) + 'px';
            confetti.style.width = Math.random() * 8 + 6 + 'px';
            confetti.style.height = Math.random() * 8 + 6 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            container.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }
    }

    function generateId() {
        return Math.random().toString(36).substring(2, 15);
    }

    // --- DATA FETCHING & SYNC ---
    let unsubscribes = [];

    function clearSubscriptions() {
        unsubscribes.forEach(unsub => unsub());
        unsubscribes = [];
    }

    async function initializeUserData(authUser) {
        if (!authUser) return;
        
        const uid = authUser.uid;
        const isAdminEmail = authUser.email === 'joykumbhakar101@gmail.com';
        
        // We store user profile in public so community features work, but keep detailed progress separate if needed.
        // For simplicity and to avoid complex joins, we'll keep the main profile in public.
        const userRef = getPubDoc('users', uid); 
        
        try {
            const docSnap = await getDoc(userRef);
            
            if (!docSnap.exists()) {
                // First time setup
                const newProfile = {
                    uid: uid,
                    name: authUser.displayName || 'Learner ' + uid.substring(0, 4),
                    email: authUser.email || '',
                    avatar: authUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(authUser.displayName || 'User')}&background=4F46E5&color=fff`,
                    studentId: 'PP-' + Math.floor(Math.random() * 90000 + 10000),
                    joinDate: new Date().toLocaleDateString('en-US', { month: 'short', year: 'numeric' }),
                    level: 1,
                    points: 0,
                    unlockedCourses: [],
                    completedLessons: [], // Array of lesson IDs
                    isPro: false,
                    role: isAdminEmail ? 'admin' : 'student'
                };
                await setDoc(userRef, newProfile);
                AppState.user = newProfile;
            } else {
                // Update admin status dynamically if email matches just in case
                let data = docSnap.data();
                if (isAdminEmail && data.role !== 'admin') {
                    await updateDoc(userRef, { role: 'admin' });
                    data.role = 'admin';
                }
                AppState.user = data;
            }

            // Realtime listener for user profile
            const unsubUser = onSnapshot(userRef, (doc) => {
                if (doc.exists()) {
                    AppState.user = doc.data();
                    if (['dashboard', 'profile', 'courseDetail', 'admin', 'teacher'].includes(AppState.currentPage) || AppState.modals.settings) {
                        renderApp();
                    }
                }
            }, (error) => console.error("User sync error:", error));
            
            unsubscribes.push(unsubUser);
            
            // Setup Role-based Listeners
            setupRoleListeners();

        } catch (e) {
            console.error("Error initializing user data:", e);
            showToast("Failed to load profile data", "error");
        }
    }

    function setupRoleListeners() {
        // 1. Listen to Courses (Everyone needs this)
        const coursesRef = getPubCol('courses');
        const unsubCourses = onSnapshot(coursesRef, (snapshot) => {
            const courses = [];
            snapshot.forEach(doc => courses.push({ id: doc.id, ...doc.data() }));
            // Sort by creation date or order
            AppState.courses = courses.sort((a, b) => b.createdAt - a.createdAt);
            if (['dashboard', 'courses', 'courseDetail', 'teacher'].includes(AppState.currentPage)) renderApp();
        }, (error) => console.error("Courses sync error:", error));
        unsubscribes.push(unsubCourses);

        // 2. Listen to Community Posts (Everyone)
        const postsRef = getPubCol('community_posts');
        const unsubPosts = onSnapshot(postsRef, (snapshot) => {
            const posts = [];
            snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
            AppState.communityPosts = posts.sort((a, b) => b.timestamp - a.timestamp);
            if (AppState.currentPage === 'community') renderApp();
        }, (error) => console.error("Community sync error:", error));
        unsubscribes.push(unsubPosts);

        // 3. Listen to Top Users for Leaderboard
        const unsubTopUsers = onSnapshot(getPubCol('users'), (snapshot) => {
            const users = [];
            snapshot.forEach(doc => users.push(doc.data()));
            AppState.leaderboard = users.sort((a, b) => (b.points || 0) - (a.points || 0)).slice(0, 5);
            if (AppState.currentPage === 'dashboard') renderApp();
        }, (error) => console.error("Leaderboard sync error:", error));
        unsubscribes.push(unsubTopUsers);

        // 4. Admin Specific Listeners
        if (AppState.user?.role === 'admin') {
            const paymentsRef = getPubCol('payment_requests');
            const unsubPayments = onSnapshot(paymentsRef, (snapshot) => {
                const reqs = [];
                snapshot.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                AppState.paymentRequests = reqs.filter(r => r.status === 'pending');
                if (AppState.currentPage === 'admin') renderApp();
            });
            unsubscribes.push(unsubPayments);

            const teachersRef = getPubCol('teacher_requests');
            const unsubTeachers = onSnapshot(teachersRef, (snapshot) => {
                const reqs = [];
                snapshot.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                AppState.teacherRequests = reqs.filter(r => r.status === 'pending');
                if (AppState.currentPage === 'admin') renderApp();
            });
            unsubscribes.push(unsubTeachers);

            const proRef = getPubCol('pro_requests');
            const unsubPro = onSnapshot(proRef, (snapshot) => {
                const reqs = [];
                snapshot.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                AppState.proRequests = reqs.filter(r => r.status === 'pending');
                if (AppState.currentPage === 'admin') renderApp();
            });
            unsubscribes.push(unsubPro);
        }
    }

    // --- SEEDING DUMMY DATA (Run once if empty) ---
    async function seedInitialCourses() {
        if (!auth.currentUser) return;
        const coursesRef = getPubCol('courses');
        try {
            const snap = await getDocs(coursesRef);
            if (snap.empty) {
                console.log("Seeding initial courses...");
                const dummyCourses = [
                    {
                        title: "Python for Beginners", description: "Start your coding journey with Python.", price: 299,
                        icon: "ph-snake", color: "text-blue-500", bg: "bg-blue-100 dark:bg-blue-900/30",
                        teacherName: "ProgramPros", createdAt: Date.now(), lessons: 2,
                        syllabus: [
                            { id: generateId(), title: "Introduction to Variables", type: "video", duration: "5 mins", url: "https://www.youtube.com/embed/kqtD5dpn9C8", isPremium: false },
                            { id: generateId(), title: "Control Flow (If/Else)", type: "note", duration: "10 mins", content: "<h2>If Statements</h2><p>Used for decision making.</p><pre><code>if x > 5:\n  print('Large')</code></pre>", isPremium: true }
                        ]
                    },
                    {
                        title: "Web Dev Bootcamp", description: "HTML, CSS, and JS basics.", price: 499,
                        icon: "ph-browsers", color: "text-purple-500", bg: "bg-purple-100 dark:bg-purple-900/30",
                        teacherName: "ProgramPros", createdAt: Date.now() - 1000, lessons: 1,
                        syllabus: [
                            { id: generateId(), title: "HTML Basics PDF", type: "pdf", duration: "15 mins", url: "#", isPremium: false }
                        ]
                    }
                ];
                for (let c of dummyCourses) {
                    await setDoc(doc(coursesRef, generateId()), c);
                }
            }
        } catch (e) {
            console.error("Seed error:", e);
        }
    }

    // --- AUTH ACTIONS ---
    window.handleAuthAction = async function(action, event) {
        if(event) event.preventDefault();
        
        const btn = event ? event.currentTarget.querySelector('button[type="submit"]') : null;
        const originalText = btn ? btn.innerHTML : '';
        if(btn) { btn.innerHTML = '<div class="loader mx-auto border-white border-t-transparent"></div>'; btn.disabled = true; }

        try {
            if (action === 'google') {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
                showToast('Logged in successfully!');
                navigate('dashboard');
            } else if (action === 'login') {
                const email = $('login-email').value;
                const pwd = $('login-pwd').value;
                if (!email || !pwd) throw new Error("Please fill all fields");
                await signInWithEmailAndPassword(auth, email, pwd);
                showToast('Welcome back!');
                navigate('dashboard');
            } else if (action === 'signup') {
                const name = $('signup-name').value;
                const email = $('signup-email').value;
                const pwd = $('signup-pwd').value;
                if (!name || !email || !pwd) throw new Error("Please fill all fields");
                const cred = await createUserWithEmailAndPassword(auth, email, pwd);
                await updateProfile(cred.user, { displayName: name });
                showToast('Account created!');
                navigate('dashboard');
            } else if (action === 'logout') {
                clearSubscriptions();
                await signOut(auth);
                AppState.user = null;
                showToast('Logged out');
                navigate('welcome');
                // Re-init anon session
                await initAuth();
            }
        } catch (error) {
            console.error("Auth error:", error);
            showToast(error.message.replace('Firebase: ', ''), 'error');
            if(btn) { btn.innerHTML = originalText; btn.disabled = false; }
        }
    }

    // --- APP ACTIONS ---
    window.markLessonComplete = async function(lessonId) {
        if (!AppState.user || !AppState.user.uid) return;
        
        const btn = document.getElementById('btn-mark-complete');
        if(btn) { btn.innerHTML = '<div class="loader mx-auto"></div>'; btn.disabled = true; }

        try {
            const userRef = getPubDoc('users', AppState.user.uid);
            
            // Only add if not already completed to grant points once
            if (!AppState.user.completedLessons?.includes(lessonId)) {
                await updateDoc(userRef, {
                    completedLessons: arrayUnion(lessonId),
                    points: (AppState.user.points || 0) + 20
                });
                fireConfetti();
                showToast('Lesson Completed! +20 Points', 'success');
            } else {
                showToast('Lesson already completed.', 'info');
            }
            
            setTimeout(() => navigate('courseDetail'), 1500);
        } catch (error) {
            console.error("Error marking complete:", error);
            showToast('Failed to save progress', 'error');
            if(btn) { btn.innerHTML = 'Try Again'; btn.disabled = false; }
        }
    };

    window.addCommunityPost = async function() {
        if (!AppState.user) return showToast('Please login to post', 'error');
        
        const input = $('post-input');
        const content = input.value.trim().replace(/</g, "&lt;"); // basic sanitize
        if (!content) return;

        const btn = $('btn-post');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>';
        btn.disabled = true;

        try {
            await addDoc(getPubCol('community_posts'), {
                content: content,
                authorName: AppState.user.name,
                authorAvatar: AppState.user.avatar,
                authorId: AppState.user.uid,
                authorIsPro: AppState.user.isPro || false,
                timestamp: Date.now(),
                likes: 0
            });
            input.value = '';
            showToast('Posted successfully!');
        } catch (e) {
            showToast('Failed to post', 'error');
        } finally {
            btn.innerHTML = 'Post';
            btn.disabled = false;
        }
    };

    window.deleteCommunityPost = async function(postId) {
        try {
            await deleteDoc(getPubDoc('community_posts', postId));
            showToast('Post deleted', 'info');
        } catch (e) {
            showToast('Failed to delete post', 'error');
        }
    };

    window.requestPayment = async function(courseId, courseTitle, price) {
        if (!AppState.user) return;
        
        const btn = $('btn-pay-confirm');
        if(btn) { btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Processing...'; btn.disabled = true; }

        try {
            // Add to global payment requests queue
            await addDoc(getPubCol('payment_requests'), {
                uid: AppState.user.uid,
                userName: AppState.user.name,
                userEmail: AppState.user.email,
                courseId: courseId,
                courseTitle: courseTitle,
                amount: price,
                status: 'pending',
                requestedAt: Date.now()
            });

            showToast('Verification request sent to Admin.', 'success');
            navigate('courseDetail');
        } catch (e) {
            console.error(e);
            showToast('Error submitting request.', 'error');
            if(btn) { btn.innerHTML = 'I have completed the payment'; btn.disabled = false; }
        }
    };

    // --- USER SETTINGS ACTIONS ---
    window.saveSettings = async function() {
        if (!AppState.user) return;
        
        const name = $('settings-name').value;
        const avatar = $('settings-avatar').value;
        
        if (!name) return showToast('Name cannot be empty', 'error');
        
        const btn = $('btn-save-settings');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; btn.disabled = true;
        
        try {
            await updateDoc(getPubDoc('users', AppState.user.uid), {
                name: name,
                avatar: avatar || AppState.user.avatar
            });
            
            // Also update Firebase Auth profile
            if(auth.currentUser) {
                await updateProfile(auth.currentUser, { displayName: name, photoURL: avatar });
            }
            
            AppState.modals.settings = false;
            showToast('Profile updated successfully!', 'success');
            renderApp();
        } catch(e) {

    window.teacherCreateCourse = async function() {
        const title = $('tc-title').value;
        const desc = $('tc-desc').value;
        const price = $('tc-price').value;

        if(!title || !desc) return showToast('Fill required fields', 'error');

        const btn = $('btn-create-course');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; btn.disabled = true;

        try {
            const courseId = generateId();
            await setDoc(getPubDoc('courses', courseId), {
                title, description: desc, price: Number(price) || 0,
                teacherId: AppState.user.uid, teacherName: AppState.user.name,
                icon: "ph-book-open", color: "text-primary", bg: "bg-primary/10",
                createdAt: Date.now(), lessons: 0, syllabus: []
            });
            AppState.modals.createCourse = false;
            showToast('Course created!');
            renderApp();
        } catch(e) {
            showToast('Creation failed', 'error');
        } finally {
            if(btn){ btn.innerHTML = 'Create'; btn.disabled = false; }
        }
    };

    window.teacherAddContent = async function() {
        const courseId = AppState.selectedCourseForContent;
        const type = AppState.selectedContentType;
        const title = $('tac-title').value;
        const isPremium = $('tac-premium').checked;
        
        let contentObj = { id: generateId(), type, title, isPremium, duration: "10 mins" };
        
        if (type === 'video') contentObj.url = $('tac-url').value || 'https://www.youtube.com/embed/dQw4w9WgXcQ';
        else if (type === 'pdf') contentObj.url = $('tac-pdf').value || '#';
        else if (type === 'note') contentObj.content = $('tac-note').value || 'Empty note.';

        if(!title) return showToast('Title required', 'error');

        const btn = $('btn-add-content');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; btn.disabled = true;

        try {
            const courseRef = getPubDoc('courses', courseId);
            const docSnap = await getDoc(courseRef);
            if(docSnap.exists()) {
                const courseData = docSnap.data();
                const newSyllabus = [...(courseData.syllabus || []), contentObj];
                await updateDoc(courseRef, {
                    syllabus: newSyllabus,
                    lessons: newSyllabus.length
                });
                AppState.modals.addContent = false;
                showToast('Content added!');
                renderApp();
            }
        } catch(e) {
            showToast('Failed to add content', 'error');
        } finally {
            if(btn){ btn.innerHTML = 'Add'; btn.disabled = false; }
        }
    };

    // --- RENDER ENGINE ---
    window.renderApp = function() {
        const root = $('app-root');
        const navBar = $('navigation-bar');
        const mobileNav = $('mobile-bottom-nav');
        
        if (!AppState.authReady) {
            root.innerHTML = renderLoader();
            navBar.classList.add('hidden');
            mobileNav.classList.add('hidden');
            return;
        }

        // Apply Pro Theme Colors
        if (AppState.user?.isPro) {
            document.documentElement.style.setProperty('--color-primary', '#d4af37'); // Luxury Gold
            document.documentElement.style.setProperty('--color-primary-hover', '#b8860b'); // Dark Goldenrod
            document.documentElement.style.setProperty('--color-secondary', '#ffd700'); // Light Gold
        } else {
            document.documentElement.style.setProperty('--color-primary', '#4F46E5');
            document.documentElement.style.setProperty('--color-primary-hover', '#4338CA');
            document.documentElement.style.setProperty('--color-secondary', '#9333EA');
        }

        // Determine Layout
        const hideNavPages = ['welcome', 'login', 'signup', 'editor', 'quiz'];
        const showNav = AppState.user && !hideNavPages.includes(AppState.currentPage);
        
        if (showNav) {
            navBar.classList.remove('hidden');
            mobileNav.classList.remove('hidden');
            navBar.innerHTML = renderDesktopSidebar();
            mobileNav.innerHTML = renderMobileNav();
        } else {
            navBar.classList.add('hidden');
            mobileNav.classList.add('hidden');
        }

        // Render Page Content
        let html = '';
        switch(AppState.currentPage) {
            case 'welcome': html = renderWelcome(); break;
            case 'login': html = renderAuth('login'); break;
            case 'signup': html = renderAuth('signup'); break;
            case 'dashboard': html = AppState.user ? renderDashboard() : renderWelcome(); break;
            case 'courses': html = AppState.user ? renderCourses() : renderWelcome(); break;
            case 'courseDetail': html = AppState.user ? renderCourseDetail() : renderWelcome(); break;
            case 'lesson': html = AppState.user ? renderLesson() : renderWelcome(); break;
            case 'community': html = AppState.user ? renderCommunity() : renderWelcome(); break;
            case 'profile': html = AppState.user ? renderProfile() : renderWelcome(); break;
            case 'admin': html = (AppState.user?.role === 'admin') ? renderAdmin() : renderDashboard(); break;
            case 'teacher': html = (AppState.user?.role === 'teacher' || AppState.user?.role === 'admin') ? renderTeacher() : renderDashboard(); break;
            case 'upgrade': html = AppState.user ? renderUpgrade() : renderWelcome(); break;
            case 'editor': html = renderEditor(); break;
            case 'certificate': html = renderCertificate(); break;
            case 'studentId': html = renderStudentId(); break;
            default: html = renderDashboard();
        }
        
        // Append Modals
        if (AppState.modals.createCourse) html += renderCreateCourseModal();
        if (AppState.modals.addContent) html += renderAddContentModal();
        if (AppState.modals.settings) html += renderSettingsModal();

        root.innerHTML = html;
    }

    function renderCourses() {

                        <div class="flex flex-wrap items-center justify-center md:justify-start gap-3">

                                        <div class="w-full bg-gray-100 dark:bg-darkBg rounded-full h-1.5"><div class="bg-green-500 h-1.5 rounded-full transition-all" style="width: ${progress}%"></div></div>

                                <button onclick="navigate('upgrade', {courseId: '${course.id}'})" class="px-8 py-3 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:shadow-xl hover:-translate-y-0.5 active:scale-95 transition-all flex items-center gap-2 text-lg">
                                    Get Access • ₹${course.price}
                                </button>

                    </div>

            <!-- Syllabus -->
            <div class="flex-1 bg-white dark:bg-darkBg p-6 md:p-12 relative -mt-6 rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">

                        course.syllabus.map((item, index) => {
                            const isLocked = item.isPremium && !isUnlocked;
                            const isCompleted = AppState.user?.completedLessons?.includes(item.id);

                    </div>
                </div>
            </div>
        </div>

    function renderLesson() {
        const course = AppState.courses.find(c => c.id === AppState.currentCourseId);
        const lesson = course?.syllabus?.find(l => l.id === AppState.currentLessonId);
        
        if (!lesson) return `<div class="p-8 text-center"><p>Lesson not found.</p><button onclick="navigate('courses')" class="mt-4 text-primary">Go back</button></div>`;
        
        const isUnlocked = AppState.user?.unlockedCourses?.includes(course.id);
        if (lesson.isPremium && !isUnlocked) return renderUpgrade();

        const isCompleted = AppState.user?.completedLessons?.includes(lesson.id);

        let contentHtml = '';
        if (lesson.type === 'video') {
            contentHtml = `<div class="w-full aspect-video bg-black rounded-2xl overflow-hidden shadow-xl mb-8 border border-gray-800">
                <iframe class="w-full h-full" src="${lesson.url}" frameborder="0" allowfullscreen></iframe>
            </div>`;
        } else if (lesson.type === 'note') {
            contentHtml = `<div class="prose dark:prose-invert max-w-none bg-white dark:bg-darkCard p-8 rounded-2xl border border-gray-100 dark:border-darkBorder mb-8 shadow-sm text-gray-800 dark:text-gray-200 leading-relaxed">${lesson.content}</div>`;
        } else if (lesson.type === 'pdf') {
            contentHtml = `<div class="bg-red-50 dark:bg-red-900/10 border border-red-100 dark:border-red-900/30 rounded-2xl p-12 text-center flex flex-col items-center justify-center mb-8">
                <i class="ph-fill ph-file-pdf text-7xl text-red-500 mb-4 drop-shadow-md"></i>
                <h3 class="font-bold text-xl mb-2">Reference Material</h3>
                <p class="text-gray-500 mb-6 max-w-sm">Download the PDF document to read offline or print.</p>
                <a href="${lesson.url}" target="_blank" class="px-8 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-lg shadow-red-500/30 transition-all flex items-center gap-2 active:scale-95"><i class="ph-bold ph-download-simple"></i> Download PDF</a>
            </div>`;
        } else if (lesson.type === 'quiz') {
            return renderQuiz();
        }

        return `
        <div class="h-full flex flex-col bg-gray-50 dark:bg-darkBg animate-fade-in relative">
            <div class="p-4 border-b border-gray-200 dark:border-darkBorder bg-white dark:bg-darkCard flex items-center justify-between sticky top-0 z-20 shadow-sm">

                <div class="text-sm font-bold text-gray-500 truncate px-4">${course.title}</div>

                    <h1 class="text-3xl md:text-4xl font-bold mb-8 text-gray-900 dark:text-white">${lesson.title}</h1>
                    
                    ${contentHtml}
                    
                    <div class="flex justify-center pb-12">
                        <button id="btn-mark-complete" onclick="markLessonComplete('${lesson.id}')" 
                                class="w-full sm:w-auto px-12 py-4 ${isCompleted ? 'bg-green-500 hover:bg-green-600' : 'gradient-bg hover:shadow-xl'} text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3 text-lg"
                                ${isCompleted ? 'disabled style="opacity:0.8"' : ''}>
                            ${isCompleted ? 'Completed <i class="ph-bold ph-check"></i>' : 'Mark as Complete <i class="ph-bold ph-check-circle"></i>'}
                        </button>
                    </div>
                </div>
            </div>
        </div>
        `;

    // --- EDITOR UTILS ---
    window.updateLineNumbers = function(textarea) {
        const lines = textarea.value.split('\n').length;
        const numbersDiv = $('line-numbers');
        if(numbersDiv) {
            numbersDiv.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br/>');
            numbersDiv.scrollTop = textarea.scrollTop; // keep sync
        }
    }
    
    // Simple syntax highlighting for output
    function highlightOutput(text) {
        if (typeof text === 'string') return `<span class="text-green-400">'${text}'</span>`;
        if (typeof text === 'number') return `<span class="text-[#b5cea8]">${text}</span>`;
        if (typeof text === 'boolean') return `<span class="text-[#569cd6]">${text}</span>`;
        if (text === null) return `<span class="text-[#569cd6]">null</span>`;
        if (text === undefined) return `<span class="text-[#569cd6]">undefined</span>`;
        if (typeof text === 'object') return `<span class="text-[#9cdcfe]">${JSON.stringify(text)}</span>`;
        return text;
    }

    window.runCode = function() {
        const code = $('code-editor-textarea').value;
        const out = $('console-output');
        
        out.innerHTML = '<div class="text-[#dcdcaa] flex items-center gap-2"><i class="ph-bold ph-spinner animate-spin"></i> Executing...</div>';
        
        setTimeout(() => {
            try {
                const originalLog = console.log;
                let logs = [];
                console.log = (...args) => logs.push(args.map(highlightOutput).join(' '));
                
                // Safe-ish eval for demo
                const result = new Function(code)();
                
                let outHtml = logs.length ? logs.map(l => `<div class="font-mono">> ${l}</div>`).join('') : '';
                if (result !== undefined) outHtml += `<div class="font-mono text-gray-500"><- ${highlightOutput(result)}</div>`;
                if (!outHtml) outHtml = '<div class="text-gray-500 italic">Code executed (no output)</div>';
                
                out.innerHTML = outHtml;
                console.log = originalLog;
            } catch (error) {
                out.innerHTML = `<div class="text-red-400 font-mono">> Error: ${error.message}</div>`;
            }
        }, 300);
    };

    // Keep scroll sync for editor
    document.addEventListener('scroll', function(e) {
        if(e.target.id === 'code-editor-textarea') {
            $('line-numbers').scrollTop = e.target.scrollTop;
        }
    }, true);


    // --- APP LIFECYCLE ---
    async function initAuth() {
        const initToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        try {
            if (initToken) {
                await signInWithCustomToken(auth, initToken);
            } else if (!auth.currentUser) {
                // await signInAnonymously(auth); // Only if you want guest accounts by default
                // We'll skip anon auth to force login/signup for a better user experience in this app
            }
        } catch (e) {
            console.error("Init Auth Error:", e);
        }
    }

    onAuthStateChanged(auth, async (user) => {
        AppState.authReady = true;
        clearSubscriptions(); // clear previous
        
        if (user && !user.isAnonymous) {
            // User logged in via Email or Google
            await initializeUserData(user);
            await seedInitialCourses();
            
            // Redirect from auth pages
            if (['welcome', 'login', 'signup'].includes(AppState.currentPage)) {
                AppState.currentPage = 'dashboard';
            }
        } else {
            // Logged out
            AppState.user = null;
            if (!['welcome', 'login', 'signup'].includes(AppState.currentPage)) {
                AppState.currentPage = 'welcome';
            }
        }
        
        renderApp();
    });

    // Start
    initAuth();

</script>
